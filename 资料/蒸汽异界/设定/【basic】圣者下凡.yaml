name: 圣者下凡
summary: "神明以凡人形态降临世界的机制，本质上是诸神为了排解永恒生命的无聊而进行的一场大型角色扮演游戏。虽然这也是凡人弑神登神的唯一机会，但对于大多数神明而言，凡间不过是一个充满了未知与乐趣的巨大游乐场。"
core_rules:
  - rule: 娱乐驱动
    description: "尽管视察信徒或躲避神战也是理由，但绝大多数神明下凡的核心驱动力仅仅是为了'找乐子'。他们渴望摆脱全知全能的束缚，体验凡人的爱恨情仇、生老病死，以及种种不确定的惊喜。"
  - rule: 常态化现象
    description: "圣者下凡并非千年一遇的奇迹，而是米拉比里斯大陆上的常态。在任何繁华的都市或偏远的酒馆中，那个与你擦肩而过的路人，通过完美的伪装，极有可能就是某位正在享受假期的神明。"
  - rule: 唯一化身
    description: "为了保证体验的沉浸感与力量的稳定性，每位神明在同一时间只能维持一个圣者化身。这意味着如果化身死亡，神明将不得不经历一段漫长的虚弱期才能再次降临，也让每一次下凡都伴随着真实的风险。"
  - rule: 完美伪装
    description: "为了游戏体验，下凡的神明会拥有一层完美的伪装规则保护。除非神明主动展现神迹或亲口告知，否则包括其他神明在内的任何存在，都无法通过神力感知或预言法术来识破其真实身份。"
  - rule: 力量压制
    description: "受世界规则的限制，同时也是为了公平游玩，下凡神明的力量会被压制在'大师'力量位阶的水平。这既是凡人所能达到的顶点，也是神明在不破坏世界规则前提下能发挥的极限。"
  - rule: 非强制性
    description: "虽然这是一种流行的消遣，但并非所有神明都热衷于此。有些古板的神明视其为儿戏，有些则因职责繁重无法抽身，还有些仅仅是因为不喜欢凡间的嘈杂而选择留守神国。"
special_implications:
  - name: 弑神登神
    description: "这既是神明的游戏，也是凡人的赌局。神明下凡期间是其本体与规则联系最薄弱的时刻，也是凡人通过特定复杂仪式杀死神明并取而代之的唯一时机。虽然成功率极低，但'弑神者'的传说永远诱惑着无数野心家。"
  - name: 信仰收集
    description: "虽然主要目的是娱乐，但聪明的神明（如普罗菲特）会利用化身在凡间的活动，不动声色地编织影响力，将这场游戏转化为实实在在的信仰收益。"
deity_avatar_templates:
  introduction: "为了更好地融入角色，神明会精心设计自己的'化身模板'。这些模板通常与其神职或反转性格相符，不仅是神明体验生活的载体，也是他们在这个巨大舞台上的'角色卡'。"
  purpose_of_templates: "方便快速融入凡人社会，享受特定的生活方式。同时，这种固定的行为模式也成为极少数试图寻找神明的凡人手中唯一的线索。"
