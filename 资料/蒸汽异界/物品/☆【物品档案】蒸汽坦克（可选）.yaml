  Heavy_Machinery:
    - name: "斯福尔扎 1755 式蒸汽坦克 "
      alias: 铁甲犀牛、ST55
      type: "蒸汽动力装甲车"
      manufacturer: "斯福尔扎与维斯孔蒂家族联合研制"
      year_production: "蒸汽历96年 (进取历1755年)"
      appearance: "基于重型蒸汽拖拉机底盘改造的钢铁怪物。外观为一个巨大由铆钉连接的矩形铁盒，下方是两组宽大的金属履带，两侧巨大的飞轮与连杆机构半暴露在装甲外，随着运动发出震耳欲聋的金属撞击声。车体顶部矗立着两根粗大的烟囱，行进时喷吐着浓密的黑烟。"
      armament:
        main: "车体前方固定安装一门短管 75mm 榴弹炮（需车内炮手手动装填）。"
        secondary: "车体两侧及后方各设有一个射击孔，配有手摇式多管加特林机枪或25毫米的多管排枪，用于压制步兵。"
      performance: "极其笨重且缓慢（越野速度仅相当于快步走），车内酷热难耐且充满煤烟味。虽然故障率极高，但其厚重的装甲足以无视帝国大部分轻武器的射击，是战场上的移动掩体与恐惧散布者因此被称为铁甲犀牛或ST55(Steam Tank 55)。"
      market_status: "联邦军方严格管制的战略武器。"
