    - name: "维斯孔蒂 1738 式手枪"
      alias: "38式双发枪"
      type: "前膛滑膛燧发手枪"
      manufacturer: "维斯孔蒂家族工坊"
      year_production: "蒸汽历79年 (进取历1738年)"
      specs: "口径15mm。发射定装纸包铅弹。发火方式：燧石击发。"
      user: "海军军官、水兵、私人保镖。"
      appearance: "为了适应海上潮湿环境，所有的金属部件都经过了黑化处理或直接采用抗腐蚀的黄铜制造。枪管比帝国同类产品略短，并同时具有上下配置的双枪管，更适合在狭窄的船舱内使用。枪身左侧配有一个长长的腰带挂钩，方便水手直接将其挂在宽腰带或肩带上，随时取用。"
      market_status: "极常见。标准制式武器，许多水手的第一把枪。"
