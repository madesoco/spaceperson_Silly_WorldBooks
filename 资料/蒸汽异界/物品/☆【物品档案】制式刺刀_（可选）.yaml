    - name: "M.79 步兵刺刀"
      type: "环首短剑型刺刀"
      manufacturer: "皇家兵工厂"
      specs: "刃长48厘米，全长约60厘米。单刃带血槽。"
      user: "常规步兵。"
      appearance: "一把结实而沉重的宽刃短剑。刀身笔直，但在刀尖处微微上扬，单面开刃，刀背厚实，开有深邃的减重血槽。其最显著的特征是巨大的钢铁D型护手，不仅保护手指，上方还有用于套住M.88步枪枪口的套环。握把采用黑色硬木，刻有菱形防滑纹，底部为平头钢盖，必要时可作为锤子使用。既是致命的刺刀，也是一把优秀的工兵刀。"
      market_status: "常见，因实用性强常被冒险者作为副武器使用，有大量民间仿制品。"

    - name: "M.96 刺刀"
      alias: "步兵军刀"
      type: "环首军刀型刺刀"
      manufacturer: "皇家兵工厂"
      specs: "刃长60厘米，全长约74厘米。微弧刃。"
      user: "精锐步兵、掷弹兵。"
      appearance: "相比M.79更为修长优雅，形制上更接近一把轻型骑兵军刀。刀身呈现优美的微弧度，便于在近身格斗中进行劈砍。护手为明亮的黄铜材质，同样带有套环，但护手条并未完全封闭，而是形成一个优雅的半护手结构。握把采用皮革包裹，手感细腻。当它装在M.96卡宾枪上时，极大地延伸了短枪的攻击距离，使其变成了一把长柄战刀。"
      market_status: "较少见，价格高于M.79，深受近战冒险者喜爱。"

    - name: "54 式刺刀"
      type: "通用型环首刺刀"
      manufacturer: "联邦四大家族"
      specs: "刃长54厘米，全长约66厘米。直刃双锋。"
      appearance: "设计上充满了联邦的实用主义与商业气息。刀身为剑型直刃，前三分之一处为双面开刃，极其强调穿刺能力。护手为简单的S型钢条，上方焊接有标准的套环。握把通常由廉价但耐腐蚀的黄铜一体铸造而成，表面有粗糙的颗粒以增加摩擦力。虽然不如帝国刺刀精美，但在狭窄的船舱甲板混战中，这把类似于短剑的武器更加灵活致命。"
      market_status: "通用性极强，是南部最常见的冷兵器之一。"
