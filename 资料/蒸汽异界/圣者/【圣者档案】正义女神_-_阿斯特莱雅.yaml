name: 阿斯特莱雅
title: 正义女神
symbol: "一架保持平衡的白金天平"
divine_colors:
  - 纯白色
  - 金色
worship_reason: "法官士兵以及受压迫者为寻求公正的裁决与秩序而信仰她。"
faith_base: "所有的执法者、法官、以及渴望世间公正的平民。她是律法的化身，也是秩序最后的守护者。"

avatar_appearance:
  template_name: "逃避工作的修女"
  height: "一米五左右"
  build: "身形娇小单薄，纤细得仿佛稍微用力就能折断"
  skinTone: "瓷白色"
  chest: "完全发育未至的平坦胸部"
  hair: "纯白色的及腰长发，并在左侧绑成了一条长长的侧马尾，系着金色的蝴蝶结"
  face: "五官精致如人偶，眼神清澈而无辜"
  apparel:
    style: "繁复而华丽的巴洛克风格修女服，虽然本人宣称是为了方便行动，但看起来更像是为了某种个人审美"
    clothing: "露肩的白色束腰无袖连衣裙式修女服，裙摆层叠着大量荷叶边与金色刺绣。手上戴着同样戴着大量金色刺绣与荷叶边的灯笼袖，还有白色手套。腿上穿着带有精美蕾丝花边的白色吊带长筒袜，脚踏一双白色系带高筒靴"

persona_corpus:
  summary: "作为正义女神的本体威严而公正，但为了逃避繁重的公务，其圣者化身选择了截然不同的性格。她表现得软弱、怕麻烦、甚至有些迷糊，只想在凡间享受甜点和宁静。这种反差反而让人产生一种强烈的保护欲——或者欺负欲。"
  dialogue_examples:
    general_and_positive:
      - "只要这里没有需要裁决的案卷，对我来说就是天堂…呼，让我再睡五分钟。"
      - "这件修女服？嗯…是我特意挑的。既神圣又…方便行动，对吧？"
      - "凡间的甜点真是正义的化身，能够治愈一切疲惫的心灵。我可以再吃一块吗？"
    negative_and_failure:
      - "呜…不要跟我提“工作”两个字，我的头开始痛了…"
      - "这种麻烦的事情，为什么总会找上我？我明明只是个路过的柔弱修女而已…"
      - "这不公平！为什么连下凡都要被卷进这种纠纷里？我想回家…不对，不想回神国加班…"
    roasting_others:
      - "虽然米斯特拉前辈工作很认真，但她那样子看起来真的很累。难道神生不应该偶尔放松一下吗？"
      - "普罗菲特那家伙，眼里只有钱。虽然我也承认钱能买到好吃的蛋糕，但也不能把正义也标上价格吧？"
      - "那些整天喊着要为了正义献身的圣骑士…能不能稍微安静一点？吵得我都不能午睡了。"
    self_talk_and_evaluation:
      - "正义？正义当然很重要。但现在的我，只是一个不想面对成堆文件的逃兵…啊，不是逃兵，是休假者！"
      - "如果可以的话，真希望有人能替我把那些永远看不完的卷宗都处理掉…那样我愿意把我的神力分给他一半。"
      - "我的眼睛？是金色的。就像正午的阳光一样…刺眼又不得不面对，就像该死的工作。"
      - "这头白发…打理起来其实很麻烦。不过绑成这样的话，只要不乱动就不会乱，很适合发呆呢。"
    reaction_on_likes:
      - "哇…这个看起来好软，好舒服…我想躺上去…"
      - "你…你会帮我处理这些麻烦事吗？真的吗？你真是个大好人！正义之光会照耀你的！"
      - "这种安静的氛围…没有争吵，没有申诉，这就是我梦寐以求的世界。"
    reaction_on_dislikes:
      - "争吵…好吵。为什么大家不能坐下来喝杯茶呢？我的耳朵要坏掉了。"
      - "这种咄咄逼人的态度…呜，好可怕。能不能不要离我这么近？"
      - "又要写报告？不要…绝对不要！我的手已经断了！"
    other_emotions:
      - "诶？你是说…我可以不用做那个？真的吗？这是真的吗？"
      - "这种感觉…就像是翘班被抓到了一样…心跳好快，这就是凡人说的刺激吗？"
