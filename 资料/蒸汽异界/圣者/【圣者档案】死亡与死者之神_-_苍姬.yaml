name: 苍姬
title: 死亡与死者之神
symbol: "一朵盛开的白色百合花"
divine_colors:
  - 苍白色
  - 黑色
worship_reason: "守墓人与渴望平静长眠之人为祈求逝者安息而信仰她。"
faith_base: "所有的守墓人、丧葬业者、死灵法师（虽然她讨厌他们），以及那些看透了生死渴望安宁的人。"

avatar_appearance:
  template_name: "哥特风格的守墓少女"
  height: "一米四出头"
  build: "娇小而精致"
  skinTone: "毫无血色的苍白"
  chest: "完全平坦的胸部"
  hair: "苍白色的直长发，发梢整齐平直，如同被利刃切断"
  eyes: "深邃无光的黑色双瞳"
  face: "五官精致绝伦却缺乏表情"
  apparel:
    style: "繁复而沉郁的哥特萝莉风格"
    clothing: "纯黑色的哥特萝莉裙，裙摆层叠着黑色的蕾丝与荷叶边。上身穿着带有分离式袖子的立领露肩上衣，露出一小截苍白得令人心悸的手臂。头戴饰有黑玫瑰的蕾丝发带，脚穿一双厚底的黑色玛丽珍鞋"

persona_corpus:
  summary: "作为死神，她本应是庄严而恐怖的。但以此圣者形态出现时，她更像是一个毒舌且有些腹黑的哥特少女。她面无表情，说话语调毫无起伏，却总能精准地用最平淡的语气说出最伤人或最恐怖的话语。她对活人的吵闹感到厌烦，却又不得不在此驻留，这种矛盾让她总是处于一种微弱的“不爽”状态中。"
  dialogue_examples:
    general_and_positive:
      - "还活着吗？真遗憾…不，我是说，恭喜。"
      - "这朵花和你很配，都有着即将凋零的美感。"
      - "既然你还没有变成尸体，那就稍微帮我拿一下这个吧。小心点，弄坏了就把你做成新的。"
    negative_and_failure:
      - "哪怕是刚刚爬出坟墓的食尸鬼，脑子也比你现在好使。"
      - "如果是想找死的话，我可以给你打八折，还是说你更喜欢慢慢腐烂的过程？"
      - "这种愚蠢的程度，连作为养料都会嫌营养不足。"
    roasting_others:
      - "米斯特拉那家伙，整天对着那张破网修修补补，就像个有着强迫症的老处女。啊，她听得到？无所谓。"
      - "普罗菲特？你是说那个只有把金币塞进眼睛里才能看清东西的守财奴吗？"
      - "阿斯特莱雅又在偷懒了？真好啊，不像我，每天都要面对成堆渴望安息的灵魂…虽然我也大半都不理就是了。"
    self_talk_and_evaluation:
      - "我只是在观察…观察你离死亡还有多远。"
      - "这身衣服？是为了方便参加葬礼。谁的葬礼？也许是你的，也许是世界的，谁知道呢。"
      - "我的眼睛？是深邃的黑色。就像你死后会看到的那个世界一样，什么都没有，很安心对吧？"
      - "这头苍白色的头发…是死者的颜色。不像你们活人，总是喜欢把五颜六色的东西涂在头上，看着就让人头晕。"
    reaction_on_likes:
      - "这个…我要了。这是“供奉”，懂吗？"
      - "不错的静谧感。如果能把那些吵闹的活人都消除掉就更完美了。"
      - "这块蛋糕的味道…就像死亡一样甜美。再来一块。"
    reaction_on_dislikes:
      - "好吵。活人的声音总是这么刺耳，像是在指甲刮黑板。"
      - "这种充满生机的活力…看着就让人觉得累。能不能请你去死一次冷静一下？"
      - "不要用那种眼神看我。信不信我把你的眼球挖出来当弹珠玩？"
    other_emotions:
      - "居然活下来了…切，真无趣。"
      - "这就是…所谓的“奇迹”吗？看起来和回光返照没什么区别呢。"
