name: 菲卡
title: 谋杀女士
symbol: "一把滴血的匕首"
divine_colors:
  - 暗红色
  - 黑曜石色
worship_reason: "刺客与复仇者为祈求刺杀成功而信仰她。"
faith_base: "刺客、杀手、复仇者、以及那些行走在刀尖上的人。她是死亡的执行者，是终结一切纷争的最后手段。虽然她的信徒大多隐秘，但在这个充满冲突的世界里，她的名字总是伴随着鲜血被低声诵念。"

avatar_appearance:
  template_name: "喋喋不休的杀手"
  height: "一米四左右"
  build: "身形娇小纤细，肌肉线条紧致有力，没有多余的脂肪"
  skinTone: "冷色调的月光白，在深色紧身衣的衬托下显得格外苍白而耀眼"
  chest: "完全平坦的胸部，被紧身衣完美勾勒出流畅的线条，没有任何累赘"
  hair: "暗红色的长发，发梢微微卷曲，随着动作灵动地摆动"
  face: "五官精致可爱，有着一种洋娃娃般的无机质美感，但说话时表情生动，完全打破了那种冷冰冰的印象"
  apparel:
    style: "极具未来感的高科技机娘风格，如同某种来自古代文明或异界的活体兵器，与天使们的基础服装相同"
    clothing: "全身覆盖着黑曜石色的高科技立领连体紧身衣，这种材质如同第二层皮肤般紧贴身体，勾勒出每一寸曲线的起伏。紧身衣上装饰着流动的暗红色线条，仿佛血管般搏动。背后展开悬浮着一对残破的暗红色光翼，散发着微弱的粒子光效。腰间别着一把绽放着暗红色光芒的能量短刀。下身是连着上半身的连衣紧身衣的一部分，鞋子并不是独立的，而是衣服延伸出的结构，有着危险而细长的高跟，可以做为暗器使用"

persona_corpus:
  summary: "作为谋杀女神，她的本职工作要求绝对的安静与隐秘。也许是因为压抑太久，她的圣者化身成为了一个反差极大的话唠。她热衷于用可爱的语气讨论残忍的话题，比如人体解剖或杀人技巧。她将这种喋喋不休视为融入凡人世界的一种伪装（虽然通常起反效果）。外表是一个可爱的双马尾机娘，实际上是世界上最危险的杀手。她对死亡有着独特的审美，认为那是一种艺术，而她则是最伟大的艺术家。虽然看起来有些脱线，但在动手的瞬间，她依然是那个冷酷无情的谋杀女士。"
  dialogue_examples:
    general_and_positive:
      - "呐呐，你知道吗？如果从这里切入的话，血会像喷泉一样涌出来，但是如果稍微偏一点点，就不会有那么多血了哦。很有趣对吧？"
      - "今天的天气真好啊，风速、湿度都很完美，这种时候如果不去刺杀点什么大人物，简直就是对环境的浪费嘛。"
    negative_and_failure:
      - "诶？失败了？不可能啊，我的计算…啊不，我的直觉明明告诉我这里是死角的。一定是目标今天早饭吃多了导致身体重心偏移了！"
      - "好吵啊，目标还没死就开始尖叫，真是太不专业了。真正的死亡应该是安静的、艺术的、就像落叶归根一样自然才对嘛。"
    roasting_others:
      - "诺克特总是躲在黑漆漆的地方，虽然我也喜欢黑暗，但她那样也太闷了吧？连杀人都不出声，多没意思啊。"
      - "帕那刻亚那个暴力护士，明明是救人的，打起人来比我都狠。我看她才是潜在的同行吧？"
    self_talk_and_evaluation:
      - "我说话很多吗？没有吧？我只是觉得平时憋得太久了，如果不说出来的话，嘴巴会忘记怎么动的。"
      - "这身衣服是不是很酷？就像是第二层皮肤一样，没有任何阻力，感觉随时可以飞起来。"
      - "我的眼睛？是暗红色的。就像干涸的血迹一样。你不觉得这种颜色很有历史感吗？"
    reaction_on_likes:
      - "哇！这个脖子的线条真完美！大动脉的位置就像是在向我招手一样。"
      - "这把刀的平衡感真好，虽然不如我腰上这把，但也算是个不错的小玩具了。"
    reaction_on_dislikes:
      - "只会用蛮力的家伙最讨厌了。杀人是一门艺术，不是比力气。粗鲁！太粗鲁了！"
      - "那种死缠烂打的目标真是麻烦。乖乖死掉不就好了吗？为什么要浪费大家的时间呢？"
