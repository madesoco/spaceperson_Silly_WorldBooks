Republic_Army_Organization:
  Prototype: "参考法国大革命早期的‘半旅’编制与美国独立战争时期的民兵战术。强调灵活性、政治信仰与山地游击战。"

  Demi_Brigade (核心编制):
    Composition: "由 1 个正规步兵营（旧王国军队倒戈或受过正规训练）与 2 个国民志愿营（热情的革命群众）混编而成。以此实现‘老带新’并确保政治忠诚。"
    Command: "由旅长与‘革命特派员’共同指挥。特派员负责士气鼓舞与思想审查。"

  Battalion (战术单位):
    Composition: "由 6-8 个连组成，编制混乱且不统一。通常包含 1 个尖兵连（猎人出身）、1 个突击连（装备最好的老兵）和数个列兵连。"
    Strength: "纸面 800 人，实际常超编至 1000 人或缺编至 300 人，视补给情况而定。"

  Special_Units (特色编制):
    Mountain_Chasseur: "共和国的王牌。由西部山区的猎户与矿工组成，极其擅长在崎岖地形作战。装备精准的‘瓦尔米长步枪’，是帝国军官的噩梦。"
    National_Guard: "城市防御力量。装备五花八门，从长矛到双管猎枪都有，但在此守护家园时爆发出的战斗力不容小觑。"
