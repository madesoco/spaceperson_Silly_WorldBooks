Federation_Army_Organization:
  Prototype: "参考拿破仑时期英军，强调射击纪律与防守反击，融入雇佣兵体系与金钱的力量。"

  Regiment (行政单位):
    Note: "在联邦，‘团’通常指代某个家族或佣兵团的长期编制，如‘科伦坡第60团’。兵力不固定，可能只有1个营，也可能有多个。"

  Battalion (战术核心):
    Composition: "由 10 个连组成：1 个掷弹兵连（右翼），1 个轻步兵连（左翼），8 个营属步兵连（中央）。"
    Strength: "编制约 1000 人，但实际战场上因雇佣兵的流动性，常在 500-800 人之间波动。"

  Company_Types):
    Center_Company:
      Role: "排枪射击与阵地防守。"
      Equipment: "斯福尔扎 1740 式步枪，54 式刺刀。强调射击速度而非精度（联邦更推崇‘泼水’战术）。"
      Tactic: "擅长使用两排阵型，最大化火力输出。"

    Light_Company:
      Role: "散兵骚扰与掩护主力。"
      Equipment: "部分装备斯福尔扎 1740，但精锐（如‘来复枪团’）会装备昂贵的进口线膛枪或梅林 1753。"
      Personnel: "常由半精灵或视力极佳的异族雇佣兵担任。"

  Special_Units:
    Tank_Platoon: "联邦独有的重型单位。每个主力步兵师会配属一个由 3-5 辆‘早期蒸汽坦克’组成的独立排，作为移动掩体和火力点。"
    Foreign_Legion: "相当于英军中的 德意志军团。由亡灵、矮人甚至流亡的苍白精灵组成的独立营，战斗力极强，装备混乱但致命。"
    Artillery: "量少但质优。每个旅只配属 1 个炮兵连，但通常拥有最新的炼金弹药。"
