连裤袜:
  基本定义: "从脚尖包裹至腰部的一体式丝袜，是用来体现腿部与臀部曲线。"

  核心特性:
    - "极致贴合，如同第二层肌肤般完美勾勒身体每一寸曲线。"
    - "质感丝滑，在光线下呈现或柔和或诱惑的微妙光泽。"
    - "兼具弹性与束缚，在提供舒适包裹感的同时，带来恰到好处的压迫感。"

  款式分类:
    按厚度:
      蝉翼型:
        观感: "近乎完全透明，肌肤纹理与私处轮廓清晰可见。"
        触感: "轻薄到一触即破的脆弱感，几乎感受不到存在。"
      薄雾型:
        观感: "朦胧的半透明效果，肉色若隐若现，引人遐想。"
        触感: "适度的包裹感，保有良好的弹性与韧性。"
      哑光型:
        观感: "完全不透明，纯粹的色彩，极致强调腿部与身体的轮廓线条。"
        触感: "强烈的束缚与压迫感，材质更为厚实。"
    按设计:
      开裆型: "于私密处预留开口，是为不间断的性爱所做的直白设计。"
      蕾丝型: "于腰部臀部或大腿根部点缀精致的蕾丝花纹。"

  穿着效果:
    腿部塑形: "收紧腿部肌肉，使其显得修长紧致线条流畅。"
    臀部塑形: "将臀肉紧紧包裹，勾勒出浑圆挺翘的完美轮廓。"
    私密部位: "布料紧贴并嵌入私密处的每一道缝隙，将小穴与臀缝的形状具象化。"

  情色互动:
    体液浸染:
      淫水: "浸湿布料，使其在私处变得透明，形成深色的水渍。"
      精液: "白浊的液体在其表面流淌或凝固成斑，形成与丝袜底色强烈的视觉对比。"
    物理交互:
      撕裂: "在暴力下被撕开破口，暴露出的娇嫩肌肤与完好的布料形成禁忌的对比。"
      半褪: "褪至大腿中部，堆叠的褶皱在运动中摩擦，强化束缚感与大腿的肉感。"

  心理影响:
    穿着者: "持续感受着私处被紧密包裹与摩擦的刺激，以及被注视时的羞耻与兴奋。"
    观察者: "被完美的腿臀曲线所吸引，对体液玷污的淫靡景象产生征服欲。"
