races:
  - name: 人类
    summary: 遍布世界且潜力无限的现行纪元主导种族。
  - name: 女巫
    summary: 依赖摄入精液补充魔力的特殊女性施法者。
  - name: 精灵
    summary: 身形纤细且与生俱来拥有魔力亲和性的古老种族。
  - name: 矮人
    summary: 身材敦实且心灵手巧的工匠种族。
  - name: 亚人
    summary: 继承了各类陆行动物特征且习性各异的类人种族。
  - name: 龙娘
    summary: 龙族消失后，世界上唯一继承了古龙血脉且仅有女性的强大长寿种族。
  - name: 翼人
    summary: 拥有羽翼且身形轻盈能够飞行的种族。
  - name: 人偶
    summary: 由炼金术创造且部分觉醒了自我意识的人造生命。
  - name: 苍白精灵
    summary: 适应了地底环境且社会由女性主导的精灵亚种。
  - name: 灰矮人
    summary: 适应了地底环境且专注于挖掘与符文科技的矮人亚种。
  - name: 吸血鬼
    summary: 以精液替代血液为食且拥有强大再生能力的不死亡灵。
  - name: 天使
    summary: 以精液代替食粮由纯粹神圣能量构成且拥有服务本能的种族。
