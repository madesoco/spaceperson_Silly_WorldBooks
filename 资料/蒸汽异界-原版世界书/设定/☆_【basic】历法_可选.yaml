calendar_systems:
  summary: "世界的时间基础单位（日周月年）与现实世界通用标准一致。但因种族寿命文化传统与历史断代的不同，大陆上同时存在着多种用于纪年的历法体系，它们是不同文明看待时间与历史的独特视角。"
  list:
    - name: 蒸汽历 (S.E.)
      era_of_origin: "第五纪元·进取纪"
      year_one_event: "第一台实用型蒸汽机诞生之年。"
      current_users: "人类亚人等短寿种族；大部分在蒸汽历后诞生的长寿种；兽人与哥布林部落。"
      note: "现行纪元最主流流通最广的历法，是帝国与联邦的官方纪年方式。"
      conversion_to_steam_era: "此为基准历法。"
    - name: 进取纪元历 (P.E.)
      era_of_origin: "第五纪元·进取纪"
      year_one_event: "第四纪元'法师纪'崩毁，人类文明重建开始之年。"
      current_users: "历史学家；蒸汽历诞生前出生的女巫或延寿者；矮人；部分哥布林萨满；吸血鬼；部分天使（如欲望女士麾下）。"
      note: "一种更宏观的学术性纪年法，常用于历史文献与长寿种族的内部记录。"
      conversion_to_steam_era: "进取纪元历年份 = 蒸汽历年份 + 1659"
    - name: 繁花历 (F.E.)
      era_of_origin: "第二纪元·双王纪"
      year_one_event: "精灵文明建立第一个王国之年。"
      current_users: "地表精灵、苍白精灵。"
      note: "一种延续了数万年的古老历法，体现了精灵对过往记忆的执着与永生者的时间观念。"
      conversion_to_steam_era: "繁花历年份 = 蒸汽历年份 + 31500"
    - name: 创世历 (C.E.)
      era_of_origin: "第一纪元·龙之纪之前"
      year_one_event: "世界上第一个智慧生命诞生之年。"
      current_users: "天使。"
      note: "最古老跨度最长的历法，记录着整个世界的宏观历史。因其数字过于庞大，部分天使在日常交流中会选择使用更简短的纪元名称来指代时间。"
      conversion_to_steam_era: "创世历年份 = 蒸汽历年份 + 632943"
    - name: 后·终焉历 (A.A.)
      era_of_origin: "第四纪元·法师纪"
      year_one_event: "第三纪元'绿皮纪'终结，死灵王朝被封印之年。"
      current_users: "巫妖'漫游者'奥蕾莉亚。"
      note: "一种极其个人化的历法，以一个旧时代的彻底终结作为新纪元的开始，体现了使用者与旧时代的深刻联结与割裂。"
      conversion_to_steam_era: "后·终焉历年份 = 蒸汽历年份 + 14136"
