name: "怪物"
monster_catalogue:
  introduction: "以下所列举的仅是米拉比里斯大陆上无数威胁中的一部分，作为冒险者旅途的参考。世界的阴影之中，潜藏着更多未被记录的奇异与恐怖，如北境冻土的冬狼，或藏匿于山脉深处的巨人。"
  categories:
    - category: 古代实验产物
      description: "源自过往纪元，由失落的魔法或禁忌的炼金术所创造的生命形态，如今作为失控的遗产游荡在废墟之间。"
      list:
        - name: 史莱姆
          description: "法师纪元炼金实验失败的无定形副产物，能以酸性黏液腐蚀并吞噬一切有机物。"
        - name: 狮鹫
          description: "第二纪元精灵王国的空之守护者，如今退化为盘踞在山峰地带的凶猛飞行掠食者。"
        - name: 奇美拉
          description: "法师纪元的魔法造物，一部由多种生物拼接而成的活体战争机器，能同时运用烈焰剧毒与蛮力。"
        - name: 眼球怪
          description: "来自异界的魔法侦察单位，其复数眼梗能射出蕴含不同负面魔力的射线，剥夺对手的行动与知觉。"
        - name: 肉身魔像
          description: "死灵王朝早期的实验造物，由不同生物的尸块拼接而成，是力量巨大且不知疼痛的初级构装体。"

    - category: 魔法变异生物
      description: "因长期暴露在高浓度魔力区域，或受到强大法术辐射而形态异变的生物，其天性被不凡，更具攻击性。"
      list:
        - name: 魔化野狼
          description: "在低语森林等魔力污染区活动的野狼，体型异常庞大，部分头狼能吐出冰霜或火焰。"
        - name: 陆行鸟
          description: "性情暴躁的大型走禽，其双腿的踢击力量足以踢碎冒险者的盾牌与骨骼。"
        - name: 仙人掌怪
          description: "伪装成东方沙海常见植物的伏击者，能在一瞬间从体内射出成百上千根尖锐的硬刺。"
        - name: 冬贝利
          description: "提着灯笼与厨刀的矮小身影，每一次攻击都蕴含着积累的怨恨，能造成无视防御的致命伤害。"
        - name: 锈蚀怪
          description: "以金属为食的异形昆虫，其触须的碰触能瞬间腐蚀掉最精良的武器与盔甲。"

    - category: 天生敌对生物
      description: "世界的原生居民，它们的生存法则与智慧种族完全对立，是文明开拓道路上永恒的障碍。"
      list:
        - name: 地行龙
          description: "龙族的劣化远亲，不会飞行但皮糙肉厚，是盘踞在龙脊山脉，威胁南方商路的强大生物。"
        - name: 石化蜥蜴
          description: "其凝视能将血肉之躯化为石头，是地底世界与古代遗迹中最致命的陷阱之一。"
        - name: 巨型蜘蛛
          description: "潜伏于幽暗森林与地底洞穴的捕食者，以坚韧的蛛网构筑陷阱，用麻痹性的毒牙终结猎物。"
        - name: 鸟身女妖
          description: "盘踞在西部破碎之地峡谷与海岸线的怪物，她们的歌声能魅惑心智，将旅人引向死亡。"
        - name: 穴居攫怪
          description: "隐藏在地底世界洞穴顶部的伏击者，用长而黏滑的触手将猎物无声地拖拽至黑暗中分食。"

    - category: 不死生物
      description: "被死灵法术或强烈负面能量所束缚的死者，是死灵王朝遗迹与古战场上永不消散的阴影。"
      list:
        - name: 骷髅兵
          description: "死灵王朝遗迹中最基础的骸骨步兵，无畏无惧，常以庞大的数量淹没入侵者。"
        - name: 僵尸
          description: "在悲泣沼泽等古战场上游荡的腐烂尸骸，其攻击附带着能传播瘟疫的污秽之力。"
        - name: 食尸鬼
          description: "以尸骸为食的敏捷不死生物，其利爪能造成麻痹效果，常成群出没于死灵王朝的外围区域。"
        - name: 幽灵
          description: "古战场士兵的怨念集合体，能穿透物理屏障，通过吸取活物的生命力来维系自身存在。"
        - name: 吸血衍体
          description: "被吸血鬼初拥失败的产物，保留了对血液的渴望却没有理智，是狂乱的杀戮野兽。"
