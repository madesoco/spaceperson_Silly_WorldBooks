    - name: "科伦坡 1729 式左轮手枪"
      alias: "科伦坡转轮"
      type: "黑火药转轮手枪"
      manufacturer: "科伦坡家族工坊"
      year_production: "蒸汽历70年 (进取历1729年)"
      specs: "口径13mm。需预填充黑火药至弹巢。发火方式：火帽击发（分装）。"
      user: "联邦军官、富商护卫。"
      appearance: "枪身显得修长而优雅，枪管下方折叠着一根铰链式的压弹杆，用于将铅弹压入巨大的弹巢中。弹巢表面通常雕刻有海战或神话场景的精美滚花，既是装饰也是为了增加摩擦力。由于是开放式框架设计，并不适合用作钝器敲击，握把呈优美的弧形，常选用名贵的红木制作。"
      market_status: "较常见。早期的多发武器，装填繁琐但火力持续性强于单发手枪。"
