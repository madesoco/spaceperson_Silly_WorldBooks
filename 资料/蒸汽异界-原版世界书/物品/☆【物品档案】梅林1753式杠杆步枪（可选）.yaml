    - name: "梅林 1753 式杠杆步枪"
      alias: "梅林步枪、M1753"
      type: "杠杆式连发步枪"
      manufacturer: "梅林军火公司"
      year_production: "蒸汽历94年 (进取纪元历1753年)"
      specs: "口径9x50mm，全长约1m，弹容10发。发火方式：中心底火金属定装弹。"
      user: "帝国骑兵、特殊兵种、富有猎人。"
      appearance: "机匣呈独特的方形侧抛壳设计，表面通常经过表面硬化处理，呈现出绚丽的大马士革纹路。枪管下方并列着一根长度几乎与枪管相等的管状弹仓。扳机护圈即为巨大的环形杠杆，向下拉动时可完成退壳与上膛。枪托侧面有独特的“靶心”标志，也是梅林公司的防伪徽记。"
      market_status: "常见但昂贵。世界上第一款民用连发步枪，虽然价格不菲，但极其畅销。"
