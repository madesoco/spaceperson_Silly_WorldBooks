    - name: "斯福尔扎 1677 式火绳枪"
      alias: "77式火枪"
      type: "重型火绳枪"
      manufacturer: "斯福尔扎家族工坊"
      year_production: "蒸汽历18年 (进取历1677年)"
      specs: "口径28mm，全长2m。配有抵消后坐力的专用支架。发射铅弹。发火方式：火绳击发。"
      user: "城防民兵、低级佣兵、海盗。"
      appearance: "一支庞大而笨重的武器，枪管极长且壁厚惊人，甚至可以说是手持的小型火炮。枪托形状平直，几乎没有弯曲度，抵肩射击时需要极大的力量。枪身右侧有着蛇形的火绳夹，这在点燃时会像蛇一样落下接触药池。由于重量过大，其标配一根Y字形的木质独脚支架，支架底部包铁以便插入地面。"
      market_status: "极其廉价且泛滥。虽然技术落后了近一个世纪，但因其经久耐用且威力巨大（堪比手炮），依然在边境与海上大量流通。"
