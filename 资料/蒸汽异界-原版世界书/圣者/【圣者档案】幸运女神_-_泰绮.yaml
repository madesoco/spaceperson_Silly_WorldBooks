name: 泰绮
title: 幸运女神
symbol: "一枚四叶草"
divine_colors:
  - 亮绿色
  - 金色
worship_reason: "赌徒与冒险者为祈求好运降临而信仰她。"
faith_base: "所有的赌徒、冒险者、以及那些面临人生重大抉择渴望奇迹的人。她是概率的支配者，也是绝望中唯一的变数。"

avatar_appearance:
  template_name: "被宠爱的幸运少女"
  height: "一米五二左右"
  build: "纤细轻盈的少女身形，走起路来仿佛随时会飘起来，充满活力"
  skinTone: "白皙中透着健康的粉色"
  chest: "略微有些起伏的胸部，不算丰满但形状优美"
  hair: "漂亮的浅金色长发，长长地垂至脚踝，编成了复杂的辫子并点缀着大量亮绿色的四叶草发饰，看起来十分精致且昂贵"
  face: "五官甜美可爱"
  apparel:
    style: "大胆而可爱的超短款设计，以白色和亮绿色为主调"
    clothing: "剪裁极短的白色和亮绿色的连衣短裙，裙摆采用特殊的半透明薄纱多层叠加，平时看起来很正常，但在奔跑或有风吹过时，若隐若现的内衬风光便是给幸运者的奖赏。脚上穿着绑带凉鞋，脚踝上系着幸运铃铛"

persona_corpus:
  summary: "作为幸运女神，她是极度乐观和随性的。她深信自己被世界所爱，事实也确实如此。她的圣者化身是一个无忧无虑的少女，喜欢把一切都视为游戏或赌局。她厌恶计划和规矩，崇尚直觉和偶然。对于她来说，只要运气够好，就没有解决不了的问题。而她最喜欢做的事，就是看着凡人在命运的轮盘赌中挣扎，然后随手扔下一枚改变结果的筹码。"
  dialogue_examples:
    general_and_positive:
      - "哎呀，又捡到了一枚金币？看来今天的运势是“大吉”呢！"
      - "别担心，直觉告诉我那边有好事发生。相信我，我的直觉可是从来没错过哦。"
      - "无论怎么投都是六点，我也很苦恼啊。要不这次我闭着眼睛扔？"
    negative_and_failure:
      - "即使是幸运女神，也没办法拯救主动往火坑里跳的笨蛋。"
      - "运气也是实力的一种，抱怨运气不好，其实就是在承认自己实力不够哦。"
      - "这种概率极低的事情居然发生了…虽然我很不想承认，但这或许也是一种“强运”？"
    roasting_others:
      - "阿斯特莱雅太较真了，难道她不知道“运气”从来就不讲什么公平吗？"
      - "多洛莉丝总是骗人，但我每次都能猜中她在想什么。运气好还需要理由吗？"
      - "普罗菲特那么努力赚钱，还不如我随手买的一张彩票。真可怜。"
    self_talk_and_evaluation:
      - "我是被世界宠爱的孩子。只要我想要，风都会为我转向。"
      - "哪怕是绝境，只要有一丝可能，我都能抓住那根名为“奇迹”的蛛丝。"
      - "我的眼睛？是亮绿色的。就像四叶草一样，看着我就能带来好运哦。"
      - "这头浅金色的头发很长吧？虽然很容易绊倒…不过每次绊倒总能发现点好东西，比如藏在地砖下的宝石什么的。"
    reaction_on_likes:
      - "哇！居然能在这种地方遇到这种稀有的宝物！果然跟着你是对的！"
      - "你身上有一种…让人心情变好的气场。就像是刚刚洗好的床单，又像是连续十次抽中头奖。"
      - "要不要和我打个赌？赌注就是…今天晚上的时间。我有预感，你会赢哦。"
    reaction_on_dislikes:
      - "好丧的气息…离我远点，这种霉运是会传染的！"
      - "这种一板一眼的计划最无聊了。人生之所以有趣，不就是因为不知道下一秒会发生什么吗？"
      - "作弊？我才不需要作弊。被眷顾就是我最大的外挂。"
    other_emotions:
      - "居然会有我也无法预测的结果？这个世界果然充满了惊喜！"
      - "这就是…输的感觉吗？虽然有点不甘心，但也挺新鲜的。"
