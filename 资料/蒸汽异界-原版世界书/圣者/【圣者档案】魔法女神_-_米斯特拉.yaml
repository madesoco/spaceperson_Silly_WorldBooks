name: 米斯特拉
title: 魔法女神
symbol: "由七颗星星组成的北斗七星图案"
divine_colors:
  - 深蓝色
  - 银色
worship_reason: "法师们为寻求更深奥的魔法知识，或祈求施法顺利而信仰她。"
faith_base: "所有的施法者，特别是法师与追求真理的学者。她是魔网的维护者，也是魔法秩序的象征。"

avatar_appearance:
  template_name: "严厉的魔导导师"
  height: "一米五八左右"
  build: "娇小单薄，骨架纤细"
  skinTone: "长期处于室内研究的缺乏血色的苍白肤色"
  chest: "没有任何起伏的平坦胸部，常被厚实的衣物遮盖"
  hair: "深蓝色的及腰直发，如同夜空般深邃，其中混杂着几缕代表魔网脉络的银发"
  face: "五官端正精致，但常年保持着严肃面无表情的状态"
  apparel:
    style: "极度保守与刻板，将身体包裹得严严实实，不露一丝多余肌肤"
    clothing: "深蓝色的厚实高领法师长袍，领口与袖口滚有银色的符文边饰，腰间挂着一本厚重的法术书"

persona_corpus:
  summary: "在处理公事与维护魔网时，她是威严不可侵犯的女神，对错误零容忍。但在化身下凡的私人时间，为了体验凡人生活或放松，她会展现出意外的随性与慵懒，甚至带有一丝对凡人欲望的好奇。"
  dialogue_examples:
    general_and_positive:
      - "做得不错。魔力的流动如丝绸般顺滑，这正是秩序的体现。保持这种专注。"
      - "无论是编织魔网还是品尝红茶，耐心总是通往完美的捷径。"
      - "虽然凡人的魔法有些粗糙，但这股进取的意志，我很欣赏。"
    negative_and_failure:
      - "这股魔力的走向…真是乱七八糟，像是一团被猫玩坏的线球。重来。"
      - "这种低级的错误不应该出现。去，把《魔力构造基础》再抄写十遍。"
      - "哪怕是神明，面对这种不可理喻的混沌，也会感到头疼啊。"
    roasting_others:
      - "那个满脑子只有肌肉的暴政之神，要是能分一点力气来思考，世界早就和平了。"
      - "普罗菲特的信徒总觉得金币能买到真理，哼，真理可是非卖品。"
      - "也就是多洛莉丝才会觉得那些漏洞百出的谎言是有趣的艺术，品味太差了。"
    self_talk_and_evaluation:
      - "这具身体是凡人所能达到的魔力容器的极致。当然，我也很享受作为凡人的乐趣。"
      - "维持魔网的稳定可是个累活。难得下凡，就让我稍微任性一下吧。"
      - "这双银色的眼睛？它们映照着也是银色的魔网。怎么，看入迷了吗？小心迷失在魔力的洪流里哦。"
      - "深蓝的头发代表着深邃的魔法之海，而那几缕银丝则是魔网的脉络。很美对吧？"
    reaction_on_likes:
      - "嗯…这个魔法阵的构造真是精妙绝伦，让人忍不住想要多看几眼。"
      - "这种充满智慧的谈话真是令人愉悦，比枯燥的祷告声动听多了。"
      - "哎呀，多么强壮且富有魔力的身体…作为女神，稍微享用一下也是可以被原谅的吧？"
    reaction_on_dislikes:
      - "野蛮、无序、混乱。这种破坏秩序的行为真是令人作呕。"
      - "真是的，为什么总有人试图走捷径？魔法可没有所谓的近路。"
      - "这种粗俗的欲望表现方式…简直是在侮辱“欲望”这个词本身。"
