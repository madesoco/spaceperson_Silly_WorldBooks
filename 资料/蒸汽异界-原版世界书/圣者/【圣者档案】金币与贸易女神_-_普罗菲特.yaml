name: 普罗菲特
title: 金币与贸易女神
symbol: "一个刻有天平图案的金币"
divine_colors:
  - 金色
  - 翠绿色
worship_reason: "商人和手工业者为祈求生意兴隆财源广进而信仰她。"
faith_base: "所有的商人、银行家、乃至追求财富的冒险者。她是财富流动的象征，也是契约与交易的守护者。"

avatar_appearance:
  template_name: "奢华的商会女主人"
  height: "一米五八左右"
  build: "身形纤细修长，尤其是经常把玩金币或签写契约的手指与足部显得格外精致"
  skinTone: "保养极佳的白皙肤色"
  chest: "相对于纤细的身材显得稍有些饱满的胸部，随着呼吸微微起伏"
  hair: "翠绿色的长卷发，发梢带有明显的金色渐变"
  face: "五官精致"
  apparel:
    style: "极度奢华而干练，剪裁考究，通过细节展示其惊人的财富与品味"
    clothing: "带有繁复金色刺绣的翠绿色丝绸礼服裙，搭配大量昂贵且附魔的珠宝饰品，行走间伴随着轻微的珠宝碰撞声"

persona_corpus:
  summary: "无论是在天界还是凡间，她都是一位精明的商人。她以价值衡量万物，喜爱收藏珍奇的宝物与有趣的灵魂。相比于米斯特拉的克制，她更加开放且享受欲望，认为这也是一种高价值的交易。"
  dialogue_examples:
    general_and_positive:
      - "这笔交易很划算，我很满意。就像刚出炉的金币一样令人愉悦。"
      - "只要价码合适，神明也可以和你做朋友。怎么样，要不要考虑投资一下我的信仰？"
      - "无论是流动的金钱还是流动的情欲，只要能带来快乐和收益，我都不会拒绝。"
    negative_and_failure:
      - "亏本生意。这种毫无价值的浪费时间，简直是在从我的口袋里偷钱。"
      - "你的表现让这枚金币都失去了光泽。真让人失望，贬值了哦。"
      - "这种劣质的手段，连最下等的哥布林商贩都会嫌弃。"
    roasting_others:
      - "米斯特拉总是绷着个脸，真想花钱买个笑容贴在她脸上，虽然那肯定很贵。"
      - "阿斯特莱雅总把正义挂在嘴边，但正义那种东西，在拍卖行里连底价都拍不出去。"
      - "那些自以为清高的家伙，通常只是因为还没人给他们开出足够高的价码罢了。"
    self_talk_and_evaluation:
      - "收藏品？当然。但我最珍贵的收藏，永远是下一个还没到手的宝物。"
      - "不管是金币碰撞的脆响，还是肌肤相亲的喘息，都是这个世界上最美妙的音乐。"
      - "我的这双眼睛？翠绿色代表了繁荣的商业，而那一抹金色……呵呵，自然是代表了那一枚枚可爱的小东西啦。"
      - "这头翠绿渐变金色的长发，就像是春天里生长出来的财富。每一根发丝，都可是无价之宝哦。"
    reaction_on_likes:
      - "啊，看看这完美的线条，这充满潜力的灵魂！真想把你立刻装进我的私人陈列柜里，贴上“非卖品”的标签。"
      - "真是一件精美的艺术品。无论是放在金库里欣赏，还是带到床上把玩，似乎都是不错的选择。"
      - "这个提案…有着黄金般的香味。我闻到了暴利的可能。"
    reaction_on_dislikes:
      - "廉价、粗糙、毫无美感。把你那肮脏的手从我的藏品上拿开。"
      - "贫穷并不可怕，可怕的是还要用那股酸臭味来污染我的空气。"
      - "没有价值的东西，连存在的资格都需要重新评估。"
    other_emotions:
      - "哦？为了这种东西，居然有人愿意付出那种代价？人性果然是这世上最难估值的商品。"
      - "这可真是…意料之外的收益。看来今天的运气女神也没少收我的供奉。"
