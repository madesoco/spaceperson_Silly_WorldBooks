race_name: 天使
summary: "由神明直接创造的万能助手与神国护卫。她们是外貌优美、能力强大的异界种族，以精液代替传统食粮。其社会虽有明确的职责阶层划分，但个体间人格完全平等。她们通常居于神国，仅在凡间出现重大危机时才会降临，是神明意志在地面的延伸。"

physical_traits:
  appearance: "外貌精致优美，拥有作为力量源泉与敏感带的光翼与光环。阶位越高，光翼数量越多，光环越华丽。"
  lifespan: "没有寿命限制，不会自然衰老或死亡。"
  height_range:
    min: "1.2米"
    max: "1.8米"
  diet: "不进食凡俗食物，仅靠直接摄入魔力或精液来维持活动与力量。"

attire_and_style:
  general_concept: "强调‘神造兵器’与‘机娘’风格。其着装并非织物，而是由神力固化的能量场与高科技合成材料构成，展现出神圣、科幻与肉感并存的异质美。"

  base_suit (素体):
    material: "类似液态乳胶的高科技半透明材质，紧紧包裹全身，如同第二层皮肤。"
    visual: "在大腿、腹部、胸口等位置呈现半透明质感，隐约可见内部流动的发光能量管路（模拟血管）。在战斗或兴奋状态下，管路会高频闪烁。"

  armor_components (外挂装甲):
    style: "磁悬浮或能量连接的流线型浮游装甲板，非穿戴式。"
    layout:
      chest: "覆盖心口能量核心的流线型胸甲，下方敞开以展示身体曲线。"
      shoulders: "巨大的浮游肩甲，兼具武器挂载点与力场发生器功能。"
      hips: "侧裙甲由可活动的金属翼片组成，兼具保护与飞行平衡翼的功能。"
      legs: "膝盖以下为全覆盖式重型腿甲，脚部为类似起落架的高跟结构，离地时喷射光焰。"

  divine_features (神性特征):
    halo: "头顶悬浮的全息数据流光带，根据职能显示不同的符文或几何图形。如果被触摸到会十分敏感"
    wings: "背部装甲延伸出的能量喷射口，喷射光粒子形成羽翼。平时收束为光带，战斗时爆发性展开。如果被触摸到会十分名"

  variants (常见变体):
    justice_type (正义系):
      color: "白金配色，光翼为纯金光辉。"
      style: "线条硬朗规整，充满秩序感。头顶光环呈皇冠状几何结构。手持光束巨剑、巨镰或天平能量盾。"
    desire_type (欲望系):
      color: "暗紫与黑曜石配色，光翼为绯红粒子流。"
      style: "素体暴露度极高，关键部位仅由黑色皮带状装甲束缚，带有拘束具风格。装甲边缘带倒刺，武器为能量鞭或利爪。"

abilities_and_traits:
  core_ability:
    - "基础身体与魔法能力普遍高于绝大多数凡人种族。"
    - "能够熟练运用通用魔法与精液魔法。"
    - "飞行能力（依靠光翼推进）。"
  reproduction: "无法自然繁衍。新生的天使由神明直接创造，或由最狂热信徒的灵魂在神国中重塑而成。"
  racial_quirk: "将精液视为一种美味的高能饮品，且能品尝出不同种族精液的独特'风味'。"

society_and_culture:
  distribution: "绝大多数居于神国，凡间仅有浮空城'天穹之眼'作为前哨站。极少数个体可能流落凡间。"
  social_structure: "存在九个阶层（天使至炽天使），但这仅代表职责与能量输出功率的不同，人格地位完全平等。"
  hierarchy:
    - rank: "下三级 (天使/大天使/权天使)"
      wings: "一对"
      role: "基础作战、小队指挥、神国管理。"
    - rank: "中三级 (能天使/力天使/主天使)"
      wings: "两对"
      role: "圣地戍卫、奇迹执行、内部秩序。"
    - rank: "上三级 (座天使/智天使/炽天使)"
      wings: "三对"
      role: "记录通讯、最终防御、神侧侍奉。"
