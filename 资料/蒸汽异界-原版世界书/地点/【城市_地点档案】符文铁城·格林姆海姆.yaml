  "summary": "一座在地底深处由三个灰矮人氏族共同统治的符文科技之城。整座城市由巨大的钟乳石与石笋直接雕刻而成，呈现出粗犷而威严的几何美学。这里是纯粹符文技术的圣地以其出产的强大魔导装备闻名于世。城市的运转依赖于数量庞大的兽人与哥布林奴工，而灰矮人则以其极度排外与狡诈的商业信誉，维持着与地表世界危险而又利润丰厚的贸易关系。",
