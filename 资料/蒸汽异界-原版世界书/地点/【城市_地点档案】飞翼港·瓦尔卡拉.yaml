  "summary": "帝国东南方的钢铁与温泉之都，一座在与贸易联邦的对峙中迅速崛起的军港。哥特式的防御工事与巴洛克风格的温泉会馆并存，背靠的山脉中隐藏着帝国最新的空艇制造基地与古老的矮人城镇。这里是帝国南方舰队的摇篮，也是通往东方翡翠迷宫的新航路起点，空气中交织着海水的咸腥机械的油耗与硫磺的暖香，充满了机遇冲突与享乐主义。",
