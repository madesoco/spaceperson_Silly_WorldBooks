  "summary": "贸易联邦的享乐天堂与殖民前哨，一座由比安奇家族统治的华美水都。无数洛可可风格的宫殿与桥梁构建在星罗棋布的岛屿之上，贡多拉在迷宫般的水道中穿行。这里是联邦最自由也最混乱的城市，帮派火拼是报纸的头条，‘死人乐透’是全民的消遣。作为通往远西新大陆的唯一门户，冒险的机遇与一夜暴富的梦想吸引着全大陆的投机者，构成了这座城市浮华危险而又充满无限可能的独特魅力。",
