---
种族-血族:
  概述: 由死灵法师创造的女性不死生物，以氏族和派系划分社会，存在严格的代数血脉限制
  别称: 夜之贵族、绯月眷属
  生理特征:
    概述: 初拥后外貌定格于完成时/巅峰期
    肤色: 肤色冷白、体温偏低
    寿命: 真祖永生；血脉代数越高寿命越短，后代需沉眠续命
    形态变化:
      - 常态: 保持生前容貌的完美化，瞳色多为红、金或银色
      - 战斗态: 瞳孔转为猩红竖瞳，犬齿伸长，指甲锐化，血气外溢
  能力与特质:
    核心能力:
      - 使用精液魔法(自称液体魔法)
      - 夜视，操控蝙蝠或自身变形为蝙蝠
      - 操控不死生物或转化凡人与尸骨
      - 通过“初拥”制造后代或通过简化仪式制造食尸鬼
    种族特性:
      - 代数衰减: 能力与代数成反比，传承至16代为止，17代后裔将失去理智
      - 代数提升: 低代数血族可被更高代数者再次初拥以提升代数和力量
    弱点: 除真祖外，皆惧怕阳光，暴露在阳光下会导致防御力下降甚至死亡
  社会与文化:
    分布: 总数不超过千人
    自称: 成员自称“血族”，厌恶“吸血鬼”这一蔑称；被“初拥”者自称“眷属”
    社会结构: 以议会氏族制为核心，共十三个氏族，对应十三位真祖
    政治派系:
      - 秘党: 7个氏族，保守派，渗透并掌控阿尔比恩帝国地下网络
      - 叛党: 4个氏族，激进派，争取自由平等，是贸易联盟的主导家族
      - 隐世会: 2个氏族，中立派，最早脱离控制，对同族斗争持旁观态度
