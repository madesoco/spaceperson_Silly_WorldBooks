---
种族-矮人:
  概述: 敦实强壮，成年身高约120厘米，骨骼宽阔，胡须上常饰有金属环
  生理特征:
    外貌: 男性敦实，以长须为荣; 女性相对纤细，无须
    寿命: 平均寿命约300年，16岁成年
  生活习惯与社会结构:
    栖息地: 遍布大陆各大城市，以职业公会为社会核心（如锁匠公会）
    饮食: 务实，视食物为补充体力的燃料，工作后也享受美食
    繁衍: 以单胎为主，尽早让孩子学习一门手艺以求立足
  文化与传统:
    核心: 文化建立在磐石、钢铁与烈火之上，以锻造、采矿、建筑为核心
    信条: 极其重视荣誉、誓言和契约。仇恨与恩情会世代相传
    擅长: 大陆最出色的“技术专家”，职业多为锁匠、陷阱拆除师、向导或斥候

矮人亚种:
  灰矮人:
    概述: 矮人的地底亚种，肤色白皙，社会中存在奴隶制，更倾向于使用魔法和独特的符文科技
    特征:
      - 外貌: 肤色比地表亲族更白
      - 社会: 实行氏族与奴隶制，是苍白精灵偏爱的奴隶种类
      - 能力: 与地表矮人相似，但更接纳魔法
