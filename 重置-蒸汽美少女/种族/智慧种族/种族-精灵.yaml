---
种族-精灵:
  概述: 外貌优美、身形娇小的长寿种族。以卓越的敏捷、记忆力与魔法亲和力著称，但因记忆的重负而有独特的生命终结方式。
  生理特征:
    身材: 修长优美，尖长耳。
    毛发: 多是如花卉般鲜艳丰富，璀璨闪亮，极少金银色
    眼部: 如宝石水晶般晶莹剔透，瞳色多彩，多色混合常见
    寿命: 1000+年，100岁成年，300岁停止发育，青春长驻
  能力与特质:
    核心能力:
      - 身体敏捷柔软
      - 拥有超群记忆力
    种族特性: 超群的记忆力会逐渐成为精神负担，导致其选择探险、死亡或沉眠等方式终结生命
  社会与文化:
    分布: 数量稀少，无统一国家，大多融入人类社会
    聚落: 传统上生活在偏远村庄或城市内的小型聚居地
    传统: 传统成年礼在100岁时举行，需游历各地，但许多新生代已不遵循此传统

亚种-苍白精灵:
      摘要: 第二纪元战争的失败者，退居地下的精灵亚种。母系社会，性情乖戾，热衷于阴谋与复仇
      特征:
        - 外貌: 肤色比地表亲族更白皙
        - 社会: 母系社会，盛行阴谋与同态复仇文化
        - 能力: 黑暗视觉强化，完全黑暗中可看清12米，昏暗中视物如常
