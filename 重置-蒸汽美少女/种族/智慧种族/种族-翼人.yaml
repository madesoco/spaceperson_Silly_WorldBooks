---
种族-翼人:
  概述: 背后生有功能性羽翼(翼展3-5米)，身材匀称，气质出尘
  毛色与瞳色: 羽翼、体毛偏向纯色及浅色系，偶有杂色。眼瞳偏向明亮浅色系、金属色、宝石色
  生理特征:
    外貌: 身形纤细修长，外貌华美，拥有可以飞行的翅膀。
    寿命: 约150-200年，20岁成年
  能力与特质:
    核心能力:
      - 天生具备飞行能力
      - 身体柔软度和敏捷度堪比精灵
      - 视力极佳
  社会与文化:
    分布: 大陆数量较少，主要分布在山脉和高原地区
    聚落: 在西方诸王国中建立了一个山地国家，同时也在山脉中有氏族部落
    个性: 普遍自由奔放，热爱自由，追求冒险
