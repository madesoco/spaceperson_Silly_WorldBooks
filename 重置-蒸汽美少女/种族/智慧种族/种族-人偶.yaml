---
种族-人偶:
  概述: 法师根据自身审美与需求创造的人造构造体，功能与外形多样，其运作高度依赖魔力供给
  生理特征:
    外貌: 具备类人形态，具体形象由创造者决定
    寿命: 依赖魔力补充可永生，失去魔力后，廉价材质会迅速崩解
    身高范围: 从微型到巨型不等，无固定范围(0.1米至5.0米)
    能量来源: 需持续补充魔力，部分型号可通过精液转化或直接驱动来获取
  能力与特质:
    核心能力: 作为法师助手，执行被设定的功能
  社会与文化:
    分布: 现存人偶多为进取纪元创造；大量法师纪元的人偶埋藏于遗迹中，部分仍激活着防御系统
    社会结构: 作为被创造物，无独立社会结构
  亚种分类:
    无自我意识:
      - 助手人偶: 执行需要长期人力的基础任务
      - 作战人偶: 内置战斗程序，通过预设脚本或直接操控进行战斗
      - 储藏人偶: 内部储存大量资料，作为移动图书馆使用
      - 性爱人偶: 为满足创造者的性欲而生，可附加其他功能
    有自我意识:
      - 独立人偶(爱丽丝人偶): 在长期运作中自发产生意识的人偶，获得意识的同时会觉醒性爱功能，成为可通过精液获取魔力的女巫
      - 悠久人偶: 通过填入活人灵魂而获得意识的人偶，因灵魂特性可永久运转，无需额外魔力。一般来自邪恶施法者制造，或作为法师纪元的一种刑罚
