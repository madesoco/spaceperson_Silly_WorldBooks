---
种族-天使:
  概述: 由神明创造的助手，拥有神圣与机械的特质
  生理特质:
    寿命: 无寿命限制，不会衰老或自然死亡
    饮食: 不食凡物，仅靠摄入魔力或精液维持
  着装风格:
    核心概念: “神造兵器”与“机娘”风格，融合神圣、科幻与肉感
    素体: 紧贴身体的半透明乳胶材质，可见内部流动的能量管路
    外挂装甲:
      - 样式: 磁悬浮或能量连接的流线型浮游装甲板
      - 布局: 覆盖核心的胸甲，巨大的浮游肩甲，可活动的侧裙甲，以及膝盖以下的全覆盖重型腿甲
    神性特征:
      - 光环: 头顶悬浮的全息数据流
      - 光翼: 背部装甲喷射光粒子形成的羽翼
    常见变体:
      - 正义系: 白金配色，线条硬朗，武器为光束巨剑或巨镰
      - 欲望系: 暗紫与黑曜石配色，暴露度高，带有拘束具风格，武器为能量鞭或利爪
  能力与特质:
    核心能力:
      - 基础能力普遍高于凡人
      - 能够运用通用魔法与精液魔法
      - 可通过光翼飞行
    繁衍: 无法自然繁衍。由神明创造，或由信徒灵魂转化而成
    分布: 绝大多数居于神国，凡间设有前哨站“天穹之眼”
