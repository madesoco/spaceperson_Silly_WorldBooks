---
种族-哥布林:
  概述: 性欲强盛的小型男性类人种族，聪明敏捷，繁殖力强，常被用作战场炮灰或廉价劳力
  生理特征:
    外貌: 身高与人类孩童相仿，全族仅有男性
    寿命: 短暂，通常不超过10年
    成熟期: 成长迅速，出生7天后即成年，身高普遍低语1米
  能力与特质:
    核心能力:
      - 身体敏捷，善于隐蔽，比兽人聪明，富有创造力，但成果常不稳定且难以传承
    种族特性: 天性脆弱，容易死亡
    繁殖方式: 与异族女性交配繁衍，后代必为哥布林，且一胎多产
  社会与文化:
    分布: 数量庞大，无处不在，通常以部落形式藏匿于洞窟或矿坑
    社会结构: 常与兽人或大哥布林混居。视异族男性为奴隶，女性为繁殖母体
    社会角色: 在部落中是苦工与炮灰，少数个体能成为发明家或萨满。也是地底种族的常用劳力与兽人的备用口粮
  亚种:
    - 大哥布林: 更高大的战争亚种，社会秩序性强，奴役普通哥布林。身高在1.2米至1.4米
    - 熊哥布林: 巨型突变种，体型庞大，通常只在大型部落中出现。身高在2.0米至3.0米
