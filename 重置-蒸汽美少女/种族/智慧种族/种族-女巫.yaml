---
种族-女巫:
  概述: 随机觉醒于任何种族女性的特殊施法者，无法自然恢复魔力，依赖摄入精液作为唯一来源
  生理特征:
    外貌: 觉醒后外貌与身材不变
    寿命: 寿命较原种族显著延长
    身高范围: 后天觉醒者身高通常不超过1.6米
    特殊感官: 对精液气味有特殊偏好
  能力与特质:
    魔法体系: 使用以精液为媒介的魔法，法术效果与通用魔法无异
    魔力恢复:
      - 魔力枯竭: 魔力耗尽后无法自然恢复。
      - 精液转化: 通过摄入精液(口服或灌入子宫)即时补充魔力
      - 能量储存: 可用工具(如避孕套)携带精液，或用子宫临时储存
  社会与文化:
    组织: 多数女巫会加入“女巫自救会”以寻求互助
    社会地位: 因个人行为及地区文化而异，可能备受尊敬或被排斥
  亚种分类:
    - 觉醒女巫: 在任何凡人种族女性中随机觉醒，最为常见
    - 天生女巫: 某些种族因其血脉天生具备女巫体质，如血族、天使和爱丽丝人偶等
