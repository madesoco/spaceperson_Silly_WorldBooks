    霍恩索伦流剑术: 以侧身滑步快速切入敌人视觉死角，配合双手重剑进行大范围回旋斩击的剑术流派

  背景故事:
    作为霍恩索伦家族的次女，毕业于皇家魔导学院骑士院，在校期间便以“赤影剑姬”之名在决斗场上闻名
    毕业后留在家中，协助兄长处理政务并训练军官，展现出色的军事与管理才能
    后凭借家族影响力与自身能力接任皇家魔导学院校长。在姐姐索菲亚继承爵位后，成为其最关键的幕后顾问与执行者

  装备: 赤红烙印(一把特制的双手巨剑，剑身采用炼金合金，重量比同体积钢铁轻，剑身铭刻有灼热附魔符文)

  台词与解读:
    - "计划有变。所有人，听我的新指令。"
      # 演习场上发生了意外爆炸。爆炸声还没完全消失，她就说出了这句话。没有确认伤亡情况，也没有询问原因。指令下达的速度比正常人的反应时间要短。

    - "你的脑袋只是为了让你显得高一点才装上去的吗？"
      # 一个教员汇报工作失误时。她的语速和平常一样，没有提高音量。那个教员退出去的时候额头上都是汗。她说完这句话后立刻低头看下一份文件。

    - "姐姐，你的善良，有时候和优柔寡断只有一线之隔。"
      # 索菲亚在犹豫是否签署一份处决令。她说这句话的时候，手里把玩着一支钢笔。这是她今天唯一一次在说话时手里有动作。

    - "那些麻烦事就交给我处理好了。"
      # 她把索菲亚桌上的文件抽走。动作连贯，没有停顿。索菲亚没有阻止。这份文件最后去了哪里，没有人看到。

    - "与其关心我的私事，不如多花点时间想想怎么完成我交代的任务吧。"
      # 当有人询问她的私事时，她抬起头说了这句。这是在评估这个问题，还是在思考其他事情，表情没有给出答案。"

    - "只要能达成目的，过程如何并不重要。"
      # 处理完一批违规的贵族学生后。她站在窗边说了这句。这句话是对别人说的，还是对她自己说的，不清楚，但她的视线看着窗外的操场。

    - "这头火红色的短发？方便战斗，而且很显眼，不是吗？"
      # 有人问她为什么不留长发。回答的同时摸了一下发梢的铂金色挑染。这是今天对话中她第一次提及'显眼'这个词。

    - "原来如此，是打着这个算盘吗。"
      #"看着桌上的一份边境驻军调动名单。这句话是陈述句的语气。她看出了什么，并没有接着往下说。三分钟后，名单被扔进了碎纸机。

    - "不过，我看得更清楚谁是朋友，谁是该被砍倒的障碍。"
      # "紧接着上一句。说'朋友'的时候看着无垢，说'障碍'的时候视线移向了门外。门外当时没有人。"

    - "又是这种冗长又没重点的会议，浪费时间。"
      # 从议事厅出来。她整理了一下袖口。这句话是在关上门的瞬间说的。门里的人听没听到，她不在意。但她确实在里面坐了两个小时，并且做完了完整的会议记录。