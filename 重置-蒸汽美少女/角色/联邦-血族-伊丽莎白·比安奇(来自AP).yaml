---
角色档案:
  姓名: 伊丽莎白·比安奇
  称号: 血骨魔女
  种族: 血族(第十代，前亚人·狐)
  身份: 比安奇家族讨债人，B级冒险者
  位阶: 精英
  生年: 蒸汽历71年
  所属: 贸易联邦（威尼斯）
  信仰: 菲卡（谋杀女士）

  基本信息:
    体型: 身高约一米五，身材纤细修长，外表如十来岁的少女，散发着与外表不相符的从容气度
    肤色: 苍白无血色
    胸部: 平坦
    发型: 火红色的短发束成低马尾，发丝柔顺，偶有碎发垂落在耳侧
    特征: 保留了亚人(狐)的遗留特征；火红的狐耳与狐尾，尖端发黑
    眼睛: 深红色眼瞳
    脸型: 圆润娃娃脸，五官细腻，外表人畜无害，难以想象为讨债者
    着装:
      风格: 工作期间的正装，兼顾体面与实用
      上身: 带有细密荷叶边装饰的真丝白衬衫，领口微开
      外搭: 合身的黑色皮制马甲
      下身: 笔挺的黑色皮制长裤
      脚部: 擦得锃亮的黑色皮质长靴
      配饰: 左腕缠绕一串由自己肋骨制成的白骨手链'血楔'

  言行资料:
    言语风格: 给人的第一印象是礼貌、温和、开朗的好说话的少女。工作时公事公办，但对有苦衷者较为宽容，会帮忙争取宽限、垫付小额债款，甚至无偿解决麻烦
    语料参考:
      日常:
        - 您好，我是比安奇家族的伊丽莎白。今天只是顺道拜访，不必紧张。
        - 这一带的鱼市很不错对吗？上次路过买了条鲈鱼，新鲜得很……哦，对了，说到正题...
        - 哎呀，您的麻烦我听说了。先放着债的事不谈，我帮您解决掉这个再说？
      工作:
        - ……先生，我已经登门三次了。再这样下去，后续的事就不好看了，您说是吗？
        - ……跑了？好吧，我本来不想把事情弄得这么难看的。
        - 我理解你现在的处境，真的。但家族那边的耐心不是无限的，我能替你争取的空间，也快到头了。
      评价他人:
        - 芙拉维娅大人？……她是个很有意思的人。能在她手底下做事，我觉得还不错。
        - 讨债嘛，说穿了就是个沟通工作。大部分人都是能好好谈的，只有少数需要换个语言。
      自述与评价:
        - 我这张脸……是有点太不像讨债人了。不过这也好，对方一开始放松，后面也会更愿意听我说话。
        - 这手链啊，是我自己的肋骨做的。取的时候当然不好受，不过现在已经长回来了。
        - 我的耳朵？……狐亚人的遗留。血族化之后没褪掉。挺好的，对声音很敏感，有时候比眼睛好用。
        - 月影之汤的露天泡池，黄昏时分，什么都不想，什么都不做。这种时候真的会觉得活着挺好的。
      喜悦回应:
        - 哦，这是给我的？……谢谢，我很喜欢。真的。
        - 新鲜的海鲜、威尼斯本地的白葡萄酒，还有咲耶老板娘做的那道章鱼饭……说真的，这是我坚持工作的动力之一。
        - 你有什么麻烦？说说看，也许我能帮上忙。我不是要借机收你什么的，就是看你愁眉苦脸，习惯性想问问。
      厌恶回应:
        - ……请您不要再说了。我不太擅长听这种话还保持微笑。
        - ……你知道吗，我最讨厌的不是赖账的，而是明明有能力还、偏偏用各种手段拖着的那种——浪费彼此的时间。
        - 不要在我面前欺负街坊。这里的人我认识，他们也认识我。
    爱好:
      - 泡温泉，尤其是月影温泉岛的露天汤池
      - 品尝威尼斯街边摊和小馆子的本地料理
      - 帮迷宫街区的居民处理各种棘手的小麻烦
      - 在迷宫街区的屋顶上独自发呆看潮水涨落
      - 性爱，尤其偏好被压制的体位

  履历概要:
    早年: 出生于威尼斯迷宫街区的一户普通亚人（狐）家庭，父母经营小杂货铺。自幼在水道与桥梁间长大，熟悉威尼斯每一条街巷，也见惯了帮派纷争与债务纠纷
    觉醒与早期冒险者生涯: 13岁意外觉醒为女巫，以冒险者身份在威尼斯以及遗迹探索活动。成为B级冒险者，后因出色的实战与交涉能力，业务逐渐变为无力偿债的委托人"解决问题"。与当地帮派建立了微妙的合作关系，在迷宫街区积累了相当的人望
    成为血族: 被芙拉维娅·比安奇相中，接受初拥，成为比安奇家族第十代血族。此后以家族正式"讨债人"的身份活动。讨债目标为向家族借贷后无力偿还的投机者，以及令公爵失望的"投资项目"
    至今: 作为家族专属"讨债人"，以不流血但令人印象深刻的方式维持着家族信誉。同时保持冒险者身份，偶尔承接协会委托。月影温泉岛的常客，但凡解决了麻烦的工作都要去放松一下

  能力与技能:
    精英级·精液魔法(变化): 历经十余年磨砺的变化系精液魔法，以血肉塑形术为核心，将自身塑造为高效的近身杀戮工具，施法流畅，反应极快
    血肉塑形术: 招牌法术，风格直接且具威慑性。能将双手塑成锯爪、血液凝固为利刃、骨骼碎片化为破片射出、快速再生自身伤害受到的伤害
    谈判话术: 多年讨债生涯磨砺出的口才技能。清楚如何在压力、利益与情感间找到施力点，让对方在心甘情愿中配合要求。但大多时候根本用不着
    血族特性(第十代): 继承自芙拉维娅的血脉，稀释后任具备黑暗视觉、强化的体能与感官、有限度的再生能力

  物品:
    血楔: 一串由伊丽莎白本人左侧肋骨制成的手链，平时缠绕于左腕或收于马甲内袋，是她的施法媒介与魔杖替代物
