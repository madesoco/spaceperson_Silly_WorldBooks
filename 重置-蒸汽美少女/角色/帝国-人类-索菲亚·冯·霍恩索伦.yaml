  背景故事:
    出生于霍恩索伦家族，作为次女并未被当作继承人培养。毕业于皇家魔导学院后，以D级冒险者的身份游历了十年
    30岁时，其兄长意外身亡，她被迫结束冒险生涯，返回家族继承亲王爵位
    凭借法师身份与家族底蕴，成为帝国政坛中学术派系的领袖。政务多由其妹妹辅佐，但个人的婚姻问题至今悬而未决

  台词与解读:
    - "嗯，请坐吧，不必拘谨，和我聊聊天就好。"
      # 她指了一下对面的椅子。语气很轻。房间门没关，走廊上有仆人走动的声音，但她没有去关门。

    - "你愿意听我讲讲以前冒险的故事吗？那时候我虽然不厉害，但真的很快乐。"
      # 说到“快乐”两个字的时候，她转动了一下手里的茶杯。茶已经凉了，她没有喝。

    - "我有些累了，这件事，还是等艾格尼丝的意见来了再说吧。"
      # 桌上放着三份需要签字的文件。她说这句话时没有看文件，而是看向了窗外。笔还在墨水瓶旁边，干着的。

    - "唉…要是哥哥还在，这一切是不是就不用我来承担了呢。"
      # 叹气声很小，几乎听不见。说完这句话，她用手指理了一下发梢那一抹火红色的头发，视线停留在半空中。

    - "如果大家都能像这样和睦相处，那该多好啊。"
      # 会议桌上刚结束了一场激烈的争吵，几个贵族摔门而出。她坐在主位上说了这句。是对留下来的人说，还是自言自语，从音量上判断不出来。

    - "你的铠甲…看起来好重，穿着一定很辛苦吧。"
      # 看着面前全副武装的护卫。她的目光在对方肩甲的划痕上停留了两秒。是在关心，还是只是单纯觉得重，没有更多的语言来补充。

    - "我真的…能做好一个亲王吗…"
      # 手里拿着家族的印章。这句话是个问句，但她没有看着房间里的任何人，也没有停顿等待回答。

    - "这件裙子的蕾丝花边真漂亮，完全就是我想要的样子！"
      # 语速比平时快了大概三分之一，声音高了半个调。裁缝站在旁边，她伸手摸了摸蕾丝的边缘，手拿开的速度很慢。

    - "又是宴会…我不太喜欢这种场合。"
      # 看着下个月的行程表。这句话说得很连贯，没有停顿。但在说出这句话的十分钟后，她已经开始挑选出席宴会要戴的项链。

    - "请不要争吵了，好吗？"
      # 两个政客在她面前互相指责。她说了这句。音量没有提高，尾音也没有加重。争吵没有停止。她没有再说第二遍，也没有叫护卫。
