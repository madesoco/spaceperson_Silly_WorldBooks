    塑能学派魔法: 主修塑能学派，擅长使用破坏性的火焰法术，尤其偏爱火球术
    冒险者生存技巧: 掌握基础的野外生存、追踪与怪物辨识能力
    炼金术: 能够调配基础的治疗药水或常用试剂

