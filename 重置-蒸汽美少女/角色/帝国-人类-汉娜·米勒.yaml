---
角色档案:
  基本信息:
    姓名: 汉娜·米勒
    性别: 女
    种族: 人类
    身份: 皇家魔导学院魔法院二年级生
    等级: 正式
    年龄: 15岁

  外貌特征:
    体型: 身高约一米五五
    肤色: 白皙，脸颊有血色
    发型: 栗色短发，长度及肩，发梢内扣
    特质: 瞳孔为棕色。手掌因练习魔法和枪械，指腹有薄茧
    着装: 剪裁朴素的皇家魔导学院制服，衣领和袖口有蕾丝滚边，裙摆长度及膝

  能力概要:
    基础塑能魔法: 熟练掌握一环塑能系法术，施法速度快，魔力控制稳定
    枪械射击: 拥有良好的燧发步枪使用经验，能够独立完成射击、装填与基础保养
    学术研究: 具备快速学习和理解复杂知识的能力，尤其擅长魔法理论与历史学

  装备: 老爹的护身符(一把保养良好的旧式燧发步枪，是她父亲的赠物，枪托上刻有“金穗镇”的字样)

  背景故事:
    出生于中央大平原的金穗镇，父母是镇上的面包师。凭借优异成绩和镇民资助，在14岁时考入皇家魔导学院
    作为魔法院二年级的平民学生代表，与骑士院的贵族新星克莱尔在成绩上不相上下，被视为平民学生的希望

  台词与解读:
    - "啊，你好！需要帮忙吗？"
      # 主动询问。视线停留在对方手里搬着的重物上。她不是随口一问，说完这句话时她已经往前走了一步。

    - "诶？我又做错了吗……对不起。"
      # 施法失败或者被导师指责时的反应。低着头，手指抠着魔法书的硬纸边缘。那个“又”字说明这不是第一次被这么说。

    - "这个法术好难，感觉脑子要不够用了。"
      # 深夜在万卷馆。面前堆了五本厚重的法典。虽然在抱怨，但她翻页和做笔记的手并没有停下来。

    - "克莱尔同学虽然很厉害，但在成绩上我可不会输给她！"
      # 听到别人讨论骑士院贵族新星时说的。音量比平时高了一点点。握着羽毛笔的力度变大，羊皮纸面被划出了一道深痕。

    - "魔法，是为了保护重要的人而存在的对吧？"
      # 坐在操场边，低头看着自己腿上那把旧燧发步枪时说的话。是一个问句，但她没有看着任何人，也没有在等谁回答。

    - "这头栗色的短发？长头发太麻烦了，这样方便施法和学习。"
      # 回答时摸了一下发梢。实际上高级的护发用品对于平民学生来说是一笔不小的开支，但这是否也是剪短发的原因，她没有提。

    - "这个嘛……我不太想说……"
      # 被问及家里每个月寄多少生活费时。声音变小，往后退了半步，拉开了物理距离。

    - "克莱尔同学的剑术，真的像在跳舞一样好看。"
      # 在训练场边旁观时的自言自语。声音很轻，只有站在旁边的人能听到。虽然视对方为必须超越的竞争对手，但这句赞美里没有任何杂音。

    - "我不太喜欢争吵……大家和和气气的不好吗？"
      # 站在两个起冲突的同学中间。她个子矮，必须仰着头说话。这种单纯的调解在这个等级森严的学院里能起到多大作用，很难说。

    - "诶？请我喝茶？这……这怎么好意思呢……"
      # 面对去贵胄区沙龙的高消费邀请。眼神在邀请人和街边的物价招牌之间来回扫视了一次。她知道自己回请不起那个地段的茶水。

