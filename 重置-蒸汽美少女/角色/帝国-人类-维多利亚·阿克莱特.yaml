    - "如果是你的话...稍微依靠一下...大概...也可以吧？"
      # 声音很小。周围没有正在运转的大型机械掩盖杂音。她用词里包含了"稍微"和"大概"两个不确定词汇。但她坐在了旁边的椅子上，没有离开。
