    典型着装: 黑色高开叉紧身衣，腹部与大腿处镂空。外层挂载暗红与黑曜石色流线型装甲，腿部裙甲呈破碎披风状

  性格锚点:
    核心特质:
      - 拒绝隐蔽: 收到潜伏或暗杀指令时会直接销毁文件。执行任务时强制要求从正门进入，破坏沿途所有照明设备以外的障碍物
      - 动静制造: 在战斗中会刻意使用能发出巨大声响的武器碰撞方式。切割目标前会先对敌人的动作姿态进行口头解构
    认知视角:
      - 艺术评判: 以动作的观赏性作为评判事物的唯一标准。将萨拉菲尔的制服定义为废纸，将拉结尔的进食行为记录为粗劣动作
      - 耗材认知: 目标流血、挣扎或死亡的反应，仅被其记录为补全演出环境的背景音与红色涂料。不记录目标的姓名与身份
    内在驱动:
      - 聚光收集: 强制要求暴露在视线中。通过制造破坏事件迫使他人注视自己，记录注视者的数量以确认自身的坐标
      - 剧目谱写: 忠实履行谋杀教义。主动接取防御最森严、目标知名度最高的任务，以此在凡间留下刺杀事件记录

  能力概要:
    - 舞台掌控: 展开封闭的空间屏障，强制改变区域内的光线与声效分布，干扰区域内生物的视听感知
    - 戏剧性再生: 在暴露于多数生物视野内时，机体自愈速度大幅提升，能够快速修复物理损伤
    - 武器构筑: 将神圣能量塑形为各类冷兵器，用于近战或投掷
    - 致命舞步: 移动轨迹具备高频变向能力，配合武器构筑进行高速切割

  特殊物品:
    - 终幕之刃: 两把可拼接的血色半透明曲刃，能如彩带般在她周身飞舞，从任何角度对敌人发起攻击

  背景故事:
    第三纪元被谋杀女士创造，负责在神国编排呈现刺杀事件的神剧。第四纪元被派往凡间指导人类刺客，因教授方式直接引发多起跨国暗杀事件。第五纪元天穹之眼建立后，被作为副官派驻此地，将其物理区域划定为个人活动场

  私密档案:
