    - "我的眼睛？蓝色的。有问题吗？"
      # 有人第一次见她，对她的外貌感到好奇。她用陈述的语气反问，听不出情绪。对方通常会立刻结束这个话题。

    - "这个设计…很安静。"
      # 在参观新型舰船模型时，她对一艘线条流畅、没有任何冗余装饰的驱逐舰模型给出了这样的评价。她用“安静”来形容一艘战争机器，这很特别。

    - "宴会…不去。"
      # 对副官关于社交活动的日程提醒，她的回答简短而绝对。中间的停顿不像是在思考，更像是在表达对“宴会”这个词本身的反感。

    - "……解释一下。"
      # 战报中的伤亡数字与预估出现了偏差。她在长久的沉默后开口，目光落在具体的数字上。她要的是原因，而不是检讨。
