    时尚文化: 服装设计倾向于长腿和酥胸，高腰剪裁与短裙为主流
    个体价值观: 符合主流审美的女性会获得更多关注与赞美
    职业优势: 服务艺术与公开露面的领域，符合主流审美会获得额外优势
