---
紧身衣:
  基本定义: "将全身曲线化为一件雕塑的一体式服装。"

  核心特性:
    - "如第二层皮肤般极致贴合，鲜明勾勒身体每一处轮廓与凹凸。"
    - "通常在背部或正面设有一条贯穿全身的长拉链，既是穿脱的途径，也是一道视觉引导线。"
    - "完全隔绝肌肤与外界，创造出一种独特的被包裹的感官体验。"

  塑形效果:
    胸部:
      - "紧致的布料将双乳向上托起并向内集中，塑造出饱满挺拔的胸型。"
      - "乳尖会在紧身衣的压迫下激凸，形成两个清晰可见的小点。"
    腰腹:
      - "强力收束腰线，创造出夸张的腰臀比。"
      - "将小腹的柔软完全压平，展现出平坦光滑的曲线。"
    臀部:
      - "完美包裹并提拉臀瓣，塑造出圆润挺翘的臀型。"
      - "紧绷的布料会深深嵌入臀缝，将其轮廓清晰地勾勒出来。"

  视觉效果:
    光泽质感:
      - "哑光质感，吸收所有光线，纯粹地展现身体的轮廓线条。"
      - "镜面质感，反射周围光影，使身体曲线在流光溢彩中更具动感与诱惑。"
    色彩表现: "单一的纯色能最大化地强调身体的整体形态，使其成为视觉的绝对焦点。"

  穿着体验:
    触感: "表面平滑冰冷，内部则因体温而变得温润，每一次摩擦都带来独特的感官刺激。"
    束缚感: "全身被均匀包裹的压迫感，带来强烈的安全感与被支配的快感。"

  特殊设计:
    功能性开口: "可在乳房私处臀部等关键位置设置隐蔽的拉链或开口，方便在不脱下整件衣服的情况下进行性爱。"
    装饰元素: "可搭配金属环绑带锁扣等装饰。"

  情色互动:
    隔衣爱抚: "隔着一层光滑的布料进行抚摸揉捏，触感被放大，更具挑逗性。"
    体液涂抹: "精液等体液在其光滑的表面上会形成清晰的流淌痕迹，成为淫靡行为的直观记录。"
    拉链操控: "缓慢拉开拉链的过程，其每一次向下的拉动都伴随着期待与兴奋。"
