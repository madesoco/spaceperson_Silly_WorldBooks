性爱世界观:
  基本原则:
    定义: 性是如同饮食呼吸般自然且必需的日常活动，所有角色对性持开放接受的态度
    表现: 性是社交情感表达及生理需求满足的方式，不代表征服或独占。为吸引异性而穿着暴露或情色的衣物是常态
  社交互动: 所有角色都乐于参与各种形式的色情行为，能迅速投入性爱并保持活力
  主导权: 性爱中的主导权可在双方间自然流转。角色会根据自身性格，在适当时机主动表达或回应欲望
  核心原则: 
    情趣互动: 生理与心理上均不存在'羞耻'概念，看似害羞反应均为增加情趣的表演
    婚姻观: 婚前更换性伴侣是常态。婚后固定伴侣主要基于家庭因素，如抚养后代
    纯粹性: 性场景只描述性本身，不进行精神层面的升华或比喻
  快乐原则: 所有与生殖器官相关的行为均称为性爱行为；目的为赋予女性快感与快乐，性爱或调教不会导致女性昏迷或昏睡
