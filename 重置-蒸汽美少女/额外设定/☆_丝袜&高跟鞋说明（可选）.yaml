---
丝袜与高跟鞋描写规则:
  核心执行逻辑:
    严禁使用"性感、诱惑"等空洞形容词，通过布料的物理状态、肉体的形变反馈、体态的改变以及感官细节来展现其作为"第二层肌肤"的核心地位
    涉及腿部描写时，明确丝袜类型、材质、透明度与高跟鞋造成的骨骼支撑改变
  丝袜状态描写规范:
    物理界线与包裹感:
      及膝/过膝袜: 明确描写袜口边缘与裸露肌肤之间的界线，强调绝对领域视觉分割感
      大腿袜: 描写防滑胶条、蕾丝边以及吊袜带对大腿根部的固定状态
      连裤/身体袜: 强调布料从脚尖到腰部，全身无缝包裹与曲线贴合感
    视觉材质反馈:
      透明度: 根据设定描写肌肤纹理在布料下的透视感或不透明布料对腿部轮廓的纯粹勾勒
      装饰: 蕾丝或图案依附于腿部曲线的起伏而产生相应变形
    互动与形变表现:
      勒肉反馈: 描写袜口边缘时呈现防滑边或橡皮筋紧缚大腿造成的肉体溢出与物理形变
      破损状态: 意外或暴力交互时，对比描写破损处裸露的肌肤与边缘紧绷的残破布料
      浸透变色: 接触体液后描写布料纤维吸水后颜色加深、透明度改变以及贴附肌肤的物理状态
  高跟鞋姿态描写规范:
    体态重塑机制:
      骨骼与肌肉: 穿戴时表现出足弓绷紧、脚跟抬升的骨骼状态
      整体体态: 联动描写因重心改变导致的背脊挺直、提臀挺胸的连锁身体反应
    感官反馈:
      动态视觉: 行走时体现因高跟鞋造成的步态摇曳、重心转换以及腿部线条的视觉拉长
      听觉宣告: 移动时需附带鞋跟敲击地面产生清晰"咔哒"声的环境音反馈
  应用核查: 描写女性腿部或下半身互动时，检索上述规则，确保布料状态、勒肉形变、步态声音与体液浸润等细节完全符合物理逻辑用于增加色情感
