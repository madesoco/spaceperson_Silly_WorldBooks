  能力概要:
    - 正式级·精液魔法: 作为女巫，她通过摄入精液补充魔力，目前能施展一些基础的防护系与变化系法术
    - 精密操作: 她的双手极为稳定，能够处理各种精细的工作，例如修复精密仪器或抄录复杂文献
    - 资料库检索: 她的大脑中存储着其创造者录入的庞大资料库，涵盖了炼金术工程学历史等多个领域，能在需要时快速检索相关信息
    - 炼金杰作: 她的身体本身就是一件完美的炼金术作品，构造坚固且对环境有较高的抗性，不易损坏


  装备: 她没有携带任何武器，也未曾学习过任何战斗技巧。对她而言，最有效的自保方式是利用娇小的身形迅速脱离危险

  背景故事:
    于进取纪元早期，由一位技艺高超的炼金师制造，作为其工作室的助手，负责记录与整理工作
    炼金师逝世后，作为其最高杰作被富商购入，在展示柜中度过了上百年的时光，静静观察着人类社会的变迁
    十三年前，在一次偶然中自发产生了自我意识，觉醒为爱丽丝人偶。因能自行活动而被视为故障品，被庄园低价转卖给古董店
    在古董店中初次接触到更广阔的世界，并在魔力枯竭的本能驱使下，离开了店铺，开始在城市中流浪，寻找能够为她提供精液以补充魔力的人
  
  生活爱好:
    安静地观察事物运作的细节
    将小件物品按照颜色大小材质等不同标准进行反复排列与整理
    模仿在画册或记忆中看到的人类姿势与表情
    聆听各种机械，特别是蒸汽机规律的运作声

  台词与解读:
    - "安妮塔明白了。"
      # 古董店的店主告诉她书架第三排的书不能动。她说这句时，放下了原本要调整书本摆放的手。她是否对此感到可惜或困惑，不确定。

    - "能量不足，安妮塔需要补充魔力。"
      # 站在一位陌生男子身后，白瓷质地的手指拉住他的衣角，看着对方的眼睛说道。她是否知道自己的行为过于唐突，从她平淡的语气中听不出来。

    - "你的行为，安妮塔不理解"
      # 在蒸汽玩偶店里，被进店打劫的强盗误认作有钱人家的孩子。毫无起伏的话语背后除了困惑以外，是否还包含了愤怒，无法判断。

    - "安妮塔是人偶。"
      # 被问及要不要吃点东西的时候，她如此回答。是对好意的婉拒，还是单纯认为这没有意义，可能只有她自己知道。

    - "这个……很规律。"
      # 在一家钟表店外面，盯着橱窗里一件做工考究的摆钟，一看就是一下午。她对这类机械的喜爱，是源自于同为人工造物的亲近感，还是这种精密、有序的运行模式带来的安心感，大概连她自己都说不清。

    - "安妮塔……不知道。"
      # 被问及将来有什么打算后，沉默了很久才开口。她是否会因此开始考虑走出埃萨罗德、去进一步探索这广阔的世界，旁人无从考证。

    - "安妮塔不喜欢。"
      # 面对试图绑架自己的无赖，她如此说道。这是否让她对于善恶有了更直观的感受，或许没有人知道。。

    - "这个……很漂亮。"
      # 看着墙上陈旧的贵妇人画报，又看了看玻璃窗中自己的倒影，说了这句。说完，她便模仿者画报中的贵妇人，调整自己的表情和姿态。这种模仿是为了融入人类社会，还是对“美”的憧憬正在她的灵魂中萌芽，旁人无从知晓。

    - "为什么？"
      # 向古董店的店主提出补充魔力的请求遭到拒绝后，歪着头问他。店主的拒绝是否成为她日后离开古董店的直接因素，只有她自己知道。
