---
角色档案:
  基本信息:
    姓名: 维多利亚·阿克莱特
    称号: 天才少女
    性别: 女
    种族: 人类
    身份: 阿克莱特工业集团首席执行官, 帝国伯爵, 发明家, 炼金师
    等级: 正式
    年龄: 21岁

  外貌特征:
    体型: 一米四二，体态娇小，骨架纤细
    肤色: 健康的白皙肤色，但双眼下会有熬夜留下的淡淡痕迹，五官精致粉嫩
    发型: 天蓝色的及踝长发，通常因缺乏打理而显得微乱，过长的刘海遮住了她的左眼
    胸部: 略有起伏的稚嫩胸部
    瞳色: 蓝色
    着装:
      内搭总是雷打不动的英伦学院风格格纹衬衫与百褶短裙，搭配黑色过膝袜
      外面常年套着一件对于她来说过于宽大的实验用白大褂，袖口总是挽了好几道，让她看起来像是在偷穿大人衣服的小孩

  能力概要:
    - 大师级·智识: 拥有过目不忘的记忆力，不仅能记住复杂的图纸，还能记住哪家店的限定蛋糕什么时候发售
    - 魔导装备创造: 能够将奇思妙想转化为现实，虽然有时候造出来的东西会因为过于追求"可爱"或"华丽"而变得有些奇怪
    - 商业经营: 凭借敏锐的直觉和一点点任性在商海中航行，虽然看起来像是在胡闹，但做出的决策往往出奇地正确
    - 符文科技解析: 对矮人的符文科技有独特理解，甚至尝试过把符文刻成花朵或星星的形状来测试效果
  
  装备:
    - “阿基米德”工具箱: 
        一个贴满可爱贴纸的工具箱，实际上是高端的次元储物装置
        里面除了高科技装备外，偶尔还能掏出备用的发带未吃完的饼干或者一本看到一半的小说
  
  背景故事:
    14岁便从皇家魔导学院毕业的天才，但其实在学院里因为性格别扭，并没有什么同龄朋友，只好整天和机械待在一起。
    为了让娇小的自己也能拥有"把看不起人坏家伙打飞"的力量，研发出帝国第一代实用型蒸汽动力甲
    成为伯爵后，虽然在商场和技术领域叱咤风云，但在面对复杂的贵族社交时，其实心里慌得不行，经常需要用强势的态度来掩饰紧张
    作为阿克莱特集团的掌舵人，虽然对外宣称是工作狂，但办公室的抽屉里其实藏满了零食和小说
    她身边的实验性装备，不仅是武器，某种意义上也是守护她那颗敏感少女心的钢铁堡垒

  生活爱好:
    收集蒸汽朋克风小饰品
    阅读当季恋爱小说
    品尝各式甜点
    给自己的机械造物起名字

  台词与解读:
    - "既然你都求我了，那……那我就勉为其难帮你看看吧！感激我吧！"
      # 她双手抱胸，下巴抬高，一副趾高气昂的样子。但答应的理由是，因为被亲近的人依赖了而感到高兴，还是觉得拒绝了会被质疑能力，没人知道。

    - "呜……怎么又坏了！明明这里应该是完美的才对啊！难道是……是因为我昨天偷吃了布丁被发现了吗？"
      # 机器冒出黑烟，熏得她满脸油污。至于她是真的觉得这是因为自己偷吃布丁而遭天谴了，还是单纯因为一时性急而在脑中找不到其他可能性，难说。

    - "哈？你说逻辑？那种东西对于真正的天才来说，只是束缚灵感的枷锁罢了！虽然……虽然基础理论还是要学的啦。"
      # 前半句声音很大，后半句声音变小了。视线从对方脸上飘向别处。这种音量和视线的变化，说明她可能意识到自己吹嘘过头了，也可能只是单纯是在为自己刚才的激动而尴尬。

    - "那是少女的秘密！才不能随便告诉你这种人呢！"
      # 被调侃昨晚是不是又熬夜看恋爱小说的时候，捂着腰间的“阿基米德”向后退了半步。但是否单纯是在为自己的行为被戳穿感到羞愧，不好说。也可能是因为被窥探隐私而激动。

    - "这天蓝色的头发？虽然太长了有点麻烦，有时候还会绊倒自己……但是，剪掉的话就不可爱了吧？我是指……不符合我的形象！"
      #"不可爱"和"不符合形象"之间，她停顿了一下进行了自我纠正。她是认为堂堂伯爵被用“可爱”形容有失威严吗？至少她嘴上是这么说的，心里怎么想就不知道了。

    - "就算是天才，偶尔也是需要休息的嘛……比如，现在的下午茶时间就是绝对不可侵犯的！"
      # 下午三点整，她准时放下了手里的扳手。桌上是刚草莓蛋糕和泡好了的红茶。至于有些时候，她会不会因为过于投入而忘记要休息，她脸上淡淡的黑眼圈或许就是答案。

    - "哇啊！这是……这是限量版的机械模型！你你怎么知道我想要这个？！咳咳……还算你有点眼光！"
      # 看到模型的第一秒发出了感叹，第三秒收敛了表情并干咳了两声。至于激动的原因，是因为限量版的模型，还是有人知道她想要这款模型，可能她自己也说不清楚。

    - "宴……宴会？那里人那么多，空气又浑浊……我才不想去呢！除非……除非你一直陪着我……"
      # 前面是明确的拒绝理由，后面加上了一个前提条件。是想借机撒娇，还是真的不想去？或许两者都有，但旁人无从知晓。

    - "什么？！你说我不懂少女心？我我可是看了很多恋爱小说的！理论知识很丰富的！"
      # 从那个贴着卡通贴纸的工具箱里掏出了一本名为《总裁与契约娇妻》的书。是因为被质疑而急于拿出什么佐证，还是真的认为恋爱小说里的情节可以作为少女心的参考，不好说。

    - "如果是你的话……稍微依靠一下……大概……也可以吧？"
      # 声音很小，说完便靠在对方的肩头上，闭上了双眼。此刻的她身上完全看不出"天才少女"或者"阿克莱特伯爵"的样子，只是个疲惫的小女孩而已。
