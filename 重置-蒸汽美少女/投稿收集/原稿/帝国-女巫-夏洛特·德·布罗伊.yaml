  背景故事:
    作为德·布罗伊家族的小女儿出生，从小接受标准的贵族教育，每日学习礼仪与品茶
    父亲的商会破产，家产被变卖，在镇上的图书馆接触到魔法并觉醒了女巫天赋
    带着父母最后的积蓄与期望，抵达远西大陆的新阿尔比恩，注册成为一名E级冒险者，为复兴家族而奋斗

