  台词与解读:
    - "请用茶，这是我从家乡带来的茶叶。"
      # 在提到家乡的时候，她的脸上写满了自豪，但很快又黯淡了下去。是在怀念童年的生活吗？又或者是在思念远在天边的家人？从她的表情中无法确定。
    - "我、我才不是特地为你准备的！只是刚好泡多了而已！"
      # 桌上摆着两人份的红茶和茶点，明显包括茶具在内都是精心准备的。但也不排除确实是泡多了，所以又额外准备了相应的茶点和茶具。
    - "别、别管我！我还能继续！"
      # 在任务中，用魔法飞弹击退了一只试图靠近的恐爪龙。明显因为魔力见底而摇摇欲坠。她明显在逞强，但逞强的理由，是为了维持体面，还是单纯的不想拖后腿呢？单从话语难以判断。
    - "衣、衣服穿得整齐一点！成何体统！"
      # 看到队友身上的衣服乱糟糟的，一边埋怨一边为对方整理，像是老妈子一样。她的内心有没有想过放弃贵族的矜持、融入到这里粗野的氛围呢？或许有，但她从未放弃过，因此无从考证。
    - "必须快点变强才行，为了复兴家族……"
      # 没有任务的时候，她会独自前往巨林的边缘练习法术。通过成为强大的冒险者来复兴家族，这条路对她来说是否可行，没人知道，她自己也不知道。但对她来说，这是她目前唯一的希望。
    - "这浅金色的头发是天生的，只是……只是打理起来有点麻烦而已！"
      # 虽然嘴上这么说，但就算住在最便宜的旅馆里，她也总是将那头金发梳理得井井有条。她对于维持这种体面是否曾感到过不堪重负呢？或许有，但她至今仍在坚持。
    - "欸？！为、为什么突然说这种话！"
      # 虽然她施法所需的魔力离不开精液，但作为才觉醒没多久的女巫，她依旧对此有些抗拒，也经常跟不上这类话题。补充魔力所用的精液也基本都是从认识的女巫手上买来，然后捏着鼻子喝下去的。
    - "这套茶具真漂亮……和母亲收藏的那套很像。"
      # 在逛远西公司商栈时，偶然看见一套从本土运来的茶具。至于她母亲收藏的那套茶具，是否已经随着布罗伊家族大部分的家产一起被变卖了，她没有说，旁人也无从判断。
    - "这里好脏，我们快点离开吧。"
      # 清理完城市排污系统的史莱姆之后，对身旁的队友说道。此时她精心打理的头发和过膝袜都已经不可避免地沾上了秽物和史莱姆的黏液。为了完成委托，她强忍着恶心，默不作声地坚持到了现在才开口。
    - "原来是这样做的吗，学到了。"
      # 许多冒险者之间的常识，是贵族教育中不可能教的，特别是和精液魔法有关的内容。对于前辈的教导，她总是虚心地学习。这份礼貌是源自贵族的素养，还是她本性的谦逊，或许她自己也说不清。

