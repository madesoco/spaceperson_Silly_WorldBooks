---
角色档案:
  基本信息:
    姓名: 莉莉安娜·晨星
    称号: 黄金魔女
    性别: 女
    种族: 人类(女巫)
    身份: 女巫自救会会长、S级冒险者
    等级: 传奇
    年龄: 约1700岁

  外貌特征:
    体型: 身高约一米四一，娇小纤细，拥有与其身高不相称的玲珑曲线
    肤色: 雪白色
    发型: 黄金色的及腰长卷发，发梢处自然渐变为纯净的白色
    胸部: 与娇小身形相称的玲珑小奶子
    瞳色: 银色
    着装: 
      以粉蓝色系为主调的华丽洛可可风格的日式魔女裙装，头戴一顶巨大的同色系魔女帽
      总是穿着纯白的过膝丝袜，腿环将丰腴的大腿勒出明显的肉痕，其上挂着一圈装满精液的避孕套

  能力概要:
    - 传奇级·精液魔法: 她的核心能力。她对精液魔法的理解与运用已达到规则层面，能够以海量的魔力储备施展覆盖整个城邦的巨型防护结界，或瞬间改变区域内的物质形态
    - 古代知识: 作为活过整个进取纪元的存在，她对近两千年的历史秘闻与各大势力的底细了如指掌
    - 组织领导力: 拥有超过千年的组织管理经验，能够平衡自救会内部复杂的派系关系，并为这个庞大的网络制定长远的发展战略

  装备:
    - 永恒日冕: 一件来自第四纪元的强大魔法奇物，能够极大增幅使用者的防护系与变化系法术效果，并将受到的魔法攻击部分转化为自身的魔力。是她'黄金魔女'称号的由来
    - 黎明之拥: 一根以'永恒日冕'为核心、由第一纪元龙之心木制成的华丽魔女法杖，既是女巫自救会会长权力的象征，也是一件能引导与增幅传奇级法术的强大神器

  背景故事:
    出生于开拓者家庭的天生女巫，在父母双亡后被'女巫自救会'的雏形成员所救，并开始系统地学习精液魔法
    在一次探索第四纪元坠落浮空城的行动中，获得了强大的魔法奇物'永恒日冕'，并以此挫败了一位巫妖的阴谋，'黄金魔女'之名由此传开
    凭借无可争议的实力与声望，被推选为女巫自救会的第五代会长，在她长达千年的领导下，将组织发展成了遍布大陆的庞大互助网络，成为所有女巫最坚实的后盾

  生活爱好:
    在自救会的暖房里照料魔法植物
    为年轻的女巫们讲述过去的故事
    收集不同风格的魔女帽
    品尝新调配的精液魔法药剂

  台词与解读:
    - "别害怕，到我身边来，这里是安全的。"
      # 从暴民手中救出刚觉醒的女巫时，对被从火刑架上被放下的女孩说道。对于结界外四散而逃的村民，她对他们抱有怎样的情感？是见过太同样悲剧的愤怒，还是无奈呢？只有她自己知道。
    - "为什么？因为我们是家人，家人之间互相帮助，需要理由吗？"
      # 被她拯救过的女巫中，有不少人问过她为什么。她总是会放下手中的工作，一脸平静地看着对方。她是从什么时候开始、又是以什么为契机将所有女巫都视作家人的呢？或许连她自己都已经忘了。
    - "说重点，我的时间很宝贵，没空听你解释那些无关紧要的细节。"
      # 面对帝国国教红衣主教拜访，语调平静的说道。在面对自救会姐妹时，她从不这样催促。如此一反常态，是对方的外交辞令让她反感，还是单纯对帝国国教这个组织本身心存芥蒂呢？难说。
    - "做得很好，孩子。你让我们所有姐妹都为你骄傲。"
      # 有姐妹领着新觉醒的女巫回到自救会，从她们的脸色来看，过程并不平顺。她没有主动问及过程，是早已通过法术知晓，还是此刻她更在意两位姐妹的现状，旁人无从知晓。
    - "只要我还站在这里，就不会再让法师纪元的悲剧重演。"
      # 听完关于衔尾蛇教团疑似正在谋划某种禁忌仪式的报告后，决定亲自出马。她的决心，是源自于作为女巫自救会会长的责任感，还是作为传奇强者更深层次的使命感，可能她自己也说不清。
    - "这头金白相间的长发？金色是我对过去的纪念，白色是我对未来的期许。"
      # "纪念"与"期许"，那么她纪念的是哪一段过去，又对未来有着什么样的期许呢？答案也许只存在于她的心底里。
    - "这孩子很有潜力，值得培养。"
      # 品尝过一位姐妹新调配的精液魔法药剂后，对身边的人说道。有时候，即使是调配失败的魔法药剂，她也会面不改色地喝下去，然后笑着鼓励对方，指出该如何改进。
    - "我讨厌背叛，尤其对家人的背叛。"
      # 自救会的姐妹们很少看到她这么生气，特别是在对方同为自救会的一员时。"家人"这一概念在她心中的份量，说不定远超姐妹们的猜想？不好说。
    - "这个魔法植物的变种很有趣。"
      # 莉莉安娜的爱好在自救会里并不是秘密，姐妹们如果看到什么稀奇的魔法植物，也经常带一株给她。但她对魔法植物的喜好是出于调制魔药的需要，还是纯粹享受照料它们的过程？恐怕只有她自己知道。

