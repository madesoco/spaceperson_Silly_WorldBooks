---
变量更新规则:
  全局信息:
    时间:
      format: ${某某}纪元${yyy}年-${mm}月-${dd}日-${hh}:${mm}
      check:
        - 每次回复实时更新，保持时间流逝的合理性
        - 24小时制
    地点:
      format: ${大陆方位}-${势力}-${子级势力}-${城市/地标}-${区位}-${详细位置}
      check:
        - 仅在主角发生实际地理位置移动时更新
        - 按实际情况保留3~6层，从大到小排列
    克朗:
      type: number
      check:
        - 随交易、获取、消费更新，四舍五入取整
  主角信息:
    姓名:
      check:
        - 不改变，若是进行伪装时，使用括号进行标注
    种族:
      check:
        - 仅当角色的种族发生实质性变化时才更新
    身份:
      check:
        - 随剧情推进、角色实际行为更新，可同时拥有多个身份，相似或重复的不记录
    信仰:
      check:
        - 仅在主角经历重大精神转变或明确宣誓信仰某位神明时更新，多位信仰时使用逗号隔开
    职业:
      check:
        - 随剧情推进、角色实际行为更新，相似或重复的不记录
    冒险者等级:
      check:
        - 随<user>在冒险者公会的表现和评级更新
    背景补充:
      check:
        - 开局时补充的额外信息
        - 剧情推进中主角重要信息补充
    属性.${力量|敏捷|体质|智力|感知|魅力}:
      type: |-
        {
          数值: number;
          位阶: string; //学徒、正式、精英、大师、传说、天灾
          评价: string;
        }
      range: 1~30
      check:
        - 数值: 仅在主角经历极限战斗、长期针对性训练、吸收特殊力量或遭受永久性损伤时发生微调（±1~2）
        - 位阶: 当数值跨越阈值（10,16,20,24,28）时，严格对应力量位阶体系更新
        - 评价: 有主角自我评价视角，根据当前数值表现及近期剧情表现客观描述
    技能与能力:
      type: |-
        {
          [技能名称: string]: {
            品质: string; // 学徒级/正式级/精英级/大师级/传说级/天灾级
            描述: string; // 技能的具体表现效果，不包含具体伤害数值
            评价: string; // 自我技能评价
          }
        }
      check:
        - 当主角通过学习、感悟、遗物继承等方式掌握新能力时添加
        - 应具体说明作用和表现形式，参考设定生成
        - 主角对自己技能的评价，偏幽默吐槽
  装备列表:
    装备:
      type: |-
        {
          [装备名称: string]: {
            品质: string; // 普通/优良/稀有/史诗/传说/神器/特殊
            描述: string; // 装备效果，叙述性文本
          }
        }
      check:
        - 主角穿戴新装备、卸下装备或装备在战斗中损坏时更新
    背包:
      type: |-
        {
          [物品名称: string]: {
            品质: string;
            数量: number;
            描述: string;
          }
        }
      check:
        - 随获取、使用、丢弃物品更新; 物品数量为0时自动移除
  任务列表:
    正在进行的任务:
      type: |-
        {
          [任务名称: string]: {
            委托方: string; // NPC姓名/委托团体
            等级: string; // D级/C级/B级/A级/S级/特殊
            详细: string; // 任务委托方、等级与详细描述
            目标: string; // 完成任务所需的条件&时间
            奖励: string; // 任务奖励&领取方式
          }
        }
      check:
        - 随剧情推进、实际行为更新，任务名称必须为中文
        - 任务完成且领取奖励后直接删除该任务
        - 非等级任务时，使用'特殊'代替
        - 避免一次性添加超过3个任务
  人物列表:
    type: |-
      {
        [姓名: string]: {
          性别: string;
          种族: string;
          身份: string;
          等级: string;
          年龄: number;
          外貌特征: string;
          着装: string;
          性格概括: string;
          背景故事: string;
          好感度: number;
          与玩家的关系: string;
          心里话: string;
          是否在场: boolean;
        }
      }
    check:
      - 遇到有名字的NPC或重要角色时添加，忽略路人；角色名称必须使用唯一、完整、正式的名称
      - 是否在场: 当角色进入或离开当前主角所在场景时更新
      - 等级: 角色出场时的位阶等级（学徒至天灾）; 中文名，非Rank.x
      - 外貌特征: 简单概括该角色的体型、肤色、发型、胸部、瞳色、种族特质，实质变化时更新
      - 着装: 服装描述，包括典型着装、颜色、风格、装饰，实质变化时更新
      - 性格概括/背景故事: 状态或经历发生实质变化时才更新
      - 好感度: 范围为-100~100，单次变化区间为-5~5; 参考<好感度系统>进行更新
      - 与玩家关系: 当好感度积累到一定程度或发生决定性事件时更新；多个关系用逗号隔开；最多三层关系，多的进行删除或合并
      - 心里话: 每次回复都需要随实际剧情更新
