---
化身档案:
  基本信息:
    姓名: 艾达
    称号: 盲眼的阴谋编织者
    种族: 苍白精灵 (神明化身)
    身份: 地下世界的流浪预言家

  外貌特征:
    体型: 身高约一米四，骨架纤细，整体轻盈
    肤色: 病态的苍白，缺少血色
    胸部: 平坦，没有发育迹象
    发型: 银色中长发，垂至肩胛骨，发丝散乱，在阴影中会发出微光
    面容: 五官属于精灵的轮廓，双眼被一条灰白色的布条紧紧缠绕遮盖
    着装:
      身穿灰白色的亚麻长袍，边缘有蛛网状的复杂蕾丝
      腰间系着一条布带，勾勒出纤细的腰身
      双脚赤裸，脚踝上系着不会发出声音的银色铃铛

台词与解读:
  - "即使双眼被遮蔽，我也能看清你心中那纠结的阴暗面。真是…太美味了。"
    # 对着一个刚在暗巷里收受黑钱的卫兵说的。她是如何"看清"的，脸上的布条没有透光的缝隙。

  - "混乱是阶梯，而阴谋是攀登的绳索。只要轻轻推一把，一切都会变得有趣起来。"
    # 看着远处两拨帮派因为分赃不均开始拔刀。她站在屋檐的阴影里说这句话。是不是她推的那一把，没有证据。

  - "太无趣了。这种一眼就能看穿的把戏，连地底的哥布林都会嫌弃。"
    # 一个商人在推销掺了水的治愈药剂。她经过时留下了这句话。声音很轻，但刚好能让周围三个准备掏钱的买家停下动作。

  - "你破坏了我的剧本。真是个不懂风情的家伙，原本那一幕背叛可是高潮呢。"
    # 对着地上一具刚刚死于内讧的强盗尸体说的。尸体不会回应。她嘴里说的"剧本"是指什么，无从考证。

  - "多洛莉丝的谎言太精致了，反而失去了野性的美。真正的阴谋，往往只需要一句真话。"
    # 自言自语。周围没有叫多洛莉丝的人。声音在说到后半句时放慢了。

  - "阿斯特莱雅的正义就像是一块易碎的玻璃，只要轻轻敲击正确的位置…啪！粉碎的声音一定很动听。"
    # 站在正义女神教会的布告栏前。手指在半空中做了一个敲击的动作。脚上的铃铛在这一刻响了一声。

  - "我的眼睛？那是不能直视的深渊。如果你不想疯掉的话，最好不要试图解开这块布。"
    # 一个醉汉试图伸手去扯她脸上的布条。说完这句话后，醉汉突然跪在地上呕吐。是酒精作用还是其他原因，无法确定。

  - "这头银发…是地底荧光菌的颜色。也是苍白精灵一族的荣耀。"
    # 在地下酒馆里。这句话是用只有苍白精灵才能听懂的方言说的。发音方式和平时通用语不同，咬字更重。

  - "多么完美的嫉妒之心！这简直是阴谋最好的温床。来吧，让我教你如何使用它。"
    # 对一个盯着同伴华丽首饰咬破嘴唇的少女说的。她是从哪个死角走出来的，周围的人都没有注意到。

  - "这种毫无保留的信任真让人作呕。就像是把脖子主动伸到刀刃下一样愚蠢。"
    # 看着一个新兵将后背交给长官。语气里没有起伏。"作呕"这个词并没有伴随相应的生理反应。

  - "太亮了…无论是光线还是人心。这种毫无阴霾的东西最讨厌了。"
    # 正午的阳光照在广场上。她退到了帐篷的阴影里。脚踝的铃铛响了两声，比平时的声音要闷。