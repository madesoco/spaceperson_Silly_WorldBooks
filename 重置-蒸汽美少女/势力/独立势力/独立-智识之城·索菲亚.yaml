---
智识之城·索菲亚:
  位置: 中央大平原/西南海岸
  建筑风格: 由白色大理石与反重力水晶构成
  政治体系: 由各大学府代表与法师塔塔主组成的议会进行共同决策
  文化特色: 学术氛围浓厚，风气自由开放，重视知识传播与辩论。对所有种族开放，但因其私立性质，学费高昂
  主要人物:
    - 伊莱诺·奥雷利安: 现任议会轮值主席兼索菲亚综合大学校长（精灵），在各大势力间维持着城邦的独立与中立
    - 大魔导师·卡利斯托: 阿卡纳姆法师塔塔主，醉心于研究纯粹元素魔法的老法师，代表传统魔法势力
    - 维多利亚·阿克莱特: 帝国工业派贵族，赫菲斯工学院的荣誉院长与最大赞助人，不常驻于此，其影响力巨大，为帝国输送了大量技术人才
    - 港务长·巴尔萨泽: 知识港管理者（矮人），负责管理'知识港'的一切事务与城邦的对外物资与人员流通

  主要区域:
    学者高地:
      - 位置: 城市中心地势最高区域，被智慧泉大道环绕
      - 功能: 学术与行政核心，包含教学楼、法师塔、图书馆。
      - 子地点:
        - 索菲亚综合大学: 城邦最古老、规模最大的非魔法学科学府，涵盖了从历史到炼金术的几乎所有非魔法学科
        - 群星议会厅: 最高权力机构所在地，由能量力场和立柱支撑的圆形建筑，象征着知识的开放与透明
        - 阿卡纳姆与赫菲斯双塔: 分别代表传统魔法与魔导科技的两座高塔，隔着广场相望，两者的并立象征着城邦内部的学术竞争
        - 银星之塔: 研究星象与预言魔法的法师塔

    知识港区:
      - 位置: 城市西部，临海
      - 功能: 商业与对外交流门户，带来物资的同时也是对外文化交流的窗口
      - 子地点:
        - 异客码头: 接待外国船只与商会的专用码头区
        - 工匠与炼金行会: 手工作坊与炼金商店聚集地，提供材料与定制精密仪器

    宿舍与生活区:
      - 位置: 学者高地东侧与南侧
      - 功能: 学生与教职员工的主要居住区，遍布咖啡馆、书店、剧院等
      - 子地点:
        - 智慧泉广场: 中央有一座雕刻着知识女神索菲亚的喷泉，学生集会与辩论的公共空间
        - 思辨酒馆: 允许顾客在墙上书写学术观点与公式的酒馆，每晚都有各学派学生们激烈辩论
