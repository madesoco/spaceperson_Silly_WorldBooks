---
城市地点档案:
  圣所·天穹之眼:
    所属: 苍穹之海/天使军团
    结构: 纯白金属与光路构筑的赛博朋克风格浮空城
    神谕之核区:
      位置: 浮空城正中心
      功能: 城市的最高指挥与控制中心，外观为白色尖塔。设有炽天使御座，铺设光学线路与能量矩阵
      子地点:
        - 战略全知室: 球形空间，墙壁投射覆盖凡间大陆的实时全息地图，显示地面能量异常与信仰波动数据
        - 圣座终端: 全知室中央的指挥平台。萨拉菲尔在此读取世间数据，并与神国进行通讯
    武装天翼区:
      位置: 环绕在神谕之核外围
      功能: 天使军团的兵营与训练设施所在地，由数个巨大的环形建筑构成。提供战斗训练与装备维护场地
      子地点:
        - 模拟战场: 采用硬光技术生成地形与敌对目标，供天使进行战术演练
        - 光铸军械库: 存放与维护天使制式武装的地方，提供装备检修与能量充能
        - 出击平台: 城市边缘的巨大开放式平台，天使军团降落地面执行任务时的出发点
    宁静居所区:
      位置: 武装天翼区外环
      功能: 天使的生活区域，建筑风格统一。区域内无娱乐设施，执行静音协议
      子地点:
        - 个体休眠舱: 独立的白色休眠舱，天使在此进入休眠状态以恢复机能
        - 精液补给中心: 设有大型能量容器，储存从凡间收集或人工合成的各色精液，天使按阶级权限提取取用
        - “伊甸”生态园: 模拟凡间自然环境的巨大生态穹顶。放养捕捉的凡人与怪物，供天使在闲暇时进入进行狩猎与交配游戏