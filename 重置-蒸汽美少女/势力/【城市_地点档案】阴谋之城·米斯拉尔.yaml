---
  名称: 阴谋之城·米斯拉尔
  所属: 地底世界，苍白精灵领地
  概览:
    - 悬挂于地底溶洞穹顶的立体城市，苍白精灵的阴谋心脏。
    - 建筑为钟乳石雕琢的哥特式尖塔，由悬空石桥连接。
    - 由五大主母家族共同统治，社会运转基于背叛与谎言。
    - 信仰阴影与欲望诸神，盛行奴隶角斗与表演性杀戮。
  主要人物:
    - 菲茵德拉 (第一主母): “毒蝎”家族族长，以阴谋手腕与对谋杀女神的虔诚信仰闻名。
    - 马拉克 (戏剧大师): 永夜角斗场首席导演，专注于创造华丽的死亡表演。
    - 贾拉索 (地表行者): 掌握地表贸易渠道的商人首领，城市与外界的物资情报枢纽。
    - “无声之刃”阴谋团: 中立的精英刺客与捕奴组织，维持家族间恐怖平衡的雇佣力量。
  主要区域:
    主母尖塔区:
      - 位置: 城市最高层。
      - 功能: 五大主母家族的权力中枢与居住地。
      - 子地点:
        - 蛛网议事厅: 悬挂于五塔中央的开放平台，用于商议重大事务。
        - 毒蝎之巢: 第一主母的私人宫殿，布满魔法陷阱与诅咒物品。
    泪光集市区:
      - 位置: 城市中层。
      - 功能: 商业、社交与娱乐中心，光源充足。
      - 子地点:
        - 永夜角斗场: 巨大的圆形剧场，以上演包含情色与创意的死亡表演为主。
        - 奴隶市场: 拍卖各类奴隶的场所，包括苦力、角斗士与玩物。
        - 五女神神殿群: 供奉谎言、黑暗、苍白、谋杀与欲望女神的宗教中心。
    菌类农场与矿坑区:
      - 位置: 城市底层，紧贴地面。
      - 功能: 资源生产区，奴隶劳作之地。
      - 子地点:
        - 哀嚎矿坑: 开采魔法矿物，由灰矮人监管，死亡率极高。
        - 荧光菌圃: 培育食用与照明菌类，安置年老体弱奴隶。
