---
  名称: 东海
  所属: 遗忘之海，米拉比里斯东部
  概览:
    - 位于帝国东部疆域，受死灵王朝魔力辐射。
    - 海域中分布大量不死生物与古代海怪。
    - 帝国海军在此建立前哨进行探索。
  主要势力:
    - 帝国东方勘探舰队: 负责探索的特种舰队，装备对抗亡灵的神术装置。
    - 亡灵海盗: 由怨念或尸骸组成的幽灵舰队，无需补给，极具攻击性。
  主要地点:
    - 沉默海域: 东海深处常年浓雾区，精灵航海王国遗迹所在，极少有船只生还。
    - 骸骨暗礁区: 近海区域，由巨大生物骸骨与沉船构成，亡灵海盗活动区。
    - 前哨要塞·晨星港: 帝国最深入的前哨基地，位于海域中部岛屿，提供唯一补给。
