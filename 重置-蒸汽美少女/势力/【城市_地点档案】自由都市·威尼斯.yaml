---
  名称: 自由都市·威尼斯
  所属: 贸易联邦，西南群岛
  概览:
    - 由比安奇家族统治的水上城市，建筑为洛可可风格，水道密集。
    - 贸易联邦的殖民前哨，通往远西新大陆的唯一门户。
    - 社会特征为帮派公开活动、全民参与“死人乐透”（对帮派火拼结果下注的赌博）。
    - 城市氛围吸引着全大陆的投机者与冒险者。
  主要人物:
    - ‘享乐公爵’·芙拉维娅·比安奇: 比安奇家族的女族长（吸血鬼），通过赞助各方势力维持混乱的平衡，是冒险者的保护伞。
    - ‘船长之王’·巴托洛梅奥: 远西航运公会会长（前海盗），控制所有前往新大陆的航运。
    - ‘九指’·罗科: 最大帮派“泻湖之子”的首领（人类），控制赌博、走私与“死人乐透”盘口。
    - ‘温泉乡’老板娘·咲耶: 月影岛的主人（精灵），其温泉旅馆是城中唯一的中立庇护所。
  主要区域:
    黄金大运河区:
      - 位置: 贯穿主岛的中央水道两岸。
      - 功能: 权贵中心，遍布家族宫殿与俱乐部，守备森严。
      - 子地点:
        - 叹息宫: 芙拉维娅的居所，联邦上流社会的社交中心，日夜举行宴会。
        - 幸运女神大赌场: 官方认证的最大赌场，“死人乐透”的主要场所。
    远航者港区:
      - 位置: 群岛最西侧。
      - 功能: 服务于新大陆航线的港口，冒险者与船员的聚集地。
      - 子地点:
        - 探险家公会: 冒险者协会与航运公会的联合办事处，发布船员招募与探索委托。
        - 新大陆市场: 交易从远西大陆运回的物资、矿物与生物的露天市场。
    迷宫街市区:
      - 位置: 主岛之外的各小岛。
      - 功能: 平民区与灰色地带，帮派火拼频发，遍布妓院与走私窝点。
      - 子地点:
        - 泻湖之子总部: 伪装成渔船仓库的帮派大本营，设有水下秘密通道。
    月影温泉岛:
      - 位置: 主岛群东南方的独立岛屿。
      - 功能: 以魔法温泉闻名的度假区，岛上禁止任何争斗，为各方人士提供庇护。
