---
  名称: 中转港·云雀镇
  所属: 苍穹之海，迷航云海
  概览:
    - 建立在小型稳定浮空岩上的中立补给站。
    - 功能包括物资补给、销赃与跨种族交易。
    - 由管理者阿丽娅维持强制性中立秩序。
  主要人物:
    - “空之旅人”阿丽娅: 城镇管理者，退役翼人剑圣，负责维持治安。
    - “齿轮”海格: “风之砧”工坊主（矮人），提供空艇维修与改造服务。
    - “信鸦”波莉: “渡鸦栖木”酒馆老板，从事云海情报买卖。
  主要区域:
    - 守望者平台: 位于外围的空艇停泊区，设防御炮台与卫队。
    - 十字路口集市: 位于中心的露天商业区，由帐篷与木屋组成。
    - 风之砧工坊: 位于下层近能源核心区的维修厂，利用地热蒸汽运作。
    - 渡鸦栖木酒馆: 位于集市边缘的情报交换点与任务发布地。
    - 静风塔: 位于最高点的古代石塔遗迹，管理者居所与指挥中枢，严禁擅入。
