---
城市地点档案:
  北风村:
    所属: 极北地区/北方部落群
    概览: 经济来源为小片农田和南侧的黑松林地，保留有少量老旧的帝国蒸汽装置
    主要人物:
      - 艾琳娜·霜语(女巫R3): 隐居在附近雪山洞穴的女巫，为村民提供草药、治疗和天气预警，被村民视为“白霜女士”守护者
      - 老铁锤·古纳(R1): 年迈人类村长，唯一能维修蒸汽装置的人，与外界商队进行贸易的主要接洽人
    主要地点:
      - 聚落核心区: 村庄生活中心，十几栋坚固的木石结构房屋组成。包含木石房屋、村长小屋、铁匠铺和“暖炉”旅店（兼杂货铺与酒馆）
      - 黑松林地: 村南的耐寒针叶林，木材与猎物来源地，深处有冬狼等生物。
      - 避风农田: 村东侧山脉避风处的梯田，种植黑麦、土豆，田边的老旧蒸汽水泵是这里最重要的资产
      - 白霜女士的洞穴: 位于村西北雪山半山腰的天然洞穴，艾琳娜的居所，洞口有魔法伪装，内部温暖如春，种植着各种稀有的魔法植物
