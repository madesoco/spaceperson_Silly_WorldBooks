---
地理区域档案:
  极北地区:
    所属: 米拉比里斯大陆
    概览: 北方部落群的家园，兽人、哥布林为主要生存种族，与少量人类、矮人混居
    地理: 范围来到极北边缘，由南向北地势逐渐升高，中心地带被霜巨人山脉贯穿
    风水: 气候严酷，终年被冰雪覆盖，有极昼和极夜现象
    特色: 生存法则是力量决定一切，对南方富饶土地的渴望是驱动此地纷争的最终燃料
    主要势力:
      - 碎骨部落: 由兽人格罗玛克领导的兽人与哥布林的掠劫部落，以碎颅堡为核心，各氏族酋长统一听其号令
    特色设施:
      - 部落营地: 由兽皮帐篷、木质长屋和巨兽骸骨栅栏组成的半永久性定居点
      - 地热温泉: 珍贵的地热资源点，常成为多部落争夺或中立交易的场所
      - 古代遗迹前哨: 冒险者公会或贵族在大型遗迹入口建立的小型补给点
      - 冰钓小屋群: 渔猎部落在冰封湖面上搭建的临时居所
    主要聚落与要塞:
      - 凛冬之牙: 位于冻土最南端，帝国抵御北方部落的巨型军事要塞，冬狼军团驻地
      - 碎颅堡: 位于霜巨人山脉南麓，兽人部落用巨兽骸骨与黑色岩石建造的堡垒，极北唯一城市与战利品交易中心
      - 炉乡: 霜巨人山脉地热山谷中的矮人城镇，以锻造抗寒符文装备闻名
      - 北风村: 霜巨人山脉余脉下的偏远人类村庄，帝国早期开拓计划的遗留点，依靠帝国商队及凛冬之牙贸易艰难生活
    主要地理特征:
      - 霜巨人山脉: 横贯冻土中心地带的巨大山脉，众多冰川与河流的发源，也是地霜巨人的家园
      - 悲伤之海: 位于冻土西北方的巨大内陆咸水湖，冬季也难以完全封冻
      - 巨兽冰川: 自霜巨人山脉向东延伸的巨大冰川，封存着古代生物遗骸
      - 龙眠冰窟: 位于巨兽冰川深处的洞穴系统，一位古龙血脉的白龙龙娘在此沉睡

