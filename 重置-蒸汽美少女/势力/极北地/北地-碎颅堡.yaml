---
城市地点档案:
  碎颅堡:
    所属: 极北地区/碎颅堡
    概览: 沿着东北海岸，用巨兽骸骨与沉船废料野蛮搭建起来的港口
    统治风格: 兽人主宰的武力统治，哥布林负责与外界的贸易；力量至上，所有冲突皆在角斗场解决，女性被视为部落延续的公共财产
    环境气氛: 血腥、汗水、原始欲望
    主要人物:
      - 大军阀·格罗玛什(Lv12): 碎颅堡的统治者，通过无数次角斗胜利登权的巨大兽人，强制制定并执行城内禁止私斗规则
      - “叽里呱啦”·纳克(Lv.9): 年长的哥布林萨满兼首席商人，负责与贸易联邦的船只进行以物易物交易（毛皮、矿石、奴隶换金属工具与烈酒）
      - “驯兽师”格鲁克(Lv.9): 管理着'血腥角斗场'所有野兽怪物与角斗奴隶的食人魔
      - “铁下巴”奥拉夫(Lv.8): 贸易联邦的常驻特使，凭借着狡猾与胆识艰难求生
    主要区域:
      鲜血沙场区:
        - 位置: 城市中心最高地
        - 功能: 核心区域，解决争端裁决角斗场所与全民娱乐场所
        - 子地点:
          - 血腥角斗场: 由巨龙骸骨与岩石建成的露天角斗场，观众席上永远挤满人群
          - 野兽围栏: 角斗场下方的洞穴，囚禁角斗用的各类生物（座狼、巨魔、地行龙等）

      拾荒者港:
        - 位置: 城市东侧海岸，紧邻海岸线
        - 功能: 城市的贸易与对外窗口，由沉船残骸拼凑而成；联邦船只停靠此处交易
        - 子地点:
          - 战利品市场: 交易劫掠品的露天市场，交易着从南方掠夺而来的战利品
          - 奴隶铁笼: 交易奴隶的区域，被俘虏的各族女性在这里被明码标价作为繁殖工具买卖

      大酋长营地区:
        - 位置: 环绕鲜血沙场区的庞大区域
        - 功能: 城市居住与统治区，由营帐、兽皮屋和棚屋构成，无街道规划，强者占据最好的地盘
        - 子地点:
          - 碎颅者大帐: 军阀格罗玛什的居所与权力中心，由最大海兽的肋骨支撑起来的巨大帐篷，门前插满了战败对手的武器
          - 繁殖坑: 各部落圈养女性奴隶并进行公开交配的公共区域，可随时进入在众目睽睽之下与看中的女性进行交配
          - 座狼兽栏: 圈养座狼的兽栏，兼作'废料'处理场
