---
城市地点档案:
  龙眠冰窟:
    所属: 极北地区/北方部落群
    概览: 深藏于巨兽冰川核心的巨大洞穴系统，第四纪元法师研究龙类生物的秘密实验室遗址。因古老的白龙血脉龙娘奥菲莉亚在此沉睡而得名，洞内遍布失控的龙血生物
    环境特征: 极低温，冰壁有魔法符文残光，空气中弥漫着龙威与原始魔力
    主要人物:
      - 奥菲莉亚(Lv.21): 在此沉睡了上千年的白龙血脉龙娘。冰窟力量的源头，所有龙血生物本能守护的核心；睡眠状态不明
      - 龙血生物群: 实验失控产物，包含龙类亚种与魔法生物，将整个冰窟视为自己的领地，攻击所有入侵者
    主要区域:
      - 冰棘回廊: 外部区域，由扭曲冰道与冰柱构成的迷宫，光线昏暗，地形复杂，为小型龙血生物巡猎场
      - 符文遗骸大厅: 中部枢纽，曾是研究核心区，有冰封石柱与建筑残骸，盘踞着更强的龙血生物
      - 永寂之心: 最深处、温度最低的核心，奥菲莉亚沉睡于纯净永冻冰晶构成的悬浮平台上，四周的时间与空间都因其散发的庞大魔力而变得凝滞
