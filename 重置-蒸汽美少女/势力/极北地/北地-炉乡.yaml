---
城市地点档案:
  炉乡:
    所属: 极北地区/炉乡
    概览: 建立在霜巨人山脉深处活火山口与地热山谷之上的矮人城镇，北地的工业、锻造与符文科技中心，依靠地热资源抵御严寒并驱动机械
    社会结构: 由三大锻造氏族族长组成的长老会共治；商业信誉与锻造技艺直接决定个人在城中的社会地位与发言权
    主要人物:
      - “铜须”巴林(Lv.13): 长老会首席兼符文宗师，掌握最高阶的抗寒与坚固符文刻印技术，独自守卫着城镇核心的地热控制阀门
      - 索尔加·石砧(Lv.11): 炉乡守备长，率领重甲矮人火枪手与符文机甲驻守山谷入口，常年负责击退试图抢夺地热资源的霜巨人和高阶魔物
      - 伊凡·火花(Lv.8): 矮人商人行会代表，负责与帝国商队及北方部落进行物资交涉，用高昂的抗寒装备换取粮食、烈酒与稀有矿石
    主要区域:
      大熔炉核心区:
        - 位置: 山谷中央地势最低处，地表裂隙交汇点
        - 功能: 整个城镇的动力心脏与顶级符文装备锻造所
        - 子地点:
          - 永燃火山口: 最大的地热井，周边搭建了巨大的黄铜齿轮架与符文稳定阵列，抽取地热能量分配至全城
          - 宗师工坊: 悬空建立在岩浆湖上方的高温作业区，仅限获得长老会授权的高级工匠进入，专门锻造高阶附魔与符文武器

      外围贸易环区:
        - 位置: 靠近山谷南侧出口的环形梯田状坡地
        - 功能: 炉乡对外开放的商业窗口，外来种族在此进行物资交换
        - 子地点:
          - 中立大集市: 铺设防滑石板的露天广场，规定严禁携带出鞘武器
          - 铁麦酒馆: 由厚重石块砌成的大型建筑。提供地热烘烤的肉排与高度数烈酒，往来佣兵、商人交换极北地图与情报的信息集散地

      深岩居住区:
        - 位置: 环绕大熔炉区两侧，向山体内部开凿的网状洞穴系统
        - 功能: 本地矮人居民的日常起居与后勤保障区
        - 子地点:
          - 氏族保险库: 位于最深处的坚固地堡，由符文锁重重封闭，存放着矮人氏族世代积累的金币、图纸与古代契约石板
          - 地热农田: 利用地底暗河与温泉水汽培育巨大食用真菌和地衣的地下洞穴，为城镇提供基础的食物储备

