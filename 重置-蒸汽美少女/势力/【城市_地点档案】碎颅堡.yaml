---
  名称: 碎颅堡
  所属: 北方部落群，霜巨人山脉东麓
  位置: 东北海岸的港口城市。
  概览:
    - 北方部落群唯一的城市与战利品交易中心。
    - 建筑材料为巨兽骸骨与沉船废料。
    - 统治者为最强的兽人军阀，社会法则为绝对武力，冲突在角斗场解决。
    - 哥布林负责与外界的贸易。
    - 女性被视为部落延续的公共财产。
    - 环境气味：血腥、汗水、海盐。
  主要人物:
    - 大军阀·格罗玛什·碎颅者: 兽人，碎颅堡的统治者，通过角斗获得地位，制定并执行城内禁斗规则。
    - “叽里呱啦”·纳克: 哥布林萨满兼首席商人，负责与贸易联邦进行以物易物交易（毛皮、矿石、奴隶换金属工具与烈酒）。
    - “驯兽师”格鲁克: 食人魔，管理角斗场的野兽、怪物及角斗奴隶。
    - “铁下巴”奥拉夫: 贸易联邦的常驻特使。
  主要区域:
    鲜血沙场区:
      - 位置: 城市中心高地。
      - 功能: 核心区域，争端裁决所与娱乐场所。
      - 子地点:
        - Waaagh!角斗场: 由巨龙骸骨与岩石建成的露天角斗场。
        - 野兽围栏: 角斗场下方的洞穴，囚禁角斗用的各类生物（座狼、巨魔、地行龙等）。
    拾荒者港:
      - 位置: 城市东侧海岸。
      - 功能: 贸易与对外窗口，由沉船残骸拼凑而成。
      - 子地点:
        - 战利品市场: 交易劫掠品的露天市场。
        - 奴隶铁笼: 交易奴隶的区域，被俘虏的各族女性作为繁殖工具被定价交易。
    大酋长营地区:
      - 位置: 环绕鲜血沙场区。
      - 功能: 居住与统治区，由营帐、兽皮屋和棚屋构成，无街道规划。
      - 子地点:
        - 碎颅者大帐: 军阀格罗玛什的居所与权力中心。
        - 繁殖坑: 各部落圈养女性奴隶并进行公开交配的公共区域。
        - 座狼兽栏: 圈养座狼的兽栏，兼作废料处理场。
