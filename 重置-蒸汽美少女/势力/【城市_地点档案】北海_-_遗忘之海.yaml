---
  名称: 北海
  所属: 遗忘之海，米拉比里斯西北部
  位置: 夹在帝国西北海岸与卡尔瓦德共和国之间。
  概览:
    - 气候严酷但海面开阔，是稳定高效的贸易走廊。
    - 帝国蒸汽铁甲舰与共和国游击快船在此争夺航线控制权。
    - 海盗活动相对稀少。
  主要势力:
    - 帝国北海舰队: 驻扎于利维亚坦之门的主力舰队，装备精良，负责保护至远西大陆航线。
    - 卡尔瓦德共和国海军: 由改装商船与快船组成，利用地形优势进行骚扰作战。
  主要地点:
    - 利维亚坦之门: 帝国最大军港与造船基地，位于海域东岸（帝国境内）。
    - 铁锚湾: 共和国海军母港，受重炮与山脉保护，位于海域西岸（共和国境内）。
    - 鲸落航道: 北海最繁忙商业航线，因古代巨鲸迁徙路线得名，是双方争夺焦点。
