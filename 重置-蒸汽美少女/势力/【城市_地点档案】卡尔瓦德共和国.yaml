---
  名称: 卡尔瓦德共和国
  所属: 西方诸王国，阿尔比恩帝国以西
  概览:
    - 大陆西方的共和国，帝国的长期对手，诞生于天赋人权思想。
    - 国土多山地丘陵，国民性格坚韧独立。
    - 建筑风格由旧时代巴洛克演变为简约帝政风格。
    - 国家氛围充满革命热情，视抗争为自由的代价。
  主要人物:
    - 第一执政·玛丽安娜: 最高领导人，内战中崛起的平民英雄，行事务实铁腕。
    - “山地将军”让·路克: 军队总司令，山地游击战专家，多次挫败帝国入侵。
    - “真理报”主编·卡米耶: 革命思想传播者，言论激进，常与务实政策冲突。
    - “怪物猎人”公会联盟: 国内冒险者公会联盟，负责维持治安与清剿怪物，政治影响力大。
  主要地点:
    自由之城·瓦尔米:
      - 地位: 首都，建立在陨石坑盆地中的要塞城市。
      - 布局: 位于国家中心，被险峻环形山包围，层层递进。
      - 子地点:
        - 国民议会宫: 旧王宫改建的权力中心，风格庄严，广场用于集会。
        - 革命纪念碑: 市中心方尖碑，铭刻烈士姓名，长明火永不熄灭。
        - “坚盾”要塞群: 沿环形山修建的防御工事网，布满炮台与护盾发生器。
    铁砧镇:
      - 地位: 北部工业重镇，位于龙脊山脉西麓。
      - 功能: 生产武器弹药，遍布兵工厂与冶炼厂，环境充满煤灰。
    哨兵村:
      - 地位: 边境武装聚落的统称。
      - 功能: 农垦与军事前哨结合，村民战时即兵，对抗怪物与帝国侦察。
