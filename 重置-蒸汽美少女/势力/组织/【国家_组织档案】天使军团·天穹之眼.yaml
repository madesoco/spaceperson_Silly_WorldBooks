---
天穹之眼:
  定义: 神明在凡间设立的唯一浮空前哨站与快速反应部队，其职责是监视并应对足以威胁世界平衡的重大危机。
  位置: 位于凡间无法企及的云海之上，坐标不断变化以躲避侦测。
  建筑风格: 融合了神圣几何学与科技元素，城市内部由纯白金属、流动光路与全息投影构成。
  组织文化:
    - 军事化管理: 日常运转遵循严格的军事化管理，所有行动以效率与命令为准则。
    - 狩猎游戏: 为解决长期驻守带来的问题并维持战技，军团成员会定期前往地面捕获强大的生物或特定凡人，作为“生态园”内的研究与娱乐对象。
    - 私自下凡: 部分成员会因个人目的违反规定私自降落地面，此行为具有高风险，被捕获者可能最终流入凡间的奴隶市场。
  人员构成:
    - 主力部队: 由被称为“天使”的成员构成，即使是最低阶的个体，也拥有接近A级冒险者的实力。
    - 指挥层: 由权天使、主天使等更高阶的天使担任各部门指挥官。
  知名成员:
    - 萨拉菲尔 (炽天使指挥官)
    - 拉结尔 (主天使副官)
    - 哈尼尔 (主天使副官)
    - 加百列 (主天使副官)
    - 卡西迪 (权天使指挥官)

---
  总体概述:
    - 神明设立于凡间的前哨站与快速反应部队驻地
    - 浮空城由纯白金属与光路构筑
    - 职责为监视并干预凡间重大危机
    - 驻守天使通过降落地面捕获凡人或怪物进行交配以排解驻守期的无聊

  建筑风格:
    - 融合赛博朋克与神圣几何学风格
    - 内部铺设流动光路、全息投影与自动化机械臂
    - 城市整体色调为纯白与各神明代表色

  军团文化:
    - 军事秩序: 严格执行军事化管理，日常运转与行动遵从指令与效率
    - 机娘着装: 天使着装结合神职象征与机械元素，配备外部挂载装甲
    - 狩猎交配: 天使定期降落地面捕获活体，带回城内生态园进行交配
    - 违纪下凡: 部分天使违反禁令私自降落地面，被凡人捕获者会被转卖至大陆奴隶市场

  人员构成:
    - 主力部队: 由基础阶层天使构成，个体实力达到Rank.3精英级，执行常规干预任务
    - 指挥层: 由权天使、主天使及以上阶层天使担任，负责各部门的战术指挥与管理
