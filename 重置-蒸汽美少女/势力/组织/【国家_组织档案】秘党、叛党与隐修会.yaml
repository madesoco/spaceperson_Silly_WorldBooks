---
血族派系:
  摘要: 血族社会因理念与生存方式的差异，分化为三大核心派系。他们之间的合纵连横与明争暗斗，构成了大陆阴影中持续数个世纪的暗线。
  派系列表:
    - 秘党:
      保守派系: 血族中最庞大古老的传统派系，致力于融入人类上层社会进行隐秘统治，视过度变化为威胁。
      核心理念: 秩序、传统、隐匿。通过潜伏于人类权力结构，以最小代价获取稳定与安全。
      影响范围: 以阿尔比恩帝国为核心，成员多以帝国贵族身份活动，掌控着帝国地下的经济与情报网络。
      组织结构: 由七个氏族的族长组成最高议会，决策缓慢但影响深远。
      知名人物:
        - 卡蜜拉: 真祖，秘党的精神象征，行为难以预测，通常不参与决策。
        - 伊莎贝拉·冯·卡斯坦因: 卡斯坦因家族族长，秘党在帝国权力核心的代表人物。
        - 伊莱恩·德·维尔: 奥古斯都代理人，负责维持西部工业重镇的地下秩序。

    - 叛党:
      革命派系: 由新生代血族构成，以追求自由为旗帜，反抗秘党长老统治的激进派系。
      核心理念: 自由、变革、力量。唾弃陈腐规则，鼓励公开展示血族的力量。
      影响范围: 贸易联邦的实际掌权者，联邦四大家族均为叛党核心氏族，将联邦作为对抗帝国与秘党的基地。
      组织结构: 由四大家族族长组成的议会共同决策，行动迅速直接，充满内部竞争。
      知名人物:
        - 卡特琳娜·斯福尔扎: 叛党创始人与核心领袖，联邦的政治与军事大脑。
        - 吉安·维斯孔蒂: 叛党的经济支柱，掌控联邦的工业与矿业。
        - 卢克雷齐亚·科伦坡: 叛党的技术核心，负责研发战争用的生物兵器。
        - 芙拉维娅·比安奇: 叛党的财富象征，其治下的威尼斯是派系重要资金来源。
        - 茱莉安娜·斯福尔扎: 被派往奥古斯都的精英战士，叛党的矛头。

    - 隐修会:
      中立团体: 由选择脱离派系纷争，追求个人目标的古老血族组成。
      核心理念: 中立、自保、旁观。对派系斗争不感兴趣，只专注于自身存续。
      影响范围: 无固定地盘，成员散布世界各地，从不主动暴露身份。
      组织结构: 无固定结构，是一个基于共同理念的松散互助网络。
      知名人物:
        - 贝妮代塔: 真祖，帝国国教教宗，隐修会最强大的存在，以教宗身份作为伪装，为成员提供庇护。
