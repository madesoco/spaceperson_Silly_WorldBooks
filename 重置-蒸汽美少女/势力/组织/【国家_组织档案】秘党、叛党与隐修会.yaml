血族派系概览:
  摘要: "血族社会内部因理念与生存方式的差异，分化为三大核心派系。他们之间的合纵连横与明争暗斗，是大陆阴影中一条持续了数个世纪的主线。"
  派系:
    - 名称: 秘党
      摘要: "血族社会中最庞大古老的保守派系，致力于维护传统，将自身完美地融入人类上层社会进行隐秘统治，视过度的变化为威胁。"
      核心理念: "秩序、传统、隐匿。通过潜伏于人类权力结构中，以最小的代价获取稳定与安全，维持血族社会的永恒秩序。"
      影响范围: "以阿尔比恩帝国为核心地盘，其成员多以帝国贵族的身份活动，掌控着帝国地下的经济与情报网络。"
      组织结构: "由十三个氏族中的七个氏族族长组成最高议会，推举年长者为议会长，决策缓慢但影响深远。"
      重要人物:
        - 姓名: 卡蜜拉
          称号: "真祖，永恒的游戏玩家"
          职责: "秘党的精神象征之一，但其行为难以预测，通常不参与派系决策，只在苏醒时凭兴趣行事。"
        - 姓名: 伊莎贝拉·冯·卡斯坦因
          称号: "卡斯坦因家族族长，议会长老"
          职责: "秘党在帝国权力核心的代表人物之一，是维持派系在帝国影响力的关键。"
        - 姓名: 伊莱恩·德·维尔
          称号: "奥古斯都代理人，蛛丝女爵"
          职责: "秘党在西部工业重镇奥古斯都的最高执行官，负责维持当地的地下秩序并对抗叛党的渗透。"

    - 名称: 叛党
      摘要: "由新生代血族构成，以追求自由平等为旗帜，反抗秘党长老统治的激进革命派系。"
      核心理念: "自由、变革、力量。唾弃秘党的陈腐规则，认为力量应由自身争取而非血脉赋予，鼓励成员公开展示血族的力量。"
      影响范围: "贸易联邦的实际掌权者，联邦的四大家族均为叛党的核心氏族，将联邦打造成了对抗帝国与秘党的桥头堡。"
      组织结构: "由四大家族族长组成的议会共同决策，行动更迅速直接，充满了活力与内部竞争。"
      重要人物:
        - 姓名: 卡特琳娜·斯福尔扎
          称号: "斯福尔扎家族族长，联邦议会长"
          职责: "叛党的创始者与核心领袖之一，是派系的政治与军事大脑。"
        - 姓名: 吉安·维斯孔蒂
          称号: "维斯孔蒂家族族长，骸骨公爵"
          职责: "叛党的经济支柱，掌控着联邦的工业与矿业命脉。"
        - 姓名: 卢克雷齐亚·科伦坡
          称号: "科伦坡家族族长，禁忌塑师"
          职责: "叛党的技术核心，负责研发用于战争的生物兵器。"
        - 姓名: 芙拉维娅·比安奇
          称号: "比安奇家族族长，享乐公爵"
          职责: "叛党的财富与自由象征，其治下的威尼斯是派系资金的重要来源。"
        - 姓名: 茱莉安娜·斯福尔扎
          称号: "血刃剑姬，叛党先锋"
          职责: "被派往奥古斯都扰乱秘党统治的精英战士，是叛党最锋利的矛头。"

    - 名称: 隐修会
      摘要: "一群选择脱离派系纷争，追求个人目标或纯粹享乐的古老血族组成的中立团体。"
      核心理念: "中立、自保、旁观。对秘党与叛党的斗争不感兴趣，认为两者皆是过眼云烟，只专注于自身的存续与目标的实现。"
      影响范围: "没有固定的地盘，成员散布于世界各地藏匿于不为人知的角落，从不主动暴露身份。"
      组织结构: "无固定的组织结构，更像是一个基于共同理念的松散互助网络，成员间联系稀少。"
      重要人物:
        - 姓名: 贝妮代塔
          称号: "真祖，帝国国教教宗"
          职责: "隐修会中最强大的存在，唯一一位常驻于世的真祖。她以教宗的身份作为完美的伪装，以旁观者的心态观察着凡世的戏剧，偶尔为隐修会成员提供庇护。"
