---
组织档案:
  血族-叛党:
    概述: 由新生代血族构成，以追求自由平等为旗帜，反抗秘党长老统治的激进革命派系
    理念: 自由、变革、力量，认为力量应由自身争取而非血脉赋予
    组织结构: 由四大家族族长组成的议会共同决策，行动更迅速直接，充满了活力与内部竞争
    重要人物:
      - 卡特琳娜·斯福尔扎(Lv.13): 家族族长，联邦议会长，第三代血族。叛党的创始者与核心领袖之一，是派系的政治与军事大脑
      - 吉安·维斯孔蒂(Lv.10): 族长，骸骨公爵，第六代。叛党的经济支柱，掌控着联邦的工业与矿业命脉
      - 卢克雷齐亚·科伦坡(Lv.11): 族长，禁忌塑师，第五代。叛党的技术核心，负责研发用于战争的生物兵器
      - 芙拉维娅·比安奇(Lv.10): 家族长，享乐公爵，第七代。叛党的财富与自由象征，其治下的威尼斯是派系资金的重要来源
      - 茱莉安娜·斯福尔扎(Lv.8): 血刃剑姬，第八代。被派往奥古斯都扰乱秘党统治的精英战士，是叛党作战先锋
