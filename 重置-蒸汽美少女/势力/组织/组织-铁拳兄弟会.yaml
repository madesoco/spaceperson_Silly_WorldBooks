---
组织档案:
铁拳兄弟会: 盘踞在帝国西部工业重镇“奥古斯都”地下世界的最大帮派，由退役军人与失业工人组成，以暴力和纪律维持着对走私与黑市的控制。
  核心业务:
    - 武器走私: 将工厂淘汰或失窃的武器贩卖给边境匪帮或西部诸国的抵抗组织。
    - 地下拳赛: 经营着奥古斯都最血腥的地下角斗场。
    - 暴力催收: 为商人提供处理债务的非官方服务。
  组织结构:
    - 领袖: 总头目“铁锤”格里高尔，一名前帝国军士官。
    - 管理模式: 采用准军事化管理，下设多个由“工头”领导的行动小组。
  势力范围:
    - 总部: 位于奥古斯都“下层·暗渠街”的一个废弃蒸汽动力工厂内。
    - 竞争对手:
      - 吸血鬼秘党: 地下世界的主要竞争对手。
      - 总督府卫队: 地表上的执法者，时常进行清剿。
