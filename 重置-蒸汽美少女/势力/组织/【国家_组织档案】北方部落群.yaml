---
北方部落群:
  概述: 一个位于阿尔比恩帝国北方的泛称区域，由众多在恶劣环境中挣扎求生的部落组成。该地区以兽人为主导，内部纷争不断，是帝国北境的长期军事威胁。
  地理:
    位置: 阿尔比恩帝国以北的广袤区域。
    环境: 气候恶劣，气温寒冷，遍布古代遗迹，同时充满了危险的野生生物和游荡的不死生物。
  社会:
    种族构成: 由多种族部落构成，但兽人是此地事实上的统治种族。
    社会结构: 部落林立，彼此之间因各种原因频繁争战，将俘虏的人口作为奴隶或劳工。
    政治动态: 内部极度分化，但在面对南方帝国的共同威胁时会暂时联合。历史上，常由某个强大的部落统一大部分区域后向南发动入侵。