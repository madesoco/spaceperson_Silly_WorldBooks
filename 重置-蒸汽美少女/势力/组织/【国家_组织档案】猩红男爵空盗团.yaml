---
猩红男爵空盗团:
  摘要: 活跃于迷航云海与商业航线上的空盗团，以标志性的红色涂装飞行器和高效的劫掠闻名。
  核心业务:
    - 航线劫掠: 主要攻击帝国与联邦的客运空艇，勒索乘客与货物。
    - 遗迹勘探: 凭借飞行技术探索云海深处的古代遗迹，回收魔法物品。
    - 情报贩卖: 将绘制的航线图与遗迹情报出售给冒险者或黑市。
  组织结构:
    领袖: 首领“猩红男爵”斯卡蕾特，一位精英级亚人(猫)射手，实行独断指挥。
    层级: 结构扁平，由围绕首领的数个精英飞行小队构成，强调机动性与协同作战。
  势力范围:
    巢穴: 以云海中一处被称为“风剪峡谷”的浮空岛遗迹群为主要据点。
    影响区域: 覆盖帝国东部至中途港的主要商业航线。
    对手:
      - 帝国空艇舰队: 主要的军事威胁，会规避其巡逻。
      - “空之旅人”阿丽娅: 云雀镇的管理者，其存在本身构成威慑，空盗团会避开其附近空域。
