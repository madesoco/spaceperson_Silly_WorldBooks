---
东方契约:
  定义: 一个基于东方沙海与雨林特殊地理环境，由三位女性主导者为维护各自利益而形成的非正式权力集合体。她们通过互不侵犯条约、商业往来与情报共享，共同维持地区平衡。
  核心成员:
    - 扎赫拉 (绿洲领主): 以卡迪加绿洲为中心，凭借守护结界为商旅提供庇护，是契约中的秩序象征与防御核心。
    - 莉安德拉·希尔瓦纳 (森林守望者): 作为月语氏族长老，守护着翡翠迷宫的秘密。她是不干涉主义的观察者，但会在死灵王朝异动时向盟友提供预警。
    - 法蒂玛·阿卜杜勒 (沙海明珠): 掌控着横跨沙海的商路与遗迹交易网络，是契约的经济与情报中枢。
  共同利益:
    - 维持稳定: 防止帝国势力过度干预或死灵王朝大规模复苏。
    - 资源互补: 法蒂玛的商队为扎赫拉带来物资，扎赫拉的绿洲为商队提供补给点，莉安德拉的情报则为两者提供安全保障。
  内部关系: 一种基于务实利益交换的疏远合作。三方主要通过法蒂玛的商业网络进行间接沟通，保持着安全距离。
