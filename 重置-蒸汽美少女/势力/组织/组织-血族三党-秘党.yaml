---
组织档案:
  血族-秘党:
      概述: 血族社会中最庞大古老的保守派系
      理念: 秩序、传统、隐匿为理念，通过潜伏于人类权力结构中，以最小的代价获取稳定与安全，维持血族社会的秩序
      组织结构: 由十三个氏族中的七个氏族族长组成最高议会，推举年长者为议会长，决策缓慢但影响深远
      重要人物:
        - 卡蜜拉: 秘党的精神象征之一，但其行为难以预测，通常不参与派系决策，只在苏醒时凭兴趣行事
        - 伊莎贝拉·冯·卡斯坦因: 家族族长，议会长老，第四代血族；秘党在帝国权力核心的代表人物之一
        - 伊莱恩·德·维尔: 奥古斯都代理人，蛛丝女爵，第八代血族；秘党在西部工业重镇奥古斯都的最高执行官，负责维持当地的地下秩序并对抗叛党的渗透
