
---
地理区域档案:
  苍穹之海:
    所属: 米拉比里斯大陆
    势力组成:
      天使军团: 驻扎于云海之上的神明前哨部队，最高空的秩序守护者与监视者
      翼人氏族: 天生的天空居民，在云海中的浮空岛屿上建立家园，依靠狩猎空行生物与采集特殊植物为生
      空盗团伙: 驾驶改装空艇，以云层和浮空遗迹为掩护的武装掠夺者，是帝国与联邦空运航线的主要威胁
      空艇勘探队: 受帝国皇家勘探协会或联邦商会资助的专业团队，负责测绘云海地图、搜寻法师纪元浮空城遗迹与稀空资源
    空域划分:
      云上圣所:
        位置: 苍穹之海最高层
        概述: 凡人无法企及的云海之上，天使军团前哨站'天穹之眼'的绝对领域
      迷航云海:
        位置: 苍穹之海中层
        概述: 充满不稳定气流、浮空岛屿以及法师纪元遗迹的空域，空中海盗与探险家的主要活动区域
      凡人天穹:
        位置: 苍穹之海底层
        概述: 云层之下凡人日常可见的空域，帝国与联邦空艇商业航线的飞行范围，无固定地点
