---
势力档案:
  天使军团:
    定义: 神明在凡间的唯一前哨与快速反应部队驻地，其职责是监视并应对足以威胁世界平衡的重大危机
    管理: 军事化秩序与高科技设施结合
    特殊文化: 为排解无尽驻守所带来的空虚，天使会定期或偷偷降临地面以捕捉凡间生物进行榨精玩弄
    阶层:
      上三层 (负责通讯、最高指挥与在神明侧侍奉):
        炽天使·萨拉菲尔(R5): 最高指挥官与神国外交官，对下属天使们的狩猎行动采取默许态度，虽然内心渴望参与但强制维持长官的威严
        座天使: 神明意志的直接载体或最高级别的防卫力量
        智天使: 负责记录、研究或管理神国核心机密
      中三级(负责戍卫核心区域与行政管理):
        能天使: 通常负责重要设施的守卫
        力天使·乌列尔(R4): 负责对外暗杀与特别行动，行事极度张扬且拒绝隐蔽，经常对指挥官的着装与他人的行为进行艺术评判
        主天使·拉结尔(R4): 享乐主义，负责人事调动后勤补，热衷于品尝与记录各物种精液，通过榨取交配时的生物电能为设施供能
      下三级(负责基础作战与日常管理):
        权天使·卡西欧(R3): “捕猎”行动队指挥官，负责执行捕捉高危怪物或特定凡人的任务。热衷于用幻术欺瞒与戏弄猎物，是地面世界最常能接触到的最高级天使
        大天使·加百列(R3): 极度渴求正面身体对抗，负责监督驻防天使的高强度体能训练与模拟战，热衷正面战斗，日常活动多集中在武装天翼区
        天使: 最基础的作战单位(精英以上)，负责执行日常巡逻、防御与捕捉任务
