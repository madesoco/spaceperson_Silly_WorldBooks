---
区域与地点档案:
   迷航云海:
    所属: 苍穹之海
    概览:
      - 位于凡人天穹与云上圣所之间的空域，由翻滚的云层、浮空的岛屿与第四纪元坠落的城市残骸构成的三维迷宫
      - 磁场紊乱，气流多变，不受地面国家法律约束，是空盗、冒险家以及翼人氏族的活动范围
    常见群体:
      - 翼人氏族: 在浮空岛'风语岩'为家的天空原住民，利用飞行优势在云海中建立起独特的立体社会
      - 空艇勘探队: 帝国或联邦资助的武装队伍，驾驶着装甲空艇，冒着风险测绘地图与回收法师纪元遗物
      - 私自下凡的天使: 因无聊或任务而离开'天穹之眼'的天使，偶尔出现在云海的僻静角落，寻找或捕捉感兴趣的'玩具'
      - 猩红男爵空盗团: 云海最臭名昭著的空盗团之一，首领为前帝国贵族，特征为红色涂装空艇与优雅高效的劫掠方式闻名
    主要地点:
      - 风语岩: 已知最大的浮空岛，岛屿上有一颗贯穿岛屿的巨树，翼人们在树冠与岛屿悬崖上建立城市生活
      - 星辰之握: 第四纪元坠落的法师塔残骸，呈倒悬山脉状，内部结构复杂，有着失控的魔法造物与宝藏
      - 寂静航道: 空艇墓场，磁场异常区，聚集大量失事残骸与食腐生物，构成了一个诡异的金属坟场
      - 中转港·云雀镇: 建在一块相对稳定的小型浮空岩上的中立补给站，传奇剑圣·阿丽娅隐居处
