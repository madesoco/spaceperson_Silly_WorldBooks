---
城市与地点档案:
  云雀镇:
    所属: 苍穹之海/迷航云海
    概览: 建在小型浮空岩上的中转港小镇，云海中勘探队补充物资、空盗销赃、翼人与外界交易的场所；在阿丽娅的铁腕与公正管理下，维持着脆弱但有效的秩序
    主要人物:
      - “空之旅人”阿丽娅(Lv.17): 云雀镇最高管理者与秩序的化身，退役翼人剑圣，以强大的实力确保了港口的中立与安全
      - “齿轮”海格(Lv.8): 镇上唯一的空艇维修工坊'风之砧'的老板，矮人男工程师，提供空艇维修与改造服务
      - “信鸦”波莉(Lv.4): “渡鸦栖木”酒馆老板(狐娘)，从事云海各类情报买卖
    主要区域:
      - 守望者平台: 访客抵达的第一站，小镇唯一空艇停泊区，由主岩石延伸出的巨大平台构成。设有简易的防御炮台，由阿丽娅的卫队看守秩序
      - 十字路口集市: 位于浮空岩中心区域，由帐篷与简易木屋搭建而成，主要商贸区与连接小镇其他主要地点中转站
      - 风之砧工坊: 位于下层近能源核心区的维修厂，利用地热蒸汽运作
      - 渡鸦栖木酒馆: 位于集市边缘不起眼的角落，小镇情报交换点与任务发布地
      - 静风塔: 耸立于浮空岩的最高处，一座古代遗迹改造而成的石塔，阿丽娅的私人居所与管理中心
