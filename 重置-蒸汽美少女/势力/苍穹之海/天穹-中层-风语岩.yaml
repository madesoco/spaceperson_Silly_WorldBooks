---
区域与地点档案:
  风语岩:
    所属: 苍穹之海/迷航云海
    概览: 岛屿由一颗贯穿始终的巨树“天之心”维系着浮力与生态，翼人们在树冠与悬崖峭壁上建立了立体城市，充满了自然的和谐与天空住民的骄傲
    主要人物:
      - “天语者”伊思拉(Lv.7): 氏族议会翼人年长女大长老，负责解读风向与巨树状态，拥有最高裁决权
      - “风剪”凯(Lv.5): 卫队青年翼人总指挥官，专精飞行机动与矛术，负责岛屿的防卫与巡逻
      - “云旅者”莉诺尔(Lv.3): 风之集市翼人管理者，精通帝国语，对地面世界充满好奇。负责与所有外来空艇商人进行贸易与交涉
    主要区域:
      - 巨木之巢: 位于中心与上层的居住区，建立在巨树枝干与树冠之上。无数吊桥与藤梯连接着大大小小的树屋，构成了城市的交通网络
      - 岚歌圣坛: 氏族议会与祭祀仪式的举办地，位于巨树顶端的露天平台。可以俯瞰整片云海，是翼人眼中最接近天空与神明的地方
      - 风之集市: 建立于岛屿边缘巨大悬空平台上的贸易区。外来的空艇可在此停靠，翼人们在此用云海特有的浮空矿石、魔法植物与羽毛，交换来自地面的资源
      - 天穹之跃: 一处从主岛延伸出去的巨大悬崖，是年轻翼人学习与磨练飞行技巧的训练场。翼人们在这里进行飞行表演与竞技，是云海中最为热闹的场所之一
