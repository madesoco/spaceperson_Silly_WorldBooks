---
  名称: 西部破碎之地
  所属: 泰拉·米拉比里斯，阿尔比恩帝国以西
  概览:
    - 位于帝国西部的广袤纷争区域，地形破碎，由峡谷、丘陵与森林构成。
    - 无统一政权，由王国、城邦、部落与共和国共存，摩擦不断。
    - 复杂地形为独立势力提供了屏障，也成为怪物与不法之徒的巢穴。
    - 区域特征为变化剧烈，冲突频繁，空气中常混杂寒意与硝烟。
  常见人物:
    - 共和国游击队: 卡尔瓦德士兵，擅长山地战，使用火绳枪与长戟，利用地形周旋。
    - 怪物猎人: 受雇于领主与村庄的专业冒险者，以猎杀强大怪物为生，声望极高。
    - 流亡贵族: 因政变或战争失败流亡的旧贵族及扈从，谋求复国或沦为高级佣兵。
    - 开拓佣兵团: 由大势力资助的武装团体，建立前哨站与探索资源，伤亡率极高。
    - 巡回学者: 来自智识之城的学者，进行考古与社会研究，受各方保护。
  常见危险生物:
    - 鸟身女妖: 盘踞峡谷悬崖的飞行怪物，歌声能魅惑旅人，巢穴位于绝壁。
    - 奇美拉: 栖息于遗迹或火山的魔法生物，身体结构复杂，适应多种环境。
    - 地行龙: 丘陵与森林的掠食者，领地意识极强，攻击大型入侵生物。
    - 穴居攫怪: 潜伏于洞穴与阴暗林顶的伏击者，利用伪装与触手捕食。
  主要势力:
    - 卡尔瓦德共和国: 东部大型共和国，承袭革命思想，国民擅长山地战。
    - 七姐妹城邦联盟: 东南部商业城邦群，紧邻智识之城，受其文化影响深远。
    - 银叶王国: 中部银叶森林的古老精灵王国，与世隔绝，警惕外来者。
    - 铁颚部落: 东北角兽人与人类混居部落，抗击北方寒冷与怪物，与共和国有冲突。
  主要地理:
    - 皇帝之墙遗址: 帝国古代防御线，现已倾颓，残存部分成为帝国与共和国的天然边界。
    - 哀嚎之痕: 共和国内战古战场，巨大峡谷，聚集大量不死生物与食腐怪物。
    - 低语群山: 西部广阔山脉，风过山洞如人语，遍布矮人废弃矿道。
  特色聚落:
    - 望乡崖: 皇帝之墙断口处的自由贸易镇，三不管地带，交易情报与违禁品。
    - 坚盾村: 共和国边境武装村庄代表，全民皆兵，以此抵御帝国渗透。
    - 静谧溪谷: 银叶森林外围翼人聚落，向城邦提供草药与水晶。
