---
  名称: 卡迪加绿洲城
  所属: 东方沙海，中部地区
  概览:
    - 坐落于东方沙海最大的绿洲之上，是东西商路的重要枢纽。
    - 由大师级女巫领主扎赫拉以实力统治，信条为“水源即法则”。
    - 建筑由砂岩与粘土构成，为旅人提供庇护。
  主要人物:
    - 绿洲领主·扎赫拉: 城市的绝对统治者（年轻女巫），守护生命之泉，能将冒犯者变为沙雕。
    - “沙狼”商队联盟: 垄断进出货运的商队组织，领袖为独眼人类奥马尔。
    - “寂静守望者”: 领主的直属组织，负责城市秩序与巡逻，成员身穿罩袍。
  主要区域:
    生命之泉区:
      - 位置: 城市中心。
      - 功能: 核心圣地，有泉水与椰枣林，由精锐卫队守护，严禁冲突。
      - 子地点:
        - 领主宫殿: 魔法塑造的砂岩宫殿，扎赫拉的居所，水脉源头。
        - 泉边花园: 公共休憩区，在此动武视为对领主的直接挑衅。
    商队驿站区:
      - 位置: 环绕生命之泉区。
      - 功能: 商业与交流中心，城市最喧闹的区域。
      - 子地点:
        - 巨兽市场: 交易大型沙漠坐骑的市场。
        - 旅人之帐: 旅店、酒馆、妓院的综合娱乐区，供商队成员消费。
    土墙镇:
      - 位置: 城市最外围。
      - 功能: 平民、工匠与贫困者的居住区，街道复杂，是地下势力的温床。
      - 子地点:
        - 陶工坊: 制作陶器，特别是储水用的大陶罐。
