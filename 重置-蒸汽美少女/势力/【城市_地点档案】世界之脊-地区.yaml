---
  名称: 世界之脊
  所属: 米拉比里斯
  概览:
    - 第四纪元魔法抬升的宏伟山脉，东西大陆的天然屏障。
    - 内部存在地质剧变形成的地下河道与峡湾，连接两侧海洋。
    - 环境特征为高海拔寒冷、岩石地形与潮湿水汽。
  常见群体:
    - 山地开拓矮人: 在矿脉建立据点，开采水晶与金属。
    - 云顶翼人哨站: 山脉顶峰的聚落，为穿越空艇提供指引。
    - 高山勘探队: 帝国与联邦派遣的测绘团队，评估战略价值。
    - 水道走私者: 利用地下河道进行非法运输的亡命徒。
  常见危险生物:
    - 山崩巨兽: 伪装成岩石的元素生物，能引发崩塌。
    - 冰川蠕虫: 冰川下的巨大捕食者，对震动敏感。
    - 峡谷风蛇: 栖息于峡谷的群居巨型蛇类，利用气流攻击。
  主要区域:
    - 逆流峡湾: 贯穿山脉主体的地下河道系统，环境复杂。
    - 中途港: 位于峡湾中部的溶洞港口。
    - 万年冰川带: 山脉北段覆盖区，封存古代遗迹。
    - 风蚀石林区: 山脉南段石柱群，风元素材料产地与风蛇巢穴。
