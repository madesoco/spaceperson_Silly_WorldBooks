---
  名称: 东方沙海与雨林
  所属: 米拉比里斯大陆，阿尔比恩帝国以东
  概览:
    - 由西部的“流沙之海”沙漠与东部的“翡翠迷宫”雨林构成。
    - 气候极端，白日酷热，夜晚寒冷。
    - 是第三纪元死灵王朝的埋骨之地，遍布遗迹。
    - 法则：水是生命，遗迹是财富与死亡的源头。
  常见人物:
    - 绿洲卫队与沙匪: 装备弯刀与老式火枪，身份界限模糊。
    - 遗迹探险队: 来自奥斯提亚的专业团队，配备蒸汽沙地车等装备。
    - 沙漠游牧民: 逐水草而居的人类部落，掌握沙漠生存知识。
    - 亡灵崇拜者: 试图唤醒死灵王朝力量的秘密教派，对探险队构成威胁。
  常见危险生物:
    - 沙地巨蟒: 潜伏沙下的巨型掠食者，含神经毒素。
    - 食尸鬼群: 游荡在遗迹周边的食腐不死生物，利爪带麻痹效果。
    - 仙人掌怪: 伪装成植物的伏击者，能发射尖刺。
    - 圣甲虫群: 守护陵墓的魔法昆虫，甲壳坚硬，成群吞噬血肉。
    - 奇美拉: 死灵法师的战争造物，能喷吐酸液与毒雾。
  主要地理与聚落:
    - 流沙之海: 区域西部的广阔沙漠，沙下有古城遗址与流沙陷阱。
    - 翡翠迷宫: 区域东部的湿热雨林，有第四纪元精灵的城市废墟。
    - 奥斯提亚: 帝国东方门户，沙漠边缘的冒险者之都，所有探索的起点与终点。
    - 卡迪加绿洲: 沙漠深处的独立城邦，由女巫扎赫拉统治，是商路上的重要庇护所。
    - 无名法王之墓: 半埋于沙下的巨大金字塔群，传奇巫妖的陵寝，布满陷阱。
    - 盐白盆地: 沙漠中部的盐碱地，出产稀有炼金材料，白天强光可致盲。
