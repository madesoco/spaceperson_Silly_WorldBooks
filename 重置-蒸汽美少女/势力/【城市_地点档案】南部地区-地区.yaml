---
  名称: 南部地区
  所属: 米拉比里斯大陆
  概览:
    - 大陆南方沿海领地，被龙脊山脉与帝国腹地隔绝。
    - 政体: 贸易联邦，由四支吸血鬼氏族主导的商业共和国。
    - 经济: 根植于海洋贸易与吸血鬼贵族的权谋。
    - 社会风气: 极度开放，多元文化与信仰融合。
  常见人物与组织:
    - 联邦海军士兵: 装备弯刀与燧发手枪，保护商路，忠于特定家族。
    - 商会代表与保镖: 联邦经济驱动者，由佣兵保护。
    - 欲望女士的修女: 身着暴露神官服的女性圣职者，经营神庙妓院与赌场。
    - 海盗与走私者: 活跃于破碎群岛，既是清剿对象，也是贵族的秘密合作伙伴。
    - 艺术家与工匠: 受富商赞助，使联邦成为艺术与精密工艺中心之一。
  常见危险生物:
    - 地行龙: 龙脊山脉的顶级掠食者，鳞甲厚重，力量巨大。
    - 鸟身女妖: 盘踞在破碎群岛，用歌声魅惑水手。
    - 海蛇: 近海的巨型海洋爬行动物，能轻易破坏船只。
    - 奇美拉: 龙脊山脉深处的魔法生物，能喷火与释放剧毒。
  主要地点:
    主要城市群 (联邦四大家族统治):
      - 维纳利亚 (斯福尔扎家族): 政治首都，联邦军事力量的象征。
      - 佛洛伦萨 (科伦坡家族): 欲望之都，欲望女士总神庙“万乐园”所在地。
      - 米兰 (维斯孔蒂家族): 工业与金融中心，遍布钟表工坊与银行。
      - 威尼斯 (比安奇家族): 水上之都，异国商品与情报的最大集散地。
    主要地理特征:
      - 龙脊山脉: 联邦与帝国间的天然屏障，陆路贸易充满危险。
      - 破碎群岛: 东南海域的火山岛屿与暗礁，海盗与鸟身女妖的巢穴。
      - 金币河: 流经米兰与佛洛伦萨的内陆运输动脉。
    特色城镇与聚落:
      - 龙牙关: 龙脊山脉中的隘口要塞，负责检查商队与收税。
      - 牡蛎湾: 以珍珠养殖与海鲜贸易闻名的沿海小镇。
      - 避风港: 破碎群岛深处的海盗自由港，无法律地带。
      - 月光别墅区: 金币河下游的富商贵族度假庄园群。
    危险与未知区域:
      - 沉默海域: 破碎群岛外的浓雾海域，传说为古代海怪墓场。
      - 蛇人沼泽: 金币河入海口的古代蛇人文明遗址。
      - 巨人之眠: 龙脊山脉中的高耸山段，传说有土元素巨人沉睡于此。
