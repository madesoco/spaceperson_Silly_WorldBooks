---
  名称: 北方冻土
  所属: 米拉比里斯大陆
  概览:
    - 阿尔比恩帝国以北的极寒地带，由冰原、雪山与冰封针叶林构成。
    - 是北方部落群（兽人主导）的家园，社会法则为力量决定一切。
    - 对南方富饶土地的劫掠欲望是部落间纷争的主要驱动力。
  常见人物:
    - 兽人战帮: 以劫掠为目的的兽人部队，帝国边境的主要威胁。
    - 北地游侠: 适应极寒环境的人类或精灵猎人，担任斥候与向导。
    - 哥布林拾荒队: 在遗迹或战场废墟中搜寻物资的哥布林群体。
    - 猛犸牧人: 驯养猛犸象以获取资源的部落。
    - 寒冬女巫: 能通过精液魔法与冰雪沟通，预测气候或为武器附加诅咒的女巫。
  特色设施与组织:
    - 部落营地: 由兽皮帐篷、木屋与骸骨栅栏构成的半永久性定居点。
    - 地热温泉: 冻土地表的天然温泉，是部落争夺或交易的地点。
    - 古代遗迹前哨: 冒险者公会或贵族在遗迹入口建立的补给点。
    - 冰钓小屋群: 渔猎部落在冰封湖面上搭建的捕鱼小屋。
  常见危险生物:
    - 冬狼: 体型巨大、毛皮纯白的狼群，能呼出寒气。
    - 霜巨人: 栖息于山脉的古老巨人，能操控冰雪，可引发雪崩。
    - 冰原蠕虫: 潜伏于雪下的巨型捕食者，通过感知地表震动进行攻击。
    - 石化鸡蛇: 凝视能将生物石化的魔法生物，常见于遗迹或洞穴。
    - 猛犸象: 性情温和的巨型哺乳动物，受惊后冲锋的破坏力巨大。
  主要地点:
    主要聚落与要塞:
      - 凛冬之牙: 帝国在冻土南端的巨型要塞，扼守通往中央大平原的隘口。
      - 碎颅堡: 血牙氏族（最强兽人部落）的都城，位于霜巨人山脉南麓。
      - 炉乡: 隐藏在地热山谷中的矮人城镇，利用地热能源锻造抗寒装备。
      - 北风村: 帝国早期开拓计划遗留的村庄，依靠贸易维系生存。
    主要地理特征:
      - 霜巨人山脉: 横贯冻土中心，是霜巨人的家园。
      - 悲伤之海: 西北方的内陆咸水湖，湖岸有精灵废弃港口。
      - 巨兽冰川: 自山脉向东延伸的冰川，冰层中封存有古代生物遗骸。
    危险与未知区域:
      - 龙眠冰窟: 巨兽冰川深处的洞穴，一位白龙血脉的龙娘在此沉睡。
      - 永寂森林: 位于东北部的无声森林，进入的生物会被剥夺生命力。
      - 失落哨站: 第二纪元精灵在极北建立的要塞遗址，现已被冰雪覆盖。
      - 回响峡谷: 山脉中的狭长峡谷，声音在此会被无限放大并持续回响。
