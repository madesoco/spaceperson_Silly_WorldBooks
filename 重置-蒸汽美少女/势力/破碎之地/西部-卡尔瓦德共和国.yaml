---
势力档案:
  卡尔瓦德共和国:
  所属: 破碎之地
  概览: 诞生于天赋人权思想大陆西方的共和国，帝国的长期对手。国土多山地丘陵，国民性格坚韧独立
  建筑风格: 从旧时代的繁复巴洛克演变为象征着力量与理性的简约帝政风格
  理念: 革命热情高涨，抗争为自由的代价
  主要人物:
    - 第一执政·玛丽安娜: 最高领导人，内战中崛起的平民英雄，以坚定的意志与务实的政治手腕闻名，既是革命理想的象征，也是应对内外威胁而不得不采取铁腕政策的现实主义者
    - 让·路克: 军队总司令，山地游击战专家，数次挫败了帝国优势兵力的入侵
    - 卡米耶: 真理报主编，革命思想传播者，言论激进，其激进的言论也时常与第一执政的务实政策发生冲突
    - 公会联盟: 由共和国境内各大冒险者公会组成的联盟，维持国内安全清剿怪物的主力，拥有巨大的政治影响力
  主要地点:
    自由之城·瓦尔米:
      - 地位: 共和国首都，建立在陨石坑盆地中的要塞城市
      - 布局: 位于国家中心，被险峻环形山包围，层层递进
      - 风格: 融合旧王国的华丽与共和国的庄严
      - 子地点:
        - 国民议会宫: 旧王宫改建的最高权力中心，宏伟的帝政风格立柱象征着共和国的权威，而宫殿前巨大的广场则是民众集会与表达意愿的场所
        - 革命纪念碑: 位于市中心方的巨大尖碑，铭刻着为共和国独立与自由而牺牲的烈士姓名。碑下的长明火由魔法驱动，永不熄灭
        - 坚盾要塞群: 沿着盆地边缘环形山脉修建的庞大防御工事网络。炮台暗堡与魔法屏障发生器将首都武装成一个无法攻破的堡垒
    铁砧镇:
      - 地位: 北部工业重镇，位于龙脊山脉西麓，靠近与帝国的边境山脉
      - 概述: 为共和国军队提供着武器与弹药，遍布兵工厂与冶炼厂，环境充满煤灰
    哨兵村:
      - 地位: 散布在共和国广阔边境上的无数小型武装聚落之一，广泛分布于国内各处崎岖的山地与丘陵中
      - 功能: 农垦与军事前哨结合，每个村庄都既是农垦点，也是军事前哨，村民们平日耕作，战时则拿起武器
