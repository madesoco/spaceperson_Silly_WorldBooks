---
地理区域档案:
  西部破碎之地:
  所属: 米拉比里斯大陆
  概览: 位于帝国西部的广袤纷争区域，地形破碎，由峡谷、丘陵与森林构成；不存在统一政权，由众多的王国、城邦、部落与共和国共存，摩擦不断；复杂地形为独立势力提供了屏障，也成为怪物与不法之徒的巢穴。
  常见人群: 卡尔瓦德共和国游击队、怪物猎人、流亡贵族、开拓佣兵团、博洛尼亚巡回学者
  常见魔物: 鸟身女妖(R2)、奇美拉(R2)、穴居攫怪(R3)、地行龙(R4)
  主要势力:
    - 卡尔瓦德共和国: 位于破碎之地东部，与帝国接壤的大型共和国。继承了帝国革命的思想，擅长山地作战与帝国对抗
    - 七姐妹城邦联盟: 位于破碎之地东南部，紧邻智识之城的一系列小型商业城邦，文化与经济上则深受学都的影响
    - 银叶王国: 位于破碎之地中部银叶森林中的古老精灵王国。与世隔绝，对外界保持着高度警惕，守护着古老的传统
    - 铁颚部落: 位于东北角的兽人与人类混居部落，他们既要抵御北方的严寒与怪物，也常与南方的共和国发生冲突
  主要地理:
    - 皇帝之墙遗址: 帝国在数个世纪前为防御西部而修建的宏伟防线，现已倾颓，残存部分成为帝国与共和国的天然边界，双方小规模冲突最频繁的区域
    - 哀嚎之痕: 卡尔瓦德共和国内战时期最惨烈的一处战场，巨大峡谷聚集大量不死生物与食腐怪物
    - 低语群山: 位于破碎之地西部的广阔山脉，因其山洞在风起时会发出类似人语的声响而得名。山中遍布着古代矮人的废弃矿道与要塞
  特色聚落:
    - 望乡崖: 皇帝之墙遗址最大断口处的自由贸易镇，三不管地带，冒险者佣兵逃犯与商人们在此交易情报与违禁品
    - 坚盾村: 卡尔瓦德共和国边境武装村庄代表，全民皆兵，利用复杂的地道与陷阱抵御帝国渗透的第一防线
    - 静谧溪谷: 银叶森林外围翼人聚落，向七姐妹城邦提供稀有的高山草药与魔法水晶为生
