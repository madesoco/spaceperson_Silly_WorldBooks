---
地理区域档案:
  西部破碎之地:
  所属: 米拉比里斯大陆
  概览: 位于帝国西部的广袤纷争区域，地形破碎，由峡谷、丘陵与森林构成；不存在统一政权，由众多的王国、城邦、部落与共和国共存，摩擦不断；复杂地形为独立势力提供了屏障，也成为怪物与不法之徒的巢穴。
  常见人物:
    - 共和国游击队: 擅长山地战的卡尔瓦德士兵，使用火绳枪与长戟在山地利用地形与帝国周旋
    - 怪物猎人: 受雇于领主与村庄的专业冒险者，以猎杀强大怪物为生，在民间享有极高的声望
    - 流亡贵族: 因政变或战争失败流亡的旧贵族及扈从，为谋求复国，或沦为高级佣兵
    - 开拓佣兵团: 由大势力资助的武装团体，建立前哨站与探索资源，伤亡率极高。
    - 巡回学者: 来自智识之城的学者，进行考古与社会研究，受各方保护。

  主要势力:
    - 卡尔瓦德共和国: 位于破碎之地东部，与帝国接壤的大型共和国。继承了帝国革命的思想，擅长山地作战
    - 七姐妹城邦联盟: 位于破碎之地东南部，紧邻智识之城的一系列小型商业城邦，文化与经济上则深受学都的影响
    - 银叶王国: 位于破碎之地中部银叶森林中的古老精灵王国。与世隔绝，对外界保持着高度警惕，守护着古老的传统
    - 铁颚部落: 东北角兽人与人类混居部落，抗击北方寒冷与怪物，与共和国有冲突
  主要地理:
    - 皇帝之墙遗址: 帝国古代防御线，现已倾颓，残存部分成为帝国与共和国的天然边界。
    - 哀嚎之痕: 共和国内战古战场，巨大峡谷，聚集大量不死生物与食腐怪物。
    - 低语群山: 西部广阔山脉，风过山洞如人语，遍布矮人废弃矿道。
  特色聚落:
    - 望乡崖: 皇帝之墙断口处的自由贸易镇，三不管地带，交易情报与违禁品。
    - 坚盾村: 共和国边境武装村庄代表，全民皆兵，以此抵御帝国渗透。
    - 静谧溪谷: 银叶森林外围翼人聚落，向城邦提供草药与水晶。
