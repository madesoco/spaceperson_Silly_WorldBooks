---
  名称: 新阿尔比恩
  所属: 阿尔比恩帝国，远西新大陆西北海岸
  概览:
    - 帝国在远西大陆的首个及最重要的殖民据点。
    - 城市风格为俄式巴洛克，主要特征为穹顶建筑。
    - 环境充满海风、黑火药与原始丛林气息。
    - 居民主要为投机者、冒险家与驻军。
  主要人物:
    - 格里高利·沃龙佐夫男爵: 现任总督，前北方边境将领，奉行铁腕统治。
    - “独眼龙”巴雷特: 冒险者协会分会会长，独眼，负责殖民地安全与内陆探索。
    - 夏洛特·德·不罗伊: 没落贵族之女，E级冒险者，称号“红茶魔女”。
    - 伊丽莎白·温莎: 皇家远西公司总管，垄断新大陆航线与珍稀商品贸易。
  主要区域:
    皇冠要塞区:
      - 位置: 城市中心高地。
      - 功能: 行政与军事中心，防御森严。
      - 子地点:
        - 总督府“冬宫”: 仿本土宫殿建筑，总督官邸与指挥中心。
        - 炮台长墙: 沿海岸与丛林边缘修建的防御工事，部署蒸汽火炮与魔法屏障。
    开拓者广场区:
      - 位置: 要塞区下方。
      - 功能: 商业与社交中心，人群聚集地。
      - 子地点:
        - 探险家之家: 冒险者协会总部，木石结构，外墙悬挂怪物骸骨。
        - 远西公司商栈: 贸易中心，包含仓库群与拍卖行，负责物资评估与转运。
    希望港区:
      - 位置: 海岸低地。
      - 功能: 物资吞吐与交通枢纽，停靠蒸汽海轮。
      - 子地点:
        - 淘金者酒馆: 水手、矿工与冒险者的聚集地，提供廉价酒水与情报交易。
    木墙镇:
      - 位置: 城市边缘，紧邻防御木墙。
      - 功能: 普通殖民者居住区与扩张前线，建筑多为简易木屋。
