---
地理区域档案:
  远西大陆:
  所属: 远西大陆
  概述: 被世界之脊隔绝的古老大陆，现为充满蛮荒气息的禁忌之地，物产丰饶但遍布遗迹与危险。文明仅存于帝国与联邦的少数殖民据点，环境充满生命气息、遗迹尘埃与掠食者威胁。
  常见人物:
    - 殖民地拓殖军: 帝国与联邦驻军，装备后膛枪与魔导器，负责守卫与勘探
    - 皇家/联邦勘探队: 公司资助的专业团队，成员包括学者工程师与向导，负责探矿、测绘与对新大陆商业价值评估
    - 遗迹拾荒者: 追求财富的独立冒险者或小型团队，深入内陆去探索失落宝藏
    - 失落者后裔: 第四纪元大灾变幸存原住民的退化后裔，失去先祖的文明与魔法，退化成了原始的部落，敌视外来者
  常见危险生物: 利维坦巨海怪(R4)、恐爪龙(R3)、幽光蛾(R2)、拟态史莱姆(R2)
  主要区域:
    - 水晶之泪平原: 东北部平原丘陵，紧邻世界之脊的西北段。地表植被茂盛，其下蕴藏水晶矿与矮人地城，建有帝国殖民地“詹姆斯敦”
    - 翡翠之心巨林: 中心区域最广阔原始森林。树木遮天，第二纪元精灵文明的核心区，掩埋着精灵城市遗迹
    - 破碎王冠群岛: 位于大陆西南部的巨大群岛与热带雨林。气候多变，古代航海文明的港口遗迹散布其间，联邦殖民地“希望港”在此
    - 沉寂高原: 北方寒冷高原，与巨林和世界之脊接壤。曾是法师纪元时期进行禁忌生物实验的场所，游荡着形态诡异的变异生物与实验产物
    - 叹息沼泽: 位于大陆东南部的巨大湿地与沼泽，紧邻世界之脊的中南段。毒瘴弥漫，水下潜伏致命生物
