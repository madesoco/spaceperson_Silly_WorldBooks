---
城市与地点档案:
  新阿尔比恩:
  所属: 远西大陆-水晶之泪平原
  概览: 帝国在远西大陆的首个及最重要的殖民据点，位于大陆东北部平原沿海区，是进入新大陆的第一站与对外联络的文明接口
  人口组成: 投机者、冒险家与驻军
  环境: 充满海风、黑火药与原始丛林气息
  建筑风格: 俄式巴洛克式穹顶建筑
  主要人物:
    - 格里高利·沃龙佐夫男爵(R3): 现任总督，从帝国北方边境调任而来的帝国老将，以铁腕手段和务实的政策管理殖民地
    - “独眼龙”巴雷特(R4): 冒险者协会分会会长，S级独眼冒险者，维持着殖民地安全，是内陆探索的主力
    - 夏洛特·德·不罗伊: 没落贵族之女，D级冒险者，为了金钱而生活在这座全新的殖民地
    - 伊丽莎白·温莎: 皇家远西公司总管，负责管理帝国特许的殖民公司在此地的一切贸易活动，垄断新大陆航线与珍稀商品贸易
  主要区域:
    皇冠要塞区:
      - 位置: 城市中心高地
      - 概述: 行政与军事中心，防御森严，是帝国秩序在这片蛮荒之地的象征
      - 子地点:
        - 总督府“冬宫”: 仿本土贵族宫殿建筑，总督官邸与指挥中心
        - 炮台长墙: 沿海岸与丛林边缘修建的巨大城墙，部署蒸汽火炮与魔法屏障
    开拓者广场区:
      - 位置: 要塞区下方
      - 概述: 商业与社交中心，冒险者商人和殖民者聚集地
      - 子地点:
        - 探险家之家: 远西冒险者协会总部，木石结构，外墙挂满了各种巨大怪物的头颅与遗骸
        - 远西公司商栈: 由巨大仓库群与拍卖行的贸易中心，负责物资评估与转运送回帝国
    希望港区:
      - 位置: 城市地势最低的海岸边
      - 概述: 物资吞吐与交通枢纽，停靠蒸汽海轮，新移民与新面孔的第一站
      - 子地点:
        - 淘金者酒馆: 水手、矿工与冒险者的聚集地，提供廉价酒水与情报交易以及开放的女性探索者
    木墙镇:
      - 位置: 城市边缘，紧邻防御木墙
      - 功能: 普通殖民者居住区与扩张前线，建筑多为简易木屋，生活条件艰苦
