---
地理与地点档案:
  世界之脊:
    所属: 米拉比里斯
    环境特征: 高海拔寒冷、岩石地形与潮湿水汽
    常见群体: 山地开拓矮人、云顶翼人哨站、帝国与联邦高山勘探队、水道走私者
    主要区域:
      - 逆流峡湾: 贯穿山脉主体，连接两侧海洋的巨大地下河道的重要商道；水流复杂，洞穴纵横交错
      - 万年冰川带: 覆盖在山脉北段山峰之上的冰川区域，冰层之下封存着过往纪元的秘密，是高等级冒险者与学者的探索目标
      - 风蚀石林区: 位于山脉南段，受强风侵蚀而形成的巨大石柱森林。峡谷中风蛇巢穴是寻找稀有风元素材料的地方
    主要城市:
      - 中途港: 在逆流峡湾中部的巨大天然溶洞港口城市，是船只的唯一补给点与交易中心，由多方势力组成的联合委员会共同管理，秩序混乱但充满活力
