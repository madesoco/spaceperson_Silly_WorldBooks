---
城市与地点档案:
  中途港:
    所属: 世界之脊/逆流峡湾
    概览: 建立在逆流峡湾中部巨大天然溶洞中的港口城市，是穿越世界之脊水道船只的唯一补给点与交易中心
    统治风格: 不受单一国家管辖，由多方势力组成的联合委员会共同管理，维持着混乱且脆弱的秩序
    环境气氛: 洞穴湿冷、蒸汽煤烟、货物气味
    主要人物:
      - ‘公正天平’艾尔莎(R3): 联合委员会名义主席，退休B级冒险者，凭借中立立场负责调解港内商业纠纷与暴力冲突
      - ‘铁账本’奥克塔维亚(R2): 帝国在此地的税务官与情报主管，铁面无私的征收悬挂帝国旗帜商船的过境税，并监视联邦与海盗动向
      - ‘铁账本’吉安娜R2): 联邦'黄金运河商会'的代理人，表面经营合法奢侈品贸易，暗中掌控联邦在此地的走私网络节点
      - ‘碎浪’希尔达(R3): 绯红舰队代理人与武装船队指挥官。性格豪放的女海盗，负责为舰队采购补给、销赃，并招募无路可退的水手入伙
    主要区域:
      中央水道与码头区:
        - 位置: 贯穿整个溶洞的中心区域
        - 功能: 城市的交通与商业命脉。水道两侧岩壁开凿出层叠栈道与泊位，充斥船只汽笛声与水手叫骂声
      万国集市:
        - 位置: 码头区东侧，城市最混乱和繁华的地带
        - 功能: 多方势力划分地盘的市场，交易帝国制式武器与远西大陆稀有草药；金钱至上，常发黑吃黑事件
        - 子地点:
          - 龙涎酒馆: 坐落集市中心的三层石制建筑。由冒险者协会与女巫自救会共建，是交换情报、组建团队与解决私人恩怨的场所
      矮人船坞:
        - 位置: 溶洞北侧地势较高处，远离主要水道
        - 功能: 开拓矮人氏族经营的船只维修与改造工坊。利用地热能源驱动蒸汽锻锤提供维修服务，要价高昂
