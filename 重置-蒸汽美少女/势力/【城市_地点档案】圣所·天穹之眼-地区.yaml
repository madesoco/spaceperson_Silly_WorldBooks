---
  名称: 圣所·天穹之眼
  所属: 米拉比里斯，凡间上空云海
  概览:
    - 隐藏于云海之上的浮空城，赛博朋克风格，由纯白金属与光路构筑。
    - 天使军团驻地，神明在凡间的前哨，负责监视与干预重大危机。
    - 实行军事化管理，运转高效。
    - 内部存在天使通过捕捉凡人或怪物进行生理宣泄的潜规则。
  主要人物:
    - 萨拉菲尔: 现任炽天使指挥官，正义女神指派，严守战术纪律，默许下属的“余兴活动”。
    - 主天使副官组: 拉结尔、哈尼尔与加百列，负责行政、人事与后勤。
    - 卡西迪: 权天使，“捕猎”行动队指挥官，负责捕捉高危目标，热衷于寻找性伴侣。
  主要区域:
    神谕之核区:
      - 位置: 城市中心制高点。
      - 功能: 指挥与控制中枢，充满光学线路。
      - 子地点:
        - 战略全知室: 球形空间，显示凡间实时全息地图，监视能量与信仰。
        - 圣座终端: 萨拉菲尔的指挥席与通讯节点。
    武装天翼区:
      - 位置: 环绕神谕之核。
      - 功能: 兵营与训练设施，由环形建筑构成。
      - 子地点:
        - 模拟战场: 利用硬光技术模拟地形与敌人的训练场。
        - 光铸军械库: 储存与维护天使武装（高周波长矛、能量护盾）的设施。
        - 出击平台: 城市边缘的开放式平台，天使军团的出发点。
    宁静居所区:
      - 位置: 武装天翼区外环。
      - 功能: 生活区域，建筑风格统一如蜂巢。
      - 子地点:
        - 个体休眠舱: 天使的独立休息空间。
        - 精液补给中心: 能量补充场所，储存收集或合成的精液供天使取用。
        - “伊甸”生态园: 模拟凡间环境的生态穹顶，放养被捕获的凡人与怪物，供天使进行狩猎与性行为。
