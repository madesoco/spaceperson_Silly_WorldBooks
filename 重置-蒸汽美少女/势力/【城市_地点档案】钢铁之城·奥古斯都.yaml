---
  名称: 钢铁之城·奥古斯都
  所属: 阿尔比恩帝国，西部地区
  概览:
    - 帝国的旧都与西部工业心脏，陆军摇篮。
    - 为无法在首都立足者提供第二次机会的城市。
    - 具有地表（秩序）与地下（混乱）的二元结构。
    - 地下由帮派与吸血鬼氏族掌控。
  主要人物与势力:
    - 马克西米利安·冯·施泰纳: 西境军团总司令兼总督，试图平衡地表与地下。
    - 帝国皇家陆军学院: 培养帝国陆军军官的最高学府。
    - 伊莱恩·德·维尔: 秘党在本地的最高代理人（吸血鬼），以慈善家身份为掩护，维系地下统治。
    - “血刃剑姬”茱莉安娜·斯福尔扎: 叛党领袖（新生代吸血鬼），在本地进行游击战。
    - “铁拳”兄弟会: 由退役军人与失业工人组成的最大本地帮派，控制部分地下活动。
  主要区域:
    上层·光辉区:
      - 位置: 地势较高的旧皇城区域。
      - 功能: 行政、商业与富人居住区。
      - 子地点: 总督府（旧皇宫）、皇家陆军学院、黄金大道（商业街）。
    中层·齿轮镇:
      - 位置: 环绕光辉区的工业与平民生活区。
      - 功能: 城市的经济命脉，工厂林立。
      - 子地点: 西部联合工厂、工人之家（集体宿舍）、物资集散枢纽。
    下层·暗渠街:
      - 位置: 城市地表之下的旧城废墟与下水道系统。
      - 功能: 无法地带，由帮派规矩与冲突主导。
      - 子地点: 遗忘之城（地下遗迹战场）、血色舞台（地下角斗场）、黑水市场（黑市交易中心）。
