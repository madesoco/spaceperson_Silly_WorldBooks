---
  名称: 苏莱曼港
  所属: 东方沙海，东部沿海
  概览:
    - 建立在古代遗迹之上的中立港口，面向翡翠迷宫入海口。
    - 东方航路的终点与起点，是冒险者、奴隶与走私贩的聚集地。
    - 由三大商会家族轮流执掌，秩序依靠金钱与契约维持。
  主要人物:
    - “沙海明珠”法蒂玛: 现任轮值城主，阿卜杜勒商会领袖，掌控奴隶市场与香料贸易。
    - “遗忘学者”伊本: 年迈的翼人学者，经营书店兼遗迹鉴定所，担任高级顾问。
    - “赤蝎”佣兵团: 港口区的最大武装力量，由蝎人领导，接受任何高价委托。
  主要区域:
    新月集市区:
      - 位置: 环绕内港。
      - 功能: 商业与生活中心，最为混乱，小巷通往黑市或秘密妓院。
      - 子地点:
        - 黄金市场: 大型露天市场，交易各类商品，包括违禁品。
        - 奴隶围栏: 由法蒂玛家族控制的奴隶交易区，奴隶被关在笼中展示。
        - 冒险者协会远东分会: 由船骸改造，发布与海域、雨林探索相关的委托。
    总督府区:
      - 位置: 城市最高处的丘陵上。
      - 功能: 统治核心区，三大家族的府邸与议事厅所在地。
      - 子地点:
        - 三席议事厅: 由古神殿改建，三大家族在此决策。
    遗迹码头区:
      - 位置: 沿海岸线延伸。
      - 功能: 港口与仓库区，部分修建在水下遗迹之上。
      - 子地点:
        - 走私者水道: 利用古代地下水道形成的秘密航道，用于避税和检查。
