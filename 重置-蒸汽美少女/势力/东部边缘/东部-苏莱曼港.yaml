---
城市与地点档案:
  苏莱曼港:
    所属: 东部边缘地区/翡翠迷宫
    概览: 建立在古代遗迹之上的中立港口，面向翡翠迷宫入海口。东方航路的终点与起点，由三大商会家族轮流执掌，秩序依靠金钱与契约维持
    主要人物:
      - 法蒂玛·阿卜杜勒: 现任轮值城主，阿卜杜勒商会领袖，以美貌智慧与无情的商业手腕闻名，掌控着城中最大的奴隶市场与香料贸易
      - 伊本: 年迈的翼人学者，经营城中唯一书店兼遗迹鉴定所。掌握着许多失落王朝的秘密，是高级冒险者团队争相雇佣的顾问
    组织:
      - 赤蝎佣兵团: 港口的最大武装力量，由一名亚人（蝎人）领导，接受任何出价够高的委托
    主要区域:
      新月集市区:
        - 位置: 环绕内港
        - 概述: 商业与生活中心，最为混乱，各种族的商人与冒险者在此处交易货物与情报，每一条小巷都可能通往地下的黑市或秘密妓院
        - 子地点:
          - 黄金市场: 大型露天市场，交易来自远西大陆的各类商品，也是销赃与购买违禁品的首选之地
          - 奴隶围栏: 由法蒂玛家族控制的奴隶交易区，各种族的奴隶被关在笼中展示等待购买
          - 冒险者协会远东分会: 由巨大船骸改造而成的建筑，发布的委托大多与探索附近海域的沉船遗迹或深入翡翠迷宫有关
      总督府区:
        - 位置: 城市最高处的丘陵上
        - 概述: 统治核心区，三大家族的府邸与议事厅所在地。
        - 子地点:
          - 三席议事厅: 由古神殿改建的议事场所，城市重大决策在此地由三大家族共同商议决定
      遗迹码头区:
        - 位置: 沿海岸线延伸的码头
        - 概述: 港口与仓库区，部分修建在水下遗迹之上。
        - 子地点:
          - 走私者水道: 利用古代地下水道形成的秘密航道，是躲避港口税与检查的最佳途径
