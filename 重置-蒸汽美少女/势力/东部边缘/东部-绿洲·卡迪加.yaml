---
城市与地点档案:
  卡迪加绿洲城:
    所属: 东部边缘地区/流沙之海
    概览: 坐落于东部沙海最大的绿洲之上，是东西商路的重要枢纽与沙海中宝贵的庇护所。信奉着水即法则的生存法则
    建筑风格: 由砂岩与粘土结构，与周围的沙漠融为一体
    主要人物:
      - 绿洲领主·扎赫拉(R4): 城市的绝对统治者（女巫），守护绿洲生命之泉，任何胆敢在水源附近挑起争端的人都会被她化为沙雕
    组织:
      - “沙狼”商队联盟: 数个经验丰富的沙漠商队组成的联盟，垄断着进出卡迪加的货物运输
      - “寂静守望者”: 领主的直属组织，负责维护城市秩序与巡逻周边沙漠，其成员都穿着覆盖全身的罩袍
    主要区域:
      生命之泉区:
        - 位置: 城市中心
        - 概述: 圣地巨大的泉水与环绕的椰枣林组成，由精锐卫队守护，严禁任何形式的冲突
        - 子地点:
          - 领主宫殿: 魔法塑造的砂岩宫殿，扎赫拉的居所，绿洲水脉的源头所在
          - 泉边花园: 公共休憩区，在此动武视为对领主的直接挑衅。
      商队驿站区:
        - 位置: 环绕在生命之泉外围
        - 概述: 商业与交流中心，巨大的环形区域足以容纳上百支商队同时休整，城市最喧闹的区域。
        - 子地点:
          - 巨兽市场: 专门用于交易大型沙漠坐骑（如陆行鸟沙地蜥）的市场
          - 旅人之帐: 数十家旅店酒馆和妓院组成的综合娱乐区
      土墙镇:
        - 位置: 城市最外围，紧贴着防御性的土墙
        - 概述: 平民、工匠与贫困者的居住区，房屋低矮而密集，街道如同迷宫般复杂，是地下势力的温床
        - 子地点:
          - 陶工坊: 利用本地特有的粘土制作各种陶器，是卡迪加重要的手工业产品
