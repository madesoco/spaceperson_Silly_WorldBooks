---
地理区域档案:
  东部边缘地区:
  所属: 米拉比里斯大陆
  概览: 由西部的“流沙之海”沙漠与东部的“翡翠迷宫”雨林构成的广阔区域，死灵王朝遗迹遍布，危险与机遇并存，是冒险者们的乐园
  奇特气候: 白日酷热，夜晚寒冷；本是雨林气候，在第三世纪受沉睡古龙的影响，气候变得干燥，形成了独特的沙漠与雨林并存的奇观
  主要势力:
    绿洲协会: 由扎赫拉、法蒂玛·阿卜杜勒、莉安德拉·希尔瓦纳为了维护各自利益而形成的非正式权力集合体，维持边缘地区的和平与秩序
  特色人物群: 绿洲卫队与沙匪、沙漠游牧民、死灵王朝崇拜者(敌对)
  主要区域:
    - 流沙之海: 区域西部的广阔沙漠。一望无际的连绵的沙丘，金字塔与神庙的尖顶在流沙下若隐若现
    - 无名法王之墓: 一座半掩埋于流沙之下的巨大金字塔群，是第三纪元某位传奇巫妖的陵寝，最深处沉睡的古龙是造成炎热气候的主要原因
    - 巨人之脊: 流沙之海与翡翠迷宫之间的南北走向风蚀山脉，是沙漠与雨林之间的天然分界线
    - 翡翠迷宫: 区域东部的湿热雨林。林中河流纵横，古树参天，无数第四纪元精灵的城市废墟隐藏其中
  主要城市:
    - 奥斯提亚: 帝国在此区域冒险者之都，西侧为帝国境内，东部接壤沙海边缘，是文明世界与边缘地区交流的枢纽
    - 卡迪加绿洲: 沙海东部深处的独立城邦，由大师级女巫扎赫拉统治，是商路上的重要庇护所
    - 苏莱曼港: 翡翠迷宫最东部的由阿卜杜勒家族掌控的港口城市，是边缘地区海上贸易与冒险者、走私贩的聚集地

