---
  名称: 骸骨关隘
  所属: 东方沙海，死灵王朝遗迹区
  位置: 建立在“无名君王之墓”遗迹入口之上。
  概览:
    - 为遗迹探索服务的前哨聚落。
    - 此地无法律，通行实力与金钱法则。
    - 建筑由废弃攻城器械与巨大骸骨搭建。
    - 是泰拉大陆上死亡率最高、财富回报也最高的地方之一。
  主要人物与组织:
    - “掘墓人”巴萨罗:
      - 身份: 聚落非官方首领，经验丰富的老盗贼。
      - 产业: 经营唯一的酒馆、补给站和当铺。
      - 职能: 通过收购与倒卖遗迹物品维系此地基本秩序。
    - “漫游者”奥蕾莉亚:
      - 身份: 偶尔出现的巫妖，真实身份未知，表现为收藏家与历史学者。
      - 行为: 对生者无恶意，与冒险者交换情报或交易低级魔法物品。
    - “再生会”:
      - 构成: 由死灵学派法师与牧师组成的互助组织。
      - 服务: 提供治疗、诅咒移除、复活等高价服务。
      - 影响: 使挑战高难度遗迹成为可能，但收费高昂。
  主要地点:
    - “无名君王之墓”入口:
      - 位置: 聚落中心。
      - 特征: 深不见底的巨大裂口，通往死灵王朝，常年笼罩负能量。
      - 子地点:
        - 营火广场: 入口前的开阔地，冒险者团队集结、休整、交换情报与战利品的场所。
    - 拾荒者镇:
      - 位置: 环绕入口广场。
      - 功能: 聚落的主要生活区，由临时建筑与帐篷构成，环境混乱肮脏。
      - 子地点:
        - 最后的呼吸酒馆: 巴萨罗的产业，聚落内唯一的正式建筑，兼具酒馆、补给站、情报中心与仲裁所功能。
        - 再生神殿: “再生会”总部，用巨兽头骨搭建，提供生死交易服务。
        - 赌命市场: 交易未经鉴定遗迹物品的市场，风险与机遇并存。
