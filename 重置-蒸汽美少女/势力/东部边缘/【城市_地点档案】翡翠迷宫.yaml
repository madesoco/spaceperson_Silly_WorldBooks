---
  名称: 翡翠迷宫
  所属: 米拉比里斯大陆，东方沙海以东
  概览:
    - 大陆最东端的广袤原始雨林，被千年巨木与致命瘴气笼罩。
    - 无统一政权，只有挣扎求生的独立聚落。
    - 是帝国奢侈品源头、古代遗迹宝库、致命怪物与未知疾病的温床。
  常见人物与组织:
    - 开拓者: 帝国或联邦的失意者、罪犯组成，建立武装聚落，种植稀有草药或烧制特产，极度排外。
    - 精灵隐士: 古老精灵氏族后裔，与森林共生，警惕外来者。
    - 遗迹猎人: 顶尖冒险者，以探索古代遗迹为生，伤亡率极高。
    - 土著部落: 文明退化的人类或亚人部落，以原始狩猎采集为生，敌视外来者。
    - 公司勘探队: 由商会资助的专业团队，负责测绘与资源评估，受佣兵保护。
    - 武装开拓村: 以原木围墙、箭塔保护的人类定居点。
    - 冒险者协会前哨: 建立在遗迹入口或水道旁，提供补给与高风险委托。
    - 树顶精灵聚落: 建造在千年古树上的隐秘村庄，由吊桥与藤蔓连接。
    - 走私者营地: 进行非法交易的临时营地，位置隐蔽。
  常见危险生物:
    - 奇美拉: 法师纪元的失控产物，盘踞在古代遗迹中。
    - 仙人掌怪: 伪装成植物的伏击者，能射出麻痹毒刺。
    - 剧毒飞龙: 成群活动的飞行爬行动物，撕咬带腐烂剧毒。
    - 沼泽多头蛇: 潜伏在沼泽中的九头蛇，头可再生，有剧毒吐息。
    - 食人藤: 拥有初步智能的魔法植物，能模拟声音诱捕猎物。
    - 幽魂豹: 能在阴影中短距传送的魔法猫科动物，是无声的猎手。
  主要地点:
    主要聚落:
      - 希望镇: 巨人之手瀑布旁的人类开拓村，东部区域最大补给点，以白色瓷器闻名。
      - 前沿哨站: 冒险者协会在“空中庭院”遗迹下方的据点，用失败者遗物警示新人。
      - 月语林地: 活了数万年巨树上的精灵聚落，掌握古代魔法丝绸纺织技术。
    主要地理特征:
      - 巨人之手瀑布: 千米高的五道瀑布，后方有洞穴系统入口。
      - 叹息之河: 贯穿雨林的主要交通水道，河中生物凶猛。
      - 菌光沼泽: 南部湿地，遍布发光蘑菇，瘴气能致幻。
    危险与未知区域:
      - 空中庭院·艾瑞瑟尔: 失落的浮空城遗骸，悬于雨林上空，有古代人偶守护魔法图书馆。
      - 蛇神之冢: 半沉入沼泽的古代蛇人金字塔神庙，传说封印着一位古蛇神。
      - 万针林: 巨大仙人掌怪的母巢所在地。
      - 沉默山谷: 生态与外界隔绝的史前山谷，栖息着恐爪龙等活化石。
