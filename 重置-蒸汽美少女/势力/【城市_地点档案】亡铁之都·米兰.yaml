---
  名称: 亡铁之都·米兰
  所属: 贸易联邦，东北部
  位置: 龙脊山脉阴影下的丘陵地带。
  概览:
    - 贸易联邦的矿业中心，由维斯孔蒂家族统治。
    - 城市经济建立在矿产和不死劳工之上。
    - 主要特征为公开的死灵法术研究与大陆规模最大的奴隶市场。
  主要人物:
    - ‘磐石’吉安·加莱亚佐·维斯孔蒂: 维斯孔蒂家族的女族长（吸血鬼），讲求实用主义，致力于积累财富和巩固统治。
    - ‘开膛手’维克托校长: 骸骨学院的创始人，前帝国国教高阶牧师，致力于将死灵法术标准化为生产工具。
    - ‘千貌’奴隶主: 万族囚笼的管理者，身份不明，以能提供任何稀有种族的奴隶闻名。
    - ‘独眼’格里兹: 永暗矿坑的矿工工头（矮人），负责管理生者矿工，并秘密组织旨在改善矿工待遇的互助会。
  主要区域:
    磐影宫区:
      - 位置: 城市最高处的丘陵，背靠悬崖。
      - 功能: 城市统治核心，维斯孔蒂家族的军事堡垒。
      - 子地点:
        - 黑曜石王座厅: 家族宫殿，族长处理政务与居住地，下方设有金库与初拥转化室。
        - 不朽者卫队兵营: 家族私军驻地，由吸血鬼与高级不死生物组成。
    骸骨学院区:
      - 位置: 城市东部，邻近矿区。
      - 功能: 学术与魔法中心，以死灵法术研究为主。
      - 子地点:
        - 通识之塔: 学院主体建筑，向付费学生教授标准化的生产用死灵法术。
        - 尸骨陈列馆: 收藏各智慧种族骨骼标本的博物馆，兼作教学与潜在兵源。
    镣铐市场区:
      - 位置: 城市西部，设有通往城外的秘密通道。
      - 功能: 奴隶交易中心，唯一的商品是智慧生命。
      - 子地点:
        - 万族囚笼: 大陆规模最大的奴隶市场，下沉式环形建筑，每日进行奴隶拍卖。
        - 驯化场: 位于市场地下的设施，通过强制手段摧垮奴隶的反抗意志。
    永暗矿坑区:
      - 位置: 城市北部，与龙脊山脉相连。
      - 功能: 城市经济命脉，生者与不死者共同开采的矿区。
      - 子地点:
        - 第一矿井: 雇佣生者矿工进行高精度开采的矿区，薪酬与死亡率均极高。
        - 骸骨深坑: 完全由不死劳工进行粗放式开采的矿区。
        - 转化场: 位于矿区深处的工坊，将死去的矿工转化为新的不死劳工。
