---
  名称: 远西大陆
  所属: 米拉比里斯，世界之脊以西
  概览:
    - 被世界之脊隔绝的古老大陆，第二纪元精灵与矮人文明发源地。
    - 现为充满蛮荒气息的禁忌之地，物产丰饶但遍布遗迹与危险。
    - 文明仅存于帝国与联邦的少数殖民据点。
    - 环境充满生命气息、遗迹尘埃与掠食者威胁。
  常见人物:
    - 殖民地拓殖军: 帝国与联邦驻军，装备后膛枪与魔导器，负责守卫与勘探。
    - 皇家/联邦勘探队: 公司资助的专业团队，负责找矿、测绘与评估商业价值。
    - 遗迹拾荒者: 追求财富的亡命徒，深入内陆探索失落宝藏。
    - 失落者后裔: 大灾变幸存原住民的退化后裔，失去文明与魔法，敌视外来者。
  常见危险生物:
    - 巨森之主·千藤之牙: 翡翠之心巨林的植物生命体，根须覆盖广阔，操控植物攻击。
    - 回响石兽: 水晶平原的巨型矿物生命体，背负高纯度水晶，无意识游荡。
    - 利维坦之裔: 破碎王冠群岛海域的巨大海怪，威胁航线安全。
    - 恐爪龙: 第一纪元遗留的中型食肉龙，群体狩猎，脚爪如镰刀。
    - 幽光蛾: 巨林中的巨型飞蛾，鳞粉致幻，幼虫寄生吸取生命。
    - 符文守护者: 矮人遗迹中的岩石金属构装体，执行古代防御指令。
    - 拟态史莱姆: 善于伪装成宝箱或人形的史莱姆亚种。
  主要区域:
    - 水晶之泪平原: 东北部平原丘陵，蕴藏水晶矿与矮人地城，建有帝国殖民地“新阿尔比恩”。
    - 翡翠之心巨林: 中心区域原始森林，树木遮天，掩埋精灵城市遗迹。
    - 破碎王冠群岛: 西南部热带群岛，气候多变，有联邦殖民地“希望港”。
    - 沉寂高原: 北方寒冷高原，曾是古代生物实验场，游荡变异生物。
    - 叹息沼泽: 东南部湿地，毒瘴弥漫，水下潜伏致命生物。
