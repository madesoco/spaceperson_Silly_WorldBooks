---
  名称: 中途港
  所属: 世界之脊，逆流峡湾
  概览:
    - 位于逆流峡湾中部巨大溶洞内的港口城市。
    - 穿越水道船只的唯一补给点与交易中心。
    - 由多方势力组成的联合委员会管理，秩序相对混乱。
  主要人物:
    - “公正天平”艾尔莎: 联合委员会名义主席，退休冒险者，负责调解纠纷。
    - “铁账本”奥克塔维亚: 帝国税务官与情报主管，负责征收过境税与监视。
    - “狐狸笑面”吉安娜: 联邦商会负责人，经营奢侈品贸易与走私网络。
    - “碎浪”希尔达: 绯红舰队代理人，负责补给销赃与招募水手。
  主要地点:
    - 中央水道与码头区: 贯穿溶洞中心的交通命脉，岩壁上开凿有栈道泊位。
    - 万国集市: 位于码头区东侧的露天市场，出售各类物资与违禁品。
    - 矮人船坞: 位于溶洞北侧高地的维修工坊，利用地热驱动蒸汽设备。
    - 龙涎酒馆: 位于集市中心的坚固石制建筑，情报交换与组队场所。
