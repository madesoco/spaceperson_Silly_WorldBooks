---
  名称: 迷雾群岛
  所属: 自由海，东南部
  位置: 位于群岛主岛西侧（避风港）、中部群山后（龙喉湾）、最高峰（三叉戟堡）。
  概览:
    - 由火山活动形成的岛屿群，天然屏障为地热蒸汽与海雾。
    - 绯红舰队大本营，不受法律约束的海盗天堂。
    - 环境充斥硫磺、朗姆酒与火药气息。
  主要人物:
    - 猩红蔷薇·玛格丽特: 三叉戟议会最具声望的女船长，绯红舰队灵魂人物，性格果决且坦率面对欲望。
    - “铁钩”巴萨罗缪: 三叉戟议会成员，负责防务与武器整备，左手为蒸汽动力铁钩。
    - “销赃人”雅各布: 避风港黑市管理者（矮人），连接大陆黑市网络，绯红舰队销赃核心。
  主要地点:
    - 避风港: 唯一对外港口，建于死火山口环形山壁。海盗销赃、补给与娱乐的唯一去处。
    - 龙喉湾: 主力舰秘密停泊与维修地，天然火山内湾。利用地热蒸汽驱动矮人工坊设施。
    - 海妖之歌酒馆: 避风港最大酒馆，女翼人经营。情报集散地，兼具招募与斗殴功能。
    - 三叉戟堡: 群岛最高峰要塞，议会驻地与指挥中心。拥有监控周边海域的远程通讯设备。
