---
  名称: 迷航云海
  所属: 苍穹之海，米拉比里斯中层空域
  概览:
    - 位于凡人天穹与云上圣所之间的空域，由云层、浮空岛与第四纪元城市残骸构成。
    - 磁场紊乱，气流多变，不受地面国家法律约束。
    - 空气特征为高湿度、金属锈蚀味。
    - 主要活动群体为空盗、冒险者与翼人氏族。
  常见群体:
    - 翼人氏族: 以“风语岩”为据点的天空原住民，建立立体社会，从事狩猎与采集。
    - 空艇勘探队: 帝国或联邦资助的武装队伍，负责测绘地图与回收法师纪元遗物。
    - 私自下凡的天使: 离开“天穹之眼”的天使个体，在云海边缘观察凡人或寻找娱乐。
    - 猩红男爵空盗团: 活跃的空盗团体，首领为前帝国贵族，特征为红色涂装空艇与针对性的劫掠战术。
  危险生物:
    - 云海飞蛇: 栖息于遗迹或雷暴云中的巨型飞行爬行类，鳞片具备反魔法侦测特性。
    - 风暴巨灵: 诞生于高空不稳定气流的元素生物，能引发局部风暴，核心为高价值魔法材料。
    - 空中水母群: 漂浮的发光生物群，触须带强麻痹电荷，能瘫痪蒸汽核心。
  主要地点:
    - 风语岩: 最大的翼人聚落浮空岛。
    - 星辰之握: 第四纪元坠落的法师塔残骸，呈倒悬山脉状，内部存有魔法造物。
    - 寂静航道: 空艇墓场，磁场异常区，聚集大量失事残骸与食腐生物。
    - 云雀镇: 中立补给站与黑市交易点。
