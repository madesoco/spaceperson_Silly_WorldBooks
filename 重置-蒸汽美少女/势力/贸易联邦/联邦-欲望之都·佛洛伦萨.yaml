---
城市与地点档案:
  佛洛伦萨(欲望之都):
    所属: 南部地区/贸易联邦
    概述: 贸易联邦的经济心脏与文化熔炉，工业烟尘笼罩下的文艺复兴风格城市，遍布全城的欲望女士神庙兼妓院推行享乐主义，由科伦坡家族统治。繁华之下，贫民被转化为不死劳工；
    主要区域:
      黑金工业区:
        位置: 城市东部，沿金币河下游延伸
        功能: 城市的动力核心，不死劳工在工厂群中进行危险繁重的工作
        子地点:
          - 不眠铸造厂: 联邦最大的蒸汽核心与舰板生产工厂，由僵尸与骷髅劳工流水线作业
          - 转化之池: 地下秘密设施，将贫民、流浪者和罪犯加工成不死劳工

      缪斯学院区:
        位置: 城市西部，地势较高，烟雾稀薄
        功能: 艺术与文化中心，遍布画廊、剧院，是艺术家与学生的聚集地
        子地点:
          - 科伦坡艺术大学: 以人体雕塑和肖像画闻名，卢克雷齐亚·科伦坡的私人学院
          - 黄金大剧院: 联邦最奢华的歌剧院，常年上演着各种融合了幻术与真人表演的戏剧。女族长可直接从包厢进入后台挑选她中意‘演员’

      黄金运河区:
        位置: 城市南部，连接港口与内陆
        功能: 商业与交通命脉，联邦最大贸易港的核心
        角色:
          - ‘禁忌塑师’卢克雷齐亚·科伦坡(血族): 族长，以艺术鉴赏力和冷酷无情的生物炼金术而闻名，将佛洛伦萨视为自己最完美的艺术品，用不死生物劳工的骸骨为这座城市的繁荣奠基
        子地点:
          - 百货交易所: 联邦最大的商品交易所，决定各类大宗商品价格
          - 科伦坡宫: 卢克雷齐亚的居所与权力中枢，建于运河中央的人工岛上，收藏着数个世纪以来收集的艺术珍品

      绯色欢乐街:
        位置: 城市中心的不夜城
        功能: 娱乐与宗教区，遍布提供各种族服务的妓院
        角色:
          - ‘极乐祭司’索菲娜: 欲望女士教会最高祭司，豪华妓院“万乐园”的女主人，宣扬欲望即神性，将性爱视为最神圣的仪式，与科伦坡保持合作关系
        子地点:
          - 万乐园: 欲望女士总神庙，也是最高级的妓院，信徒通过集体性交等仪式进行祈祷
