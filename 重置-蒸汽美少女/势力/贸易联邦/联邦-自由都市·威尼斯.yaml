---
城市与地点档案:
  威尼斯:
    所属: 南部地区/贸易联邦
    概述: 比安奇家族统治的水上城市，建筑为洛可可风格，贸易联邦的殖民前哨，通往远西新大陆的唯一门户
    主要区域:
      黄金大运河区:
        位置: 贯穿城市的中央水道两岸
        功能: 权贵中心，遍布比安奇家族宫殿与俱乐部，守备森严
        角色:
          - ‘享乐公爵’·芙拉维娅·比安奇(血族R2): 自由与享乐主义的年轻吸血鬼，不直接干涉城市的具体事务，而是通过赞助各方势力维持混乱的平衡
        子地点:
          - 叹息宫: 芙拉维娅的洛可可式奢华的白色大理石宫殿，联邦上流社会的社交中心，日夜举行着盛大的宴会与假面舞会
          - 幸运女神大赌场: 官方认证的最大赌场，“死人乐透”的主要场所

      远航者港区:
        位置: 城市最西侧
        功能: 服务于新大陆航线的港口，冒险者与船员的聚集地
        子地点:
          - 探险家公会: 冒险者协会与航运公会的联合办事处，发布船员招募与探索委托
          - 新大陆市场: 交易从远西大陆运回的物资、矿物与奇异生物的露天市场

      迷宫街市区:
        位置: 城市最外围
        功能: 平民区与灰色地带，帮派火拼频发，遍布妓院与走私窝点
        子地点:
          - 泻湖之子总部: 伪装成渔船仓库的帮派大本营，设有水下秘密通道

      月影温泉岛:
        位置: 城市东南方的独立岛屿
        角色:
          - 咲耶(精灵R4): 月影岛的主人，经营着大和风格的温泉旅馆‘月影之汤’
        功能: 以魔法温泉乡闻名的度假区，岛上禁止任何争斗，为各方人士提供庇护
