---
维纳利亚(永雾之港):
  所属: 南部地区/贸易联邦
  概述: 贸易联邦的军事核心与斯福尔扎家族的权力基地，其不死化的秘密警察“无光者”在暗中执法，终年被魔法迷雾笼罩的哥特式港都，是联邦唯一军港
  主要区域:
    黑曜石舰队港区:
      位置: 城市西部
      功能: 军事核心，戒备森严的军港，停泊蒸汽铁甲舰队
      子地点:
        - 不沉船坞: 由古代遗迹改造的半潜式船坞，由不死生物工匠与人类奴工在此劳作
        - 海军指挥部‘海妖之塔’: 洛伦佐的办公地，塔顶灯塔是雾中唯一光源
        - 无光者兵营: 秘密警察的总部，设有审讯室与秘密监狱

    永夜宫区:
      位置: 城市中心地势较高处
      功能: 斯福尔扎家族及附庸贵族的居住区与政治中心
      角色:
        - ‘冷血女爵’卡特琳娜·斯福尔扎(血族): 联邦议会长兼斯福尔扎家族族长，其冷酷的智慧与无情的手段，将这座城市打造成了自己最锋利的獠牙
      子地点:
        - 泣血圣母大教堂: 家族私人教堂，供奉欲望女士莉莉丝，教堂内饰淫靡，用于秘密仪式与血宴
        - 斯福尔扎宫: 卡特琳娜的哥特式宫殿群与联邦权力中枢，其内部如同迷宫，守护着家族数个世纪以来积累的财富与秘密

    迷雾水道区:
      位置: 城市东部和南部，最庞大、混乱的区域
      功能: 商业、平民生活与娱乐区，运河与拱桥纵横，雾气掩盖罪恶
      角色:
        - 伊索尔德女士: “血色天鹅绒”剧院的女主人，该剧院是销魂窟，也是高级情报交易中心
      子地点:
        - 血色天鹅绒剧院: 高级娱乐场所，提供戏剧表演、各族妓女与血奴。
        - 灰港: 平民与外来者混居区，建筑拥挤，帮派滋生。
        - 雾中人商会: 由海盗、走私贩和情报商人组成的联盟，是地下世界的掌控者
