---
贸易联邦: 
  政治与社会:
    位置: 位于大陆南方，由四座核心海港城市组成，北部的山脉是其天然屏障
    体制: 贵族共和议会制
    官僚体系: 实行双轨制，政务官由上议院指派，事务官通过考试选拔
    议会长: 卡特琳娜·斯福尔扎，由四大家族共同推选出的女性吸血鬼，作为联邦的最高首脑，在议会中拥有一票否决权
    联邦议会: 
      上议院: 由四大家族与其他较小贵族组成
      下议院: 由民间代表组成
    社会风气: 自由开放，多元文化与信仰融合
    主导家族:
      - 斯福尔扎家族: 家徽为'衔匕首的红狮'，家主为卡特琳娜·斯福尔扎
      - 科伦坡家族: 家徽为'缠烧瓶的银蛇'，家主为索菲娜·科伦坡
      - 维斯孔蒂家族: 家徽为'盘踞金币堆的黑龙'，家主为吉安·加莱亚佐·维斯孔蒂
      - 比安奇家族: 家徽为'戴面具的白猫'，家主为芙拉维娅·比安奇
    宗教信仰: 主流信仰为金币与贸易、欲望、谎言和幸运四位女神
  军事构成:
    - 城防军: 各海港城市自行组建，装备水平不一
    - 家族私兵: 四大家族的精锐部队，其中混杂有被操控的不死生物
    - 议会军: 联邦议会拨款组建的野战部队
  象征:
    国徽: 中央为天平图案，四分盾徽四角为四个家族家徽，下方铭言为“金币即自由”
    国家颜色: 象牙白（财富）、威尼斯红（活力）、翡翠绿（自由）
  知名人物:
    - 咲耶·月咏
    - 索菲娜
    - 卡特琳娜
    - 吉安
    - 卢克雷齐亚
    - 芙拉维娅