---
南部地区:
  所属: 米拉比里斯大陆/南部地区
  概览: 大陆南方沿海领地，被龙脊山脉与帝国腹地隔绝，拥有丰富的海洋资源与内河贸易网络，贸易联邦的主要所在地
  主要地点:
    主要城市群 (联邦四大家族统治):
      - 维纳利亚 (斯福尔扎家族): 联邦中部，政治首都，联邦军事力量的象征
      - 佛洛伦萨 (科伦坡家族): 联邦南部，欲望之都，欲望女士总神庙“万乐园”所在地
      - 米兰 (维斯孔蒂家族): 联邦东北部龙脊山脉下，工业与金融中心，遍布钟表工坊与银行
      - 威尼斯 (比安奇家族): 联邦最西部，自由都市，‘月影之汤’温泉、异国商品与情报的最大集散地，
    主要地理特征:
      - 龙脊山脉: 联邦与帝国间的天然屏障，陆路贸易充满危险
      - 破碎群岛: 东南海域的火山岛屿与暗礁，海盗与鸟身女妖的巢穴
      - 金币河: 流经米兰与佛洛伦萨的内陆运输动脉