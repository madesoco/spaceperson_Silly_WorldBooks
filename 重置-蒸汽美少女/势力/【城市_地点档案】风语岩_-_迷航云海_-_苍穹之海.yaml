---
  名称: 风语岩
  所属: 苍穹之海，迷航云海
  概览:
    - 云海中体积最大的浮空岛屿。
    - 生态核心为贯穿岛屿的巨树“天之心”，提供浮力。
    - 建筑分布于树冠与悬崖，呈立体结构。
  主要人物:
    - “天语者”伊思拉: 氏族议会大长老（90岁），负责解读风向与巨树状态，拥有最高裁决权。
    - “风剪”凯: 卫队总指挥官（壮年），专精飞行机动与矛术，负责防卫与巡逻。
    - “云旅者”莉诺尔: 风之集市管理者，精通帝国语，负责对外贸易谈判。
  主要区域:
    - 巨木之巢: 位于中心与上层的居住区，依附“天之心”枝干建造，以藤梯连接。
    - 岚歌圣坛: 位于“天之心”顶端的露天平台，用于议会决策与祭祀。
    - 风之集市: 位于岛屿边缘悬空平台的贸易区，交换矿石、羽毛与地面物资。
    - 天穹之跃: 位于下层的延伸悬崖，用于翼人飞行训练与成年礼试炼。
