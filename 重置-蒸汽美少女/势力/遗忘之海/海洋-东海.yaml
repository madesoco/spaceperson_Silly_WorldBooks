---
地理区域信息:
  东海:
  所属: 遗忘之海
  概览: 位于帝国东部海域，受到东方边缘地区之下死灵王朝的魔力辐射，海域中游荡着不死生物与古代海怪。帝国海军在此地建立了数个要塞，艰难地进行着探索，试图打通前往更遥远东方的航线
  主要势力:
    - 帝国东方勘探舰队: 帝国海军中专门负责探索危险海域的特种舰队，船员多为经验丰富的老兵与冒险者，装备了对抗亡灵的神术装置
    - 亡灵海盗: 由古代海盗的怨念或被亡灵法师操控的尸骸组成的幽灵舰队，他们不需要补给，是东海上最诡异的威胁
  主要地点:
    - 沉默海域: 东海深处常年浓雾区，古代海怪的墓场，精灵航海王国遗迹所在，极少有船只生还
    - 骸骨暗礁区: 靠近东方沙海的近海区域，由巨大生物骸骨与沉船构成，亡灵海盗活动区
    - 前哨要塞·晨星港: 帝国最深入的前哨基地，位于海域中部岛屿，为勘探舰队与冒险者提供唯一的补给与庇护
