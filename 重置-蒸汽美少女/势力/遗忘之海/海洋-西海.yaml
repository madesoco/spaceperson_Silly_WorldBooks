---
地理区域:
  西海:
  所属: 遗忘之海-西海
  概览: 连接着旧世界与新大陆的机遇之海，世界航运的十字路口，巨大的世界之脊横跨其中，通过水道连接南北。海盗的聚集地，绯红舰队的三叉戟议会在此地秘密运作，维持着海盗间的脆弱平衡
  主要势力:
    - 三叉戟议会: 绯红舰队最高决策机构，由三位最强船长组成，掌控着西海大部分的海盗活动与销赃网络
    - 皇家远西公司船队: 由帝国特许，负责远西殖民地贸易的武装船队，是海盗们最垂涎也最难啃的猎物
    - 自由佣兵舰队: 受雇于没有强大海军的西部小国或大型商会的武装船队，负责护航任务
  主要地点:
    - 海盗自由港·拿骚: 位于海域中心偏南隐秘群岛，不受任何国家管辖的岛屿港口，是西海所有海盗公开的销赃地补给站与避风港，由三叉戟议会幕后掌控
    - 詹姆斯敦航线: 横贯西海北部，连接帝国本土与远西殖民地的官方航线，受帝国海军重点保护
    - 希望港航线: 斜穿西海中南部，连接贸易联邦与远西殖民地的商路，因航程更长且保护力量较弱成为海盗袭击重灾区
