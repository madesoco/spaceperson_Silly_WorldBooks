---
  名称: 自由海
  所属: 遗忘之海，米拉比里斯南部
  概览:
    - 位于贸易联邦南部的广阔海域，又称南海。
    - 特征为复杂洋流、火山岛屿、财富与火药味。
    - 秩序由联邦海军勉强维持，实权掌握在商船队与海盗手中。
  主要势力:
    - 绯红舰队: 以此为据点的庞大蒸汽海盗联合体。
    - 贸易联邦海军: 由私掠舰队与议会海军组成，保护核心航线。
    - 帝国南方巡弋舰队: 部署在争议海域的常备力量，威慑联邦。
  主要地点:
    - 迷雾群岛: 东南部火山岛链，终年笼罩浓雾，绯红舰队巢穴与销赃港“避风港”所在地。
    - 风暴海峡: 西部连接西海的狭窄航道，洋流湍急，海盗伏击点。
    - 黄金航道: 贯穿中心地带的主商路，联邦经济生命线。
