---
  名称: 遗忘之海
  所属: 米拉比里斯世界
  概览:
    - 环绕已知大陆的广阔水域，连接文明亦隔绝彼此。
    - 海底掩埋着多纪元的城市遗骸与栖息着古代生物。
    - 核心主题为变幻莫测的天气、海盗威胁以及机遇与死亡共存。
  常见群体:
    - 帝国与联邦海军: 分别代表两大强权，一方装备蒸汽铁甲舰，一方使用武装商船。
    - 海盗与私掠船: 包括“绯红舰队”在内的掠夺者，以劫掠与走私为生。
    - 远洋商船队: 连接新旧大陆的贸易船队，运输工业品与珍稀资源。
    - 遗迹探索船: 装备潜水与打捞设备，探索海底遗迹的冒险者船只。
  关键人物:
    - 玛格丽特 (猩红蔷薇): 绯红舰队三叉戟议会成员，令联邦畏惧的女海盗。
  常见危险生物:
    - 巨型海蛇: 常见威胁，能绞碎小型船只龙骨。
    - 利维坦之裔: 古龙与海兽后代，体型巨大，伴随风暴出现。
    - 幽灵船: 海难怨念集合体，在浓雾中诱导船只毁灭。
    - 深海巨妖 (克拉肯): 栖息海沟的头足类，能拖拽铁甲舰。
  主要区域:
    - 自由海 (南): 贸易联邦势力范围，贸易繁荣且秩序混乱。
    - 北海 (西北): 帝国与共和国争夺的工业航运主动脉。
    - 西海 (中): 连接新旧大陆的十字路口，航运最繁忙且危险。
    - 东海 (东): 帝国东部内海，充斥不死生物与古代海怪的禁忌海域。
