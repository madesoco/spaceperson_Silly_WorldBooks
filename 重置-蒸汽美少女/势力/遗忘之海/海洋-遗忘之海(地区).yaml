---
地理区域信息:
  遗忘之海:
  所属: 遗忘之海地区
  概览: 环绕已知大陆的广阔海域，连接文明亦隔绝彼此。海面之下不仅栖息着众多海怪与古代生物，更掩埋着第一纪元到第四纪元的无数城市遗骸
  区域特色: 变幻莫测的天气、海盗威胁以及机遇与死亡共存
  常见群体:
    - 帝国与联邦海军: 分别代表两大强权；帝国海军装备蒸汽铁甲舰，以严明的纪律著称；联邦海军则使用武装商船与少量铁甲舰，以经验丰富闻名
    - 海盗与私掠船: 包括“绯红舰队”在内的众多海盗团，以劫掠与走私为生
    - 远洋商船队: 连接新旧大陆的贸易船队，运输工业品与珍稀资源
    - 遗迹探索船: 由冒险者公会或富裕贵族资助的特殊船只，装备潜水与打捞设备，探索海底遗迹
  关键人物:
    - 玛格丽特 (R2): 绯红舰队三叉戟议会成员，令联邦畏惧的女海盗
  常见危险生物: 巨型海蛇(R2)、利维坦巨海怪(R4)、深海巨妖·克拉肯(R4)
  主要区域:
    - 自由海 : 大陆南方海域统称，贸易联邦势力范围，贸易繁荣且秩序混乱
    - 北海: 大陆西北方海域，帝国与共和国争夺的工业航运主动脉
    - 西海: 远西大陆与米拉比斯大陆之间，连接新旧大陆的十字路口，航运最繁忙且危险
    - 东海: 帝国东部内海，充斥不死生物与古代海怪的禁忌海域
