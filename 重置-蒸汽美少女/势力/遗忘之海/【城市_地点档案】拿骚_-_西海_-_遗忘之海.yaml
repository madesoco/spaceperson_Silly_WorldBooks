---
  名称: 海盗自由港·拿骚
  所属: 西海，中心偏南
  概览:
    - 不受国家管辖的岛屿港口，海盗公开销赃与补给地。
    - 由三叉戟议会控制，获帝国暗中支持。
    - 秩序混乱，也是情报与黑市交易中心。
  主要人物:
    - “海妖之歌”伊芙琳: 三叉戟议会领袖之一，常驻拿骚的女海盗船长，港口实际统治者。
    - “商会账房”阿黛尔: “皇家远洋商会”负责人，帝国在港口的利益代表与情报主管。
    - 港务长“铁锚”: 腿部残疾的退役海盗，负责管理码头停泊与收费。
  主要地点:
    - 自由湾: 港口主码头区，停泊各类船只，位于天然避风港内。
    - 沉船集市: 由搁浅废船改造的黑市区域，出售违禁品与奴隶，位于自由湾南侧。
    - 风暴之眼堡垒: 由法师塔改造的要塞，伊芙琳居所与议会指挥中心，配有岸防炮，位于悬崖顶端。
    - 皇家远洋商行: 帝国官方贸易点，装饰华丽的三层建筑，负责商品输入与秘密会谈。
    - 醉美人鱼酒馆: 港内最大的酒馆与妓院，海盗招募与情报交换场所，位于码头中心。
