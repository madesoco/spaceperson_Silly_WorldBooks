---
城市与地点档案:
  海盗自由港·拿骚:
  所属: 
  概览: 位于西海中心偏南，不受国家管辖的岛屿港口，海盗公开销赃与补给地。秩序混乱，由三叉戟议会控制，获帝国暗中支持，是海上情报与黑市交易中心
  主要人物:
    - 伊芙琳(R3): 三叉戟议会领袖之一，常驻拿骚的女海盗船长，以迷人的歌喉与同样致命的枪法闻名，负责维持港内的海盗势力平衡，港口实际统治者
    - 阿黛尔(R2): 皇家远洋商会在拿骚的明面负责人，总是带着温和微笑的帝国女性。为港口带来了帝国先进的商品与稳定的销赃渠道，暗中则是帝国在此地的情报主管与利益代言人
    - 麦尔加(R2): 断了一只腿的贪财退役老海盗，由伊芙琳任命，负责管理港口码头的日常停泊与收费事宜
  主要地点:
    - 自由湾: 港口主码头区，停泊各类船只，位于天然避风港内，面向西海主航道
    - 沉船集市: 由搁浅废船改造的黑市区域，出售帝国违禁品与来自远西大陆的奴隶，位于自由湾南侧
    - 风暴之眼堡垒: 由第四纪元法师塔改造的要塞，伊芙琳居所与议会指挥中心，配有岸防炮，位于港口入口处悬崖顶端
    - 皇家远洋商行: 位于沉船集市的入口处，帝国官方贸易点，港内少数几座看起来整洁体面的建筑之一；装饰华丽的三层建筑，阿黛尔与各方势力进行秘密会谈的场所
    - 醉美人鱼酒馆: 坐落在自由湾码头的中心区域，港内最大混乱的酒馆，海盗招募与情报交换场所。二楼同时也是一座小有名气的妓院
