---
地理区域档案:
  北海:
  所属: 遗忘之海
  概览: 夹在帝国西北海岸与卡尔瓦德共和国之间的寒冷海域。海水颜色深沉，气候严酷，但相对开阔的海面与较少的岛屿使其成为一条稳定而高效的贸易走廊。帝国蒸汽铁甲舰与共和国游击快船在此争夺航线控制权，海盗活动在此地相对稀少
  主要势力:
    - 帝国北海舰队: 驻扎于利维亚坦之门的主力舰队，装备精良，负责保护帝国至远西大陆的航线安全
    - 卡尔瓦德共和国海军: 由少量改装商船与快速袭击舰组成的海上力量，利用地形优势对帝国运输线进行骚扰作战
  主要地点:
    - 利维亚坦之门: 帝国在北海沿岸最大的军港与造船基地，位于海域东岸（帝国境内）
    - 铁锚湾: 卡尔瓦德共和国最重要的出海口，被重炮与山脉保护的母港，位于海域西岸（共和国境内）
    - 鲸落航道: 在海域中心北海最繁忙商业航线，因古代巨鲸迁徙路线得名，是帝国与共和国争夺的焦点
