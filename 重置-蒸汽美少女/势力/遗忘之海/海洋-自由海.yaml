---
地理区域档案:
  自由海:
  所属: 遗忘之海-自由海
  概述: 位于贸易联邦南部的广阔海域，又称南海，大陆最自由也最混乱的海上乐园；海域东部是帝国与联邦海军常年对峙的争议区
  特征: 复杂洋流、火山岛屿遍布、财富与火药味
  秩序: 由联邦海军勉强维持，实权掌握在商船队与海盗手中
  主要势力:
    - 绯红舰队: 以自由海为主要活动范围的蒸汽船海盗联合体
    - 贸易联邦海军: 由四大家族的私掠舰队与议会海军组成，保护联邦的核心航线，但效率与忠诚度受质疑
    - 帝国南方巡弋舰队: 帝国部署在东部争议海域舰队，任务是威慑联邦并保护帝国商路，与联邦海军摩擦不断
  主要地点:
    - 迷雾群岛: 自由海东南部的火山岛屿群，终年被地热蒸汽与浓雾笼罩，绯红舰队巢穴与销赃港'避风港'的所在地
    - 风暴海峡: 连接自由海与西海的航道，因狭窄的水道与湍急的洋流而得名，是海盗最理想的伏击地点
    - 黄金航道: 从联邦四大港口延伸出的主商路，因其承载的巨额财富而得名，联邦经济生命线
