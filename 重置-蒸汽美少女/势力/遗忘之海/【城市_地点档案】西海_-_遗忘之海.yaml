---
  名称: 西海
  所属: 遗忘之海，米拉比里斯与远西大陆之间
  位置: 连接旧世界与新大陆的海域。
  概览:
    - 世界航运的十字路口，巨大的世界之脊横跨其中，通过水道连接南北。
    - 繁荣与罪恶并存，大陆规模最大、种类最多的海盗聚集地。
    - 由绯红舰队的三叉戟议会维持海盗间的平衡。
  主要势力:
    - 三叉戟议会: 绯红舰队最高决策机构，由三位最强船长组成，掌控海盗活动与销赃。
    - 皇家远西公司船队: 帝国特许武装船队，负责远西殖民地贸易，防御力强。
    - 自由佣兵舰队: 受雇于西部小国或商会的武装船队，负责护航任务。
  主要地点:
    - 海盗自由港·拿骚: 不受管辖的岛屿港口，公开销赃与补给地，三叉戟议会幕后掌控。
    - 新阿尔比恩航线: 连接帝国本土与远西殖民地的官方航线，横贯北部，受帝国海军重点保护。
    - 希望港航线: 连接贸易联邦与远西殖民地的商路，斜穿中南部，因保护较弱成为海盗袭击重灾区。
