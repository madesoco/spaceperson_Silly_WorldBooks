---
城市与地点档案:
  迷雾群岛:
  所属: 遗忘之海-自由海
  位置: 位于群岛主岛西侧（避风港）、中部群山后（龙喉湾）、最高峰（三叉戟堡）。
  概述: 由火山活动形成的岛屿群，终年被地热蒸汽与海雾笼罩。这里是绯红舰队的大本营，充斥硫磺、朗姆酒与火药气息，一个不受任何国家法律约束的海盗天堂
  主要人物:
    - 玛格丽特(R2): 三叉戟议会最具声望的女船长，绯红舰队灵魂人物，以果决的指挥与对欲望的坦率而闻名
    - 巴萨罗缪(R1): 经验丰富的老海盗，三叉戟议会成员，负责舰队的日常防务与武器整备，左手被一个巨大的蒸汽动力铁钩取代
    - 雅各布(R1): 避风港黑市的管理者，与大陆各大黑市都有联系的矮人商人。名义上中立，实际是绯红舰队销赃网络的核心节点
  主要地点:
    - 避风港: 位于群岛主岛的西侧，被岸炮严密保护的隐蔽航道唯一对外港口；建于死火山口环形山壁上，建筑层层叠叠，街道狭窄混乱，海盗销赃、补给与娱乐的唯一去处
    - 龙喉湾: 隐藏在群岛中部的群山之后，与避风港有地下隧道相连；主力舰秘密停泊与维修地，天然火山内湾，湾内的地热蒸汽被引导至矮人船匠开设的维修工坊
    - 海妖之歌酒馆: 坐落于避风港码头区的中心位置；避风港最大酒馆，由女翼人经营。情报集散地，海盗们在此吹嘘战绩、招募船员，或是为了一点口角拔刀相向
    - 三叉戟堡: 群岛最高峰处的要塞，三叉戟议会的会议地点与舰队的指挥中心。架设着一台从帝国缴获的远程通讯设备，用于监控周边的海域动向
