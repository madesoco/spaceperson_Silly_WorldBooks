---
城市与地点档案:
  米斯拉尔:
  所属: 地底世界/主母议会/静默之海
  概览: 悬挂于地底溶洞穹顶的立体城市，苍白精灵首都；建筑为钟乳石雕琢的哥特式尖塔，由悬空石桥连接。
  j结构: 由五大主母家族共同统治
  社会: 信仰阴影与欲望诸神，盛行奴隶角斗与表演性杀戮
  主要人物:
    - ‘幽影之语’第一主母·菲茵德拉(Lv.20): “毒蝎”家族族长，以阴谋手腕与对谋杀女神的虔诚信仰闻名
    - 马拉克 (Lv.6): 永夜角斗场首席导演，专注于创造华丽死亡表演的苍白精灵
    - 贾拉索 (Lv.5): 掌握地表贸易渠道的商人首领，城市与外界的物资情报枢纽
    - “无声之刃”阴谋团: 不属于任何特定家族的精英刺客与捕奴队组织，她们接受任何出价够高的委托
  主要区域:
    主母尖塔区:
      - 位置: 城市最高层
      - 功能: 五大主母家族的权力中枢与居住地；五座最为宏伟的钟乳石尖塔在此矗立，象征着五大家族的地位，塔与塔之间由华丽而险峻的拱桥连接
      - 子地点:
        - 蛛网议事厅: 悬挂于五塔中央的开放平台，用于商议重大事务
        - 毒蝎之巢: 第一主母的私人宫殿，以迷宫般的内部结构与致命的魔法陷阱而闻名
    泪光集市区:
      - 位置: 城市中层
      - 功能: 城市的商业社交与娱乐中心，由发光的苔藓与水晶提供照明。地表来的冒险者商人以及各种族的奴隶在此汇集
      - 子地点:
        - 永夜角斗场: 利用巨大石笋凹陷改造而成的圆形剧场，除角斗外，还有创意与情色表演，是城市最受欢迎的娱乐场所
        - 奴隶市场: 拍卖各类奴隶的场所，包括苦力、角斗士与玩物
        - 五女神神殿群: 供奉谎言、黑暗、苍白、谋杀与欲望女神的连体神殿，每个神殿都由一个主母家族主要资助
    菌类农场与矿坑区:
      - 位置: 城市底层，紧贴溶洞地面
      - 功能: 资源生产区，奴隶劳作之地；光线昏暗，空气潮湿
      - 子地点:
        - 哀嚎矿坑: 开采魔法矿物，由灰矮人奴隶监工管理着大量哥布林与兽人奴隶，死亡率极高
        - 荧光菌圃: 培育可食用与可照明菌类的大型农场，城市食物的主要来源；是年老或体弱奴隶的最后去处
