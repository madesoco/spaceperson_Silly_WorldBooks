---
势力档案:
苍白精灵主母议会:
  定义: 地底世界苍白精灵社会的最高权力机构，由五大主母家族在力量、阴谋与传统的恐怖平衡下共同统治的母权社会，背叛与复仇是其政治生态的常态
  理念: 母权至上，将第二纪元的失败视为永恒耻辱，复仇是其核心文化驱动力。
  势力范围: 以阴谋之城·米斯拉尔为核心辐射整个地底世界；
  主母议会: 由五大家族的第一主母组成的最高决策机构。家族拥有一票，即使是主母也必须遵循议会的多数决议；五大家族构成社会权力基石，通过各自的专长领域相互制衡
  五大家族:
    - 毒蝎家族 (主母·菲茵德拉): 专精阴影魔法与军事，掌控最精锐的战士与刺客，五大家族之首
    - 蛛网家族 (主母·阿拉克涅): 编织覆盖地底世界的情报网，负责与地表及其他地底势力的秘密交易
    - 夜蕈家族 (主母·希芭): 控制炼金术与资源，控制着米斯拉尔的食物来源（菌类农场）与珍稀矿脉
    - 石心家族 (主母·玛拉): 掌管宗教与传统，侍奉着苍白女士与谋杀女士等阴暗神祇，维系着社会的信仰与古老法则
    - 幻语家族 (主母·莉莉丝贝): 负责幻术与奴隶贸易，掌控着永夜角斗场与奴隶市场，擅长通过幻术与欲望操控人心
  内部冲突: 尽管毒蝎家族的军事实力最强，但其他四大家族常在议会中结盟，利用其在经济、情报、宗教等领域的优势，共同制衡毒蝎家族的权力扩张
