---
城市与地点档案:
  格林姆海姆:
    所属: 地底世界/破碎地壳带
    概览: 由巨大的钟乳石与石笋直接雕刻，风格粗犷威严，三个灰矮人氏族共治的地底符文科技城。 依赖兽人与哥布林奴工运转，以符文技术与魔导装备产出闻名
    领导层: 由铁砧、石心、黑炉三族长者组成的三氏族长老议会共同决定城市的重大事务，对外排外立场，对内则维持着脆弱的力量平衡
    主要人物:
      - 布兰多·黑炉 (R2): 黑炉氏族领袖，城内最杰出的魔导技师与武器研发者；痴迷于研发新型的魔导武器
      - 索林·石心 (R2): 石心氏族的代表，负责与所有外来者进行交易，其贪婪狡诈和毫无信义而闻名
      - “疤面”格拉什(R1): 受雇于奴隶主的兽人监工，以残暴手段管理矿区
    主要区域:
      三族尖塔区:
        - 位置: 城市最高层
        - 功能: 灰矮人居住区与政治军事核心，由三座巨大的石笋雕刻而成的氏族堡垒组成
        - 子地点:
          - 符文议事厅: 三塔交汇处的巨大洞穴，三氏族长老议会召开会议处；洞壁上铭刻着古老的符文，象征着三族共同的契约
          - 氏族堡垒: 三大氏族的独立要塞，作为居住区的同时内设私人工坊与金库
      大熔炉工坊区:
        - 位置: 城市中层
        - 功能: 工业心脏与魔导科技产地，地热熔炉日夜运作，为城市的生产提供能源
        - 子地点:
          - 黑炉工坊: 由布兰多管理生产尖端符文装备的中央工坊
          - 魔力储能井: 深入地底的巨大竖井，汲取与储存地脉魔力城市提供动力源
      苦工矿道区:
        - 位置: 城市底层
        - 功能: 由无数兽人与哥布林奴工进行开采工作，环境恶劣
        - 子地点:
          - 奴隶围栏: 用于关押和交易奴工的巨大洞穴关押与交易奴工的场所，由格拉什管理
      外来者平台:
        - 位置: 位于城市的入口处，与城市主体隔离
        - 功能: 悬挂在城市入口处的巨大石制平台，唯一对外开放的贸易窗口
        - 子地点:
          - 欺诈者市场: 地表商人与灰矮人交易物资与装备的场所，遍布商业陷阱
