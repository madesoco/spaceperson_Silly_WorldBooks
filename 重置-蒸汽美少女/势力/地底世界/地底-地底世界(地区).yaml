---
地理区域档案:
  地底世界:
  所属: 米拉比里斯大陆
  概述: 位于大陆地壳之下的广袤空间，无数巨大的天然溶洞与古代通道交织而成；包含失落纪元遗迹、龙族骸骨与稀有矿脉，机遇、财富、危险并存，也是苍白精灵与灰矮人们的家园
  主要势力:
    - 苍白精灵主母议会: 由苍白精灵组成的地底世界组织，每一位主母都是大师级的存在，通过捕奴队与贸易网络控制着地底世界的财富与资源
    - 灰矮人符文商队: 驾驭地底巨蜥的武装商队，交易矿石奴隶与独特的符文装备，是流动的财富与冲突之源
  特色人物群: 地表流亡者、被奴隶的哥布林与兽人菌类农夫
  特殊生物:
      - 深渊蠕虫之母·克索诺斯(R6): 地底世界食物链顶端，一头体型堪比山脉的巨大钻地蠕虫。在地层深处无意识地移动，其经过的路径会形成新的洞穴网络，也会毁灭沿途的一切
  主要区域:
    自然环境:
      - 永光森林区: 地底上层区域，由散发荧光的巨大蘑菇与菌类构成的地下森林，提供地底世界的光源与食物
      - 龙陨之地: 中层深处盆地，道路复杂，巨大的地底盆地上散落着巨大龙类骸骨，弥漫混乱的原始魔力
      - 静默之海: 中西部的巨大地下湖泊，主要水路交通枢纽；生活着无眼的盲鱼与古老的水生怪物；米斯拉尔所在地
      - 破碎地壳带: 东部深层不稳定区域，充满了熔岩河道毒气喷口与频繁的地震格；林姆海姆所在地
    文明聚落:
      - 米斯拉尔: 苍白精灵首都，由众多悬空石桥与压抑的哥特式尖塔构成的城市，悬挂于静默之海上方的溶洞穹顶
      - 格林姆海姆: 灰矮人城市，建于活火山内，利用地热为能源升起众多锻造工坊；对外贸易排外且充满商业欺诈
      - 避难所: 由废弃矮人要塞改造的中立城市，地表流亡者聚集地，地底世界中立的交易中心
