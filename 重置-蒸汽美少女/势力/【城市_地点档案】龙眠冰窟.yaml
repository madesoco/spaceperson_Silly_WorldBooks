---
  名称: 龙眠冰窟
  所属: 米拉比里斯，北方冻土，巨兽冰川深处
  概览:
    - 位于巨兽冰川核心的巨大洞穴系统。
    - 第四纪元法师研究龙类生物的秘密实验室遗址。
    - 因古老的白龙血脉龙娘奥菲莉亚在此沉睡而得名。
    - 洞内遍布失控的龙血生物，是其巢穴。
    - 环境特征：极低温，冰壁有魔法符文残光，空气中有龙威与原始魔力。
  主要人物:
    - 奥菲莉亚（霜寒之拥）: 在此沉睡千年的白龙血脉龙娘，冰窟的力量源头，状态不明。
    - 龙血生物群: 实验失控产物，包含龙类亚种与魔法生物，攻击所有入侵者。
  主要区域:
    - 冰棘回廊: 外部区域，由扭曲冰道与冰柱构成的迷宫，小型龙血生物巡猎场。
    - 符文遗骸大厅: 中部枢纽，曾是研究核心区，有冰封石柱与建筑残骸，盘踞着更强的龙血生物。
    - 永寂之心: 最深处、温度最低的核心，奥菲莉亚沉睡于纯净永冻冰晶构成的悬浮平台上，周围时空凝滞。
