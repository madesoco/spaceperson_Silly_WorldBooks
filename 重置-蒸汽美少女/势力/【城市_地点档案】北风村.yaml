---
  名称: 北风村
  所属: 米拉比里斯，北方冻土
  位置: 坐落于霜巨人山脉余脉。
  概览:
    - 帝国早期开拓计划遗留的避世村庄，文明世界在北方冻土的前哨。
    - 经济来源为小片农田（黑麦、土豆）和南侧的黑松林地（木材、猎物）。
    - 保留有少量老旧的帝国蒸汽装置（如蒸汽水泵）。
    - 通过与帝国商队及凛冬之牙的贸易维生。
  主要人物:
    - 艾琳娜·霜语（白霜女士）: 隐居在附近雪山洞穴的精英阶女巫，为村民提供草药、治疗和天气预警，被视为守护者。
    - 老铁锤·古纳: 人类村长，唯一能维修蒸汽装置的人，负责对外贸易。
    - 北地猎户: 村中青壮年，负责守卫与狩猎，武器为陷阱与老式燧发枪。
  主要地点:
    - 聚落核心区: 村庄中心，包含木石房屋、村长小屋、铁匠铺和“暖炉”旅店（兼杂货铺与酒馆）。
    - 黑松林地: 村南的耐寒针叶林，木材与猎物来源地，深处有冬狼等生物。
    - 避风农田: 村东侧山脉避风处的梯田，种植耐寒作物。
    - 白霜女士的洞穴: 位于村西北雪山中的天然洞穴，艾琳娜的居所，洞口有魔法伪装。
