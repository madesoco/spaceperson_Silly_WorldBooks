---
  名称: 地底世界
  所属: 米拉比里斯大陆地表之下
  概览:
    - 位于地壳之下的广袤空间，由溶洞与古代通道组成。
    - 包含失落纪元遗迹、龙族骸骨与稀有矿脉。
    - 生态系统独立，存在原生怪物、苍白精灵与灰矮人势力。
  主要势力与生物:
    - 苍白精灵主母议会: 米斯拉尔城的最高权力机构，由五大家族主母组成。
    - 灰矮人符文商队: 驾驭地底巨蜥的武装商队，交易矿石、奴隶与符文装备。
    - 地表流亡者: 聚集于“避难所”的罪犯与探险家混合群体。
    - 哥布林菌类农夫: 种植荧光蘑菇的底层族群。
    - 危险生物:
      - 深渊蠕虫之母·克索诺斯: 传说级钻地生物，能制造新洞穴。
      - 夺心魔菌落: 食脑寄生体，通过精神控制建立群落。
      - 石化蜥蜴群: 能将生物石化的群居魔法生物。
      - 钩爪恐魔: 善于攀爬与伏击的掠食者。
      - 尖啸蕈: 伪装成蘑菇的警戒性植物生物。
      - 穴居攫怪: 潜伏于洞顶的触手捕食者。
  主要区域:
    自然环境:
      - 永光森林区: 上层区域，由发光菌类构成的无树森林。
      - 龙陨之地: 中层深处盆地，第一纪元古龙埋骨地，魔力混乱。
      - 静默之海: 中西部地下湖泊，主要水路交通枢纽。
      - 破碎地壳带: 东部深层不稳定区域，多熔岩与地震。
    文明聚落:
      - 阴谋之城·米斯拉尔: 苍白精灵首都，悬挂于静默之海上方的溶洞穹顶。
      - 熔炉之心·格林姆海姆: 灰矮人城市，建于活火山内，利用地热能源。
      - 避难所: 由废弃矮人要塞改造的中立城市，地表流亡者聚集地。
