---
  名称: 永雾之港·维纳利亚
  所属: 贸易联邦，西北海岸
  概览:
    - 贸易联邦的军事核心与斯福尔扎家族的权力基地。
    - 终年被魔法迷雾笼罩的哥特式港都，是联邦唯一军港。
    - 由斯福尔扎家族铁腕统治，其不死化的秘密警察“无光者”在暗中执法。
    - 城市气息混合了海水、血腥与奢华香料。
  主要人物:
    - ‘冷血女爵’卡特琳娜·斯福尔扎: 联邦议会长兼斯福尔扎家族族长，坐镇此城。
    - ‘寂静之潮’洛伦佐: 联邦海军总司令兼“无光者”指挥官，一位具有智慧的食尸鬼，卡特琳娜的忠诚执行者。
    - ‘雾中人’商会: 由海盗、走私贩和情报商人组成的联盟，是地下世界的掌控者。
    - 伊索尔德女士: “血色天鹅绒”剧院的女主人，该剧院是销魂窟，也是高级情报交易中心。
  主要区域:
    黑曜石舰队港区:
      - 位置: 城市西部，面向与帝国对峙的海域。
      - 功能: 军事核心，戒备森严的军港，停泊蒸汽铁甲舰队。
      - 子地点:
        - 不沉船坞: 由古代遗迹改造的半潜式船坞，由不死生物工匠与人类奴工在此劳作。
        - 海军指挥部‘海妖之塔’: 洛伦佐的办公地，塔顶灯塔是雾中唯一光源。
        - 无光者兵营: 秘密警察的总部，设有审讯室与秘密监狱。
    永夜宫区:
      - 位置: 城市中心地势较高处。
      - 功能: 斯福尔扎家族及附庸贵族的居住区与政治中心。
      - 子地点:
        - 泣血圣母大教堂: 家族私人教堂，供奉欲望女士莉莉丝，用于秘密仪式与血宴。
        - 斯福尔扎宫: 卡特琳娜的居所与权力中枢，守护着家族财富与秘密。
    迷雾水道区:
      - 位置: 城市东部和南部，最庞大、混乱的区域。
      - 功能: 商业、平民生活与娱乐区，运河与拱桥纵横，雾气掩盖罪恶。
      - 子地点:
        - 银匙市场: 官方交易市场，其地下水道为黑市。
        - 血色天鹅绒剧院: 高级娱乐场所，提供戏剧表演、各族妓女与血奴。
        - 灰港: 平民与外来者混居区，建筑拥挤，帮派滋生。
