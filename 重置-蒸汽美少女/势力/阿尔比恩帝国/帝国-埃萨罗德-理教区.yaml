---
埃萨罗德-理教区:
  概述: 位于皇冠区东南部，隔着艾德拉河与皇冠区相望。帝国最高学术机构——皇家魔导学院的所在地
  环境: 区域内建筑以学院派的古典风格为主; 街道整洁，氛围安静，行人多为学者、学生或学院雇员

  皇家魔导学院:
    概述: 大陆首座公立综合大学，招收14岁以上的学生；学院内设有多个院系，包括骑士院、魔法院、炼金院、工程院等，培养贵族子弟与平民学子
    环境: 校区内石砌教学楼与重工业废气排放管道相邻；多阶层生源同校，常有武器对练与学术辩论；空气中常混羊皮纸、煤烟与臭氧味
    主要人物:
      艾格尼丝·冯·霍恩索伦(R3): 现任女校长，索菲亚女亲王之妹。务实而开明的教育家，负责调节学院内贵族派系利益，并主导多项魔法与机械跨学科科研立项
      克莱尔·冯·埃德尔斯坦(R2): 骑士院二年级生。男爵家庭出身，凭借出色的剑术与交际能力成为贵族学生的领袖人物
      汉娜·米勒(R2): 魔法院二年级生。出身大平原农业镇，靠高分获取全额奖学金，以优异的成绩成为平民学生们的希望
    地标建筑:
      主校区·真理之庭:
        定位: 学院中心区域，非战斗系院系的教学楼集中地。
        环境: 建筑材料多为石灰岩，以中央钟楼为中心呈对称分布
        设施: 万卷馆图书馆、思想者时钟塔(兼校长办公地)、星穹学生俱乐部
      战斗校区·誓言之坪:
        定位: 学院东侧，战斗系院系的训练场
        环境: 由无遮挡的露天步道与主校区相连，外墙坚固避免战斗时损坏
        设施: 骑士训练场、魔法测试回廊、百步靶场
      工学与炼金区·创造者熔炉:
        定位: 学院西侧，贴近艾德拉河岸线，机械与生化实验区
        环境: 厂房内烟囱持续运作，多座实验楼与炼金院相连
        设施: 蒸汽工程坊、万物炼金实验室、魔导研究所
      生活区·橡树之心:
        定位: 沿主校区南北两侧边缘分布，在校师生食宿与夜间活动的综合区域
        环境: 以学院派古典为主，内部设施与设施布局较为现代
        设施: 混合宿舍楼、熔炉酒馆、宁静湖(约会圣地)
