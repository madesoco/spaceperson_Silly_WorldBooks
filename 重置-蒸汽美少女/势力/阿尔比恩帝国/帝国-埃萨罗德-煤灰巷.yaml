---
埃萨罗德-煤灰巷:
  概览: 城市边缘的贫民窟与黑市聚集地。由废弃工业设施与地下排水网络扩建而成，区域秩序由本地帮派掌控
  环境: 建筑残破，终年不见阳光，空气混合着煤灰、机油与排泄物发酵的气味
  主要人物群:
      维克托·'铁齿'(R2): 现役C级冒险者，亚人(熊)，贫民窟最大帮派"锈齿"头目，控制地下水路走私线
      莉娜(R1): 12岁的人类情报贩子，依靠在错综复杂的管道中穿梭传递消息换取黑麦面包
      霍斯(R1): 被吊销执照的帝国前军医，在黑市经营地下诊所，提供取弹片服务与廉价的机械义体安装
  地标建筑:
    锈水集市: 区域内核心黑市，摊位由废旧铁皮与防水布搭盖，出售走私军火、违禁魔药与被刮去编号的帝国制式物资
    盲眼赌场: 煤灰巷主街尽头的废弃锅炉房，锈齿帮运营的地下赌场；除纸牌与轮盘赌外，中心下沉式铁笼定期举办无规则死斗比赛
    滴水棚户区: 沿下水道主干线两侧延伸的底层劳工居住地，住所由木板与废弃铁皮拼凑
