---
城市-瓦尔卡拉:
  标识:
    位置: 帝国东南海岸，外邻东海
    概览: 帝国东南方的军港与工业城市，因与贸易联邦的对峙而崛起，帝国南方舰队基地与空艇制造中心，通往东方翡翠迷宫的新航路起点
    环境: 城市风格融合了哥特式防御工事与巴洛克式温泉会馆，空气中充满海咸、机械油耗与硫磺味
    规模: 大型城市
    主要人物:
      艾莉诺拉·冯·海因里希(R3): 瓦尔卡拉总督兼东南舰队司令，海军革新派领袖，主张空艇作战
      伊织夫人(R2): “热泉乡”旅馆的女主人，消息灵通，为各方势力提供中立社交场所
  主要区域:
    海神之牙区:
      定位: 城市南部，面临东海，城市军事与行政核心
      环境: 气氛严肃，海军舰队在此停靠，行人稀少 
      地标:
        无畏者港湾: 东南舰队主母港，停泊蒸汽铁甲舰与武装空艇
        总督府“海望塔”: 指挥部兼官邸，总督所在地，塔灯为归航指引
    天穹工厂区:
      定位: 城市北部山脉内，工业心脏，隐藏帝国最高机密的军用空艇制造基地
      环境: 由森严卫队专门巡逻，外围由坚固石墙包围
      地标:
        炉心堡: 山脉深处的矮人城镇，提供技术与劳动力
        飞翼船坞: 隐藏在山体内的洞穴式船坞，用于建造与停放军用空艇
    翡翠航路区:
      定位: 城市中部，商业与娱乐中心，连接军港与工业区
      环境: 城市繁华，人流如织，街道两旁是各种商店与娱乐场所
      组织: 绿海商会联盟(由多个商会与冒险者团队组成的小贸易联盟，垄断前往翡翠迷宫的海路，掌控商业区)
      地标:
        探险家集市: 冒险者协会所在地，提供向导、药剂，并交易遗迹物品
        热泉乡: 温泉旅馆街，从公共浴场到私人会所俱全，是情报交换中心和消费场所
