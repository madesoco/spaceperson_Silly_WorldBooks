---
城市与地点档案:
  埃萨罗德:
    所属: 中央大平原/阿尔比恩帝国
    概述: 帝国首都，权力、财富与知识中心，城内建筑风格并存，包括哥特式尖塔与大型工业设施，艾德拉河穿城而过
    区域划分:
      - 皇冠区:
        位置: 城市中心地势最高的山丘
        功能: 帝国的政治中枢，守卫森严
        主要人物:
          希尔薇娅女皇: 银龙娘，其公开形象具有痴女特征，统治手腕开明
        子地点:
          - 白银尖塔宫: 皇室居所与权力中枢，由哥特式尖塔群构成，内部为洛可可式装饰
          - 三级议会堂: 帝国议会会场，建筑融合古典与蒸汽朋克风格
          - 百厅之廊: 帝国各部委办公地点，内部有密集的气动管道网络用于传递政令

      - 圣律区:
        位置: 紧邻皇冠区东侧
        功能: 帝国国教的总部，由教堂、修道院和神学院构成的宗教区域，建筑以白色大理石哥特式尖顶为主
        主要人物:
          - 贝妮代塔: 帝国国教教宗，隐修会的真祖吸血鬼，居于圣座庭深处
          - 菲奥娜·卡雷利亚: 燃炎圣女，赤铜龙娘，负责执行教廷的直接裁决与审判
        子地点:
          - 公正大教堂: 正义女神阿斯特莱雅信仰的中心教堂

      - 贵胄区:
        位置: 环绕皇冠区与圣律区
        功能: 大贵族与富商的居住区。街道由煤气灯照明，有马车与初级蒸汽汽车通行
        主要人物:
          伊莎贝拉·冯·卡斯坦因: 卡斯坦因家族族长，“绯月俱乐部”主人，恋爱脑
          卡蜜拉: 秘党真祖，偶尔从沉眠中苏醒的古老吸血鬼，爱玩性格
          奥托·冯·施泰纳: 帝国边防派领袖，宅邸戒备森严  //
          维多利亚·阿克莱特: 工业派新星，天才少女
          索菲亚·冯·霍恩索伦: 学院派领袖，通过沙龙连接政界与学界
          路德维希·冯·维特尔斯巴赫: 保皇派领袖，古典艺术品收藏家 //
        子地点:
          - 绯月俱乐部: 仅对顶级权贵开放的私人俱乐部，同时是吸血鬼秘党的主要据点
          - 五大家族宅邸: 帝国五位大贵族的府邸，是区内地标建筑

      - 蒸汽之心区:
        位置: 艾德拉河下游的城市东部
        功能: 帝国的核心工业区，工厂烟囱是城市天际线的一部分，空气中有煤炭与机油味
        子地点: 工厂区、阿克莱特工业集团总部

      - 理教区:
        位置: 艾德拉河西岸与皇冠区隔河相望
        功能: 皇家魔导学院所在地，聚集了大量学生与学者
        主要人物:
          艾格尼丝·冯·霍恩索伦: 现任女校长，致力于维持学院内派系平衡，并推动魔法与科技的融合
          埃里希·冯·齐滕: 骑士院院长，退役将军，遵循旧骑士信条，受贵族学生崇拜，对火药武器持保留态度 //
          海因里希·'灰烬之手': 魔法院院长，出身平民的塑能学派法师，性格火爆，是平民学生的领袖 //
          费迪南德·考尔: 工程院院长，蒸汽科技推崇者，与工业派贵族关系密切，致力于让蒸汽动力超越魔法 //
          克莱尔·冯·埃德尔斯坦: 骑士院二年级生，贵族学生领袖，以剑术和交际能力闻名
          汉娜·米勒: 魔法院二年级生，来自小镇的平民天才，平民学生的希望
        子地点: 皇家魔导学院

      - 不夜区:
        位置: 连接贵胄区与蒸汽之心区的市中心地带
        功能: 城市的商业与娱乐中心，包含商店、酒馆、剧院及冒险者协会总部
        主要人物:
          伊芙琳·'铁腕'·索恩: 冒险者协会总会长，精明强干的女性法师
          阿塔兰忒·'风行者': A级冒险者，以射术闻名的精灵枪械师，酒馆常客
          格蕾娅·'碎颅者': 退役传奇A级冒险者，“碎颅者酒馆”老板，区域地下秩序的维护者
          安妮塔: 偶尔出现在小巷中的流浪人偶，以其无机质感和对精液的需求而闻名
        子地点: 碎颅者酒馆、辉煌大剧院、冒险者协会总部

      - 煤灰巷:
        位置: 蒸汽之心区外围及城市地下排水系统
        功能: 贫民窟与黑市所在地，被称为“底城”，街道狭窄，由帮派维持秩序
        子地点: 黑市、赌场、贫民窟
