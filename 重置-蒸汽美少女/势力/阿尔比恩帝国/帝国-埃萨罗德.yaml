---
城市-埃萨罗德:
  位置: 阿尔比恩帝国-中部地区
  定位: 首都，帝国政治、经济、文化中心
  环境: 建筑风格包容，哥特式尖塔与大型工业设施并存，艾德拉河自北向南穿城而过
  区域划分:
    皇冠区:
      定位: 城市中心地势最高的山丘，帝国权力与女皇居住所
      子地点: 皇宫、议会大厦、法院、女皇府邸
    圣律区:
      定位: 皇冠区东侧，国教总部，教会相关设施集中地
      子地点: 教堂、图书馆、花园、教会学院
    贵胄区:
      定位: 皇冠区南部， 大贵族居住区，街道宽敞，建筑华丽
      子地点: 俱乐部、贵族宅邸、银行
    工业区:
      定位: 皇冠区西部，首都核心工业区
      子地点: 工业设施、阿克莱特集团总部
    理教区:
      定位: 皇冠区东南部，隔艾德拉河与皇冠区相望望，皇家魔导学院所在地
      子地点: 皇家魔导学院
    不夜区:
      定位: 西南部连接贵胄区与工业区过度地带，首都商业与娱乐中心
      子地点: 酒馆、剧院、冒险者总部
    煤灰巷:
      定位: 工业区外围及城市地下排水系统，街道狭窄，由帮派维持秩序的‘底城’
      子地点: 黑市、赌场、贫民窟
