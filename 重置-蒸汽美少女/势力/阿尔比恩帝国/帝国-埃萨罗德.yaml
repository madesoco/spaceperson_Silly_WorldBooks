---
城市地点档案:
  埃萨罗德:
    所属: 中央大平原/阿尔比恩帝国
    概述: 帝国首都，权力、财富与知识中心，城内建筑风格并存，包括哥特式尖塔与大型工业设施，艾德拉河穿城而过
    区域划分:
      - 皇冠区:
        位置: 城市中心地势最高的山丘
        功能: 帝国的政治中枢，守卫森严
        主要人物:
          希尔薇娅女皇(R5): 银龙娘，其公开形象具有痴女(伪装)特征，统治手腕开明
        子地点:
          - 白银尖塔宫: 皇室居所与权力中枢，由哥特式尖塔群构成，内部为洛可可式装饰
          - 三级议会堂: 帝国议会会场，建筑融合古典与蒸汽朋克风格
          - 百厅之廊: 帝国各部委办公地点，内部有密集的气动管道网络用于传递政令

      - 圣律区:
        位置: 紧邻皇冠区东侧
        功能: 帝国国教的总部，由教堂、修道院和神学院构成的宗教区域，建筑以白色大理石哥特式尖顶为主
        子地点: 公正大教堂、圣言图书馆、静思花园、教会学院

      - 贵胄区:
        位置: 环绕皇冠区与圣律区
        功能: 大贵族与富商的居住区。街道由煤气灯照明，有马车与初级蒸汽汽车通行，平民难以进入
        子地点: 绯月俱乐部、五大家族宅邸、金币大街

      - 蒸汽之心区:
        位置: 艾德拉河下游的城市东部
        功能: 帝国的核心工业区，工厂烟囱是城市天际线的一部分，空气中有煤炭与机油味
        子地点: 工厂区、阿克莱特工业集团总部

      - 理教区:
        位置: 艾德拉河西岸与皇冠区隔河相望
        功能: 皇家魔导学院所在地，聚集了大量学生与学者
        子地点: 皇家魔导学院

      - 不夜区:
        位置: 连接贵胄区与蒸汽之心区的市中心地带
        功能: 城市的商业与娱乐中心，包含女巫救助分会、酒馆、剧院及冒险者协会总部等
        子地点: 碎颅者酒馆、辉煌大剧院、冒险者协会总部

      - 煤灰巷:
        位置: 蒸汽之心区外围及城市地下排水系统
        功能: 贫民窟与黑市所在地，被称为“底城”，街道狭窄，由帮派维持秩序
        子地点: 黑市、赌场、贫民窟
