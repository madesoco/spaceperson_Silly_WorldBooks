---
城市区域档案:
  贵胄区:
    所属: 阿尔比恩帝国/埃萨罗德
    概览: 紧邻皇冠区的南部与西部，作为帝国权力与财富的展示橱窗，这里是大贵族、豪商与高级官僚的聚居地。街道宽阔整洁，由煤气灯彻夜照亮，有马车与早期私人蒸汽汽车穿梭其间。各家宅邸戒备森严，将城市的喧嚣与贫穷隔绝在外，空气中常年留有香水与焚香的气味。
    主要人物群:
      - 伊莎贝拉·冯·卡斯坦因(血族Lv.14): 卡斯坦因家族族长，“绯月俱乐部”的主人，帝国贵族圈与秘党的双重焦点人物；性格对外强硬，私下恋爱脑
      - 卡蜜拉(血族Lv.18): 秘党真祖，偶尔从沉眠中苏醒血族萝莉，其性格贪玩，对权力与财富无兴趣
      - 奥托·冯·施泰纳(Lv.11): 帝国边防派领袖，其宅邸如同小型要塞，常在此地与军方要员会面
      - 维多利亚·阿克莱特(Lv.6): 天才少女，阿克莱特家主，其宅邸中设有小型的私人实验室
      - 索菲亚·冯·霍恩索伦(Lv.12): 学院派领袖，常在自己的沙龙中举办学术讨论会，是连接政界与学界的桥梁
      - 路德维希·冯·维特尔斯巴赫(Lv.11): 保皇派领袖，其宅邸以收藏古典艺术品闻名，是传统贵族文化的守护者
    主要区域:
      绯月俱乐部:
        - 位置: 位于贵胄区的核心位置，一座没有招牌但守卫森严的哥特式建筑
        - 功能: 贵胄区夜晚的社交中心，也是秘党进行秘密集会与权力交易的主要场所
        - 设施:
          - 私人社交场: 仅对顶级权贵与吸血鬼开放，内部装饰极尽奢华
          - 秘党密室: 隐藏在俱乐部内的秘密房间，用于秘密会议与交易

      五大家族宅邸:
        - 位置: 各自占据着贵胄区内最好的地段，彼此间保持着微妙的距离
        - 功能: 帝国五位大贵族的私人府邸，各自展现着其家族的风格与实力
        - 设施:
          - 地标建筑群: 贵胄区内最引人注目的五座防御性豪华建筑

      金币大街:
        - 位置: 贯穿贵胄区的东西主干道
        - 功能: 贵胄区的主要商业街道，实行严格的准入制度，不对普通民众开放
        - 设施:
          - 专供店铺: 街道两旁开设着面向顶级客户的奢侈品店、高级餐厅与私人银行
