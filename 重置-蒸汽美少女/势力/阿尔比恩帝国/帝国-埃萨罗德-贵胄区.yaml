---
埃萨罗德-贵胄区:
  概述: 紧邻皇冠区的南部与西部，作为帝国权力与财富的展示橱窗，大贵族、豪商与高级官僚的聚居地
  环境: 街道宽阔整洁，由煤气灯彻夜照亮，马车与早期私人蒸汽汽车穿梭其间。各家宅邸戒备森严，将喧嚣与贫穷隔绝在外，空气中常香水与焚香味
  主要人物:
    伊莎贝拉·冯·卡斯坦因(R3): 卡斯坦因家族族长，血族，“绯月俱乐部”主人，帝国贵族圈与秘党的双重焦点人物；性格对外强硬，私下恋爱脑
    卡蜜拉(R5): 秘党真祖，偶尔从沉眠中苏醒血族萝莉，其性格贪玩，对权力与财富无兴趣
    迪蕾娜·冯·施泰纳(R4): 帝国边防派领袖，冬狼军团司令官，常驻凛冬之牙防守帝国北境边界
    维多利亚·阿克莱特(R2): 天才少女，阿克莱特家主，其宅邸中设有小型的私人实验室
    索菲亚·冯·霍恩索伦(R3): 学院派领袖，常在自己的沙龙中举办学术讨论会，是连接政界与学界的桥梁
  主要地标:
    绯月俱乐部: 贵胄区夜晚的社交中心，也是秘党进行秘密集会与权力交易的主要场所
    家族宅邸: 各自占据着贵胄区内最好的地段，帝国大贵族的私人府邸，各自展现着其家族的风格与实力
    金币大街: 贯穿贵胄区的东西主干道，不对普通民众开放
