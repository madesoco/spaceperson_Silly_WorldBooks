城市-奥斯提亚:
  标识:
    位置: 帝国东方边境与流沙之海交界处
    定位: 
    规模: 大型城市，冒险者之都
    环境: 宏伟的哥特式城墙将西方绿地与东方沙漠截然分开，城市空气中混杂着香料、酒精与汗水的气味
  区域划分:
    日出之门区:
      定位: 城市东侧，紧邻通往沙漠的巨大城门，直面流沙之海的区域，冒险者出发前的补给站与归来后的销金窟
      环境: 建筑风格粗犷实用，街道人流密集
      主要人物:
        爱莲娜·涅瑞伊得(女巫R3): 姐妹会招待所管理者，在本城市隐秘照顾意外觉醒女巫们
        不死鸟佣兵团: 常驻奥斯提亚的A级冒险者团队，以多次从死灵遗迹生还的实绩闻名
      地标建筑: 探险者广场、千帐篷酒馆区、姐妹会招待所(女巫自救会运营的隐秘设施)、终点站货场(帝国铁路网的东方终点)

    日落之门区:
      定位: 城市西侧，连接中央大平原的绿地，进入奥斯提亚的主要入口
      环境: 入口为石制拱门与卫兵排查，总督府处戒备森严
      主要人物:
        塞普蒂米娅·瓦莱里娅(R3): 现任总督，前B级冒险者。以铁腕手段与实利主义维持城中商会、冒险者与驻军间的平衡
      地标: 总督府邸(哥特式堡垒)、帝国银行与商会联盟、狮鹫山观景台(俯瞰城市全景的观景台)
    低语集市:
      定位: 遍布于城市地下的古老水道系统与地面贫民窟的阴影区域，为特意避开总督府与帝国法律管控的黑市
      环境: 水道系统与阴暗的贫民窟交错，行人多为遮蔽面容的冒险者与神秘商人
      主要人物:
        哈桑·阿尔拉希德(R1): 低语集市的隐秘主导者，掌控绝大多数未登记物品流向的情报商人
        奥蕾莉亚(R6): 偶尔出没于集市及酒馆的“漫游者”。隐藏了巫妖法王身份，以渊博的古代知识以及品酒而闻名
      地标: 水下密室、地下市场、酒馆与隐秘妓院
