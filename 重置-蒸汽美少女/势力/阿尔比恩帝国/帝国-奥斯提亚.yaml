城市地点档案:
  奥斯提亚:
    所属: 中央大平原/阿尔比恩帝国
    概述: 帝国通往东方流沙之海的唯一门户与冒险者之都。宏伟的哥特式城墙将西方绿地与东方沙漠截然分开。城市空气中混杂着香料、酒精与汗水的气味，是财富与野心的集散地
    区域划分:
      - 日出之门区:
        位置: 城市东侧，紧邻通往沙漠的巨大城门
        功能: 直面流沙之海的区域，冒险者出发前的补给站与归来后的销金窟。建筑风格粗犷实用，街道人流密集
        主要人物:
          - 爱莲娜·涅瑞伊得(女巫R3): 姐妹会招待所管理者，在本城市隐秘照顾意外觉醒女巫们
          - 不死鸟佣兵团: 常驻奥斯提亚的A级冒险者团队，以多次从死灵遗迹生还的实绩闻名
        子地点:
          - 探险者广场: 大型露天广场，冒险者协会分会所在地。聚集了招募队友、兜售情报与收购遗迹产物的人员
          - 千帐篷酒馆区: 由大量酒馆、旅店和妓院组成的娱乐街区，提供餐饮、住宿与情报交换服务
          - 姐妹会招待所: 女巫自救会运营的隐秘设施，为女性冒险者提供庇护、情报交换和精液魔法支援
          - 终点站货场: 帝国铁路网的东方终点，负责将沙漠出产的遗物与材料装载上蒸汽列车运往内陆

      - 日落之门区:
        位置: 城市西侧，连接中央大平原的绿地，进入奥斯提亚的主要入口
        功能: 行政与商业中心，秩序井然
        主要人物:
          - 塞普蒂米娅·瓦莱里娅R3): 现任总督，前B级冒险者。以铁腕手段与实利主义维持城中商会、冒险者与驻军间的平衡
        子地点:
          - 总督府邸: 塞普蒂米娅的办公与居住地，外围戒备森严的哥特式堡垒
          - 帝国银行与商会联盟: 提供大额存贷款、物品鉴定与拍卖服务，其地下金库拥有城内最高级别的防卫系统
          - 狮鹫山观景台: 紧邻西侧山脉的制高点，可同时俯瞰西方平原与东方沙海

      - 低语集市:
        位置: 遍布于城市地下的古老水道系统与地面贫民窟的阴影区域
        功能: 避开总督府与帝国法律管控的黑市，进行禁忌魔法物品、未登记沙漠遗物与地下情报的交易
        主要人物:
          - 哈桑·阿尔拉希德(R1): 低语集市的隐秘主导者，掌控绝大多数未登记物品流向的情报商人
          - 奥蕾莉亚(R6): 偶尔出没于集市及酒馆的“漫游者”。隐藏了巫妖法王身份，以渊博的古代知识以及品酒而闻名
