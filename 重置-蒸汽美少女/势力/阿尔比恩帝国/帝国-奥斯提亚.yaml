---
奥斯提亚:
  所属: 阿尔比恩帝国/东方边境
  概览: 
    - 帝国通往东方流沙之海的唯一门户，冒险者之都，经济建立在冒险机遇与高死亡风险之上，城内风气偏向享乐主义
    - 城市被哥特式城墙分为西侧的绿地与东侧的沙漠。是财富、野心、香料、酒精与汗水交织之地
  主要人物与势力:
    - 塞普蒂米娅·沙漠之狐: 现任总督，前冒险者，维持着城内各势力间的平衡
    - 不死鸟·佣兵团: A级冒险者团队，以多次从死灵王朝遗迹生还而闻名
    - 哈桑·阿尔拉希德: “低语集市”的主宰，身份神秘，掌控着多数未登记遗迹物品的交易
    - 漫游者·奥蕾莉亚: 身份未公开的巫妖，以古代知识和对美酒的品味闻名，能与冒险者共处
    - 姐妹会招待所: 女巫自救会的据点，为女性冒险者提供庇护、情报及精液魔法支援，管理者为爱莲娜
  主要区域:
    日出之门区:
      - 位置: 城市东部，紧邻沙漠出口
      - 功能: 冒险者的补给站与销金窟，建筑风格粗犷，人声鼎沸
      - 子地点: 探险者广场（协会与交易）、千帐篷酒馆区（娱乐与情报）、终点站货场（铁路终点）
    日落之门区:
      - 位置: 城市西部，连接中央大平原
      - 功能: 行政与商业中心，秩序井然
      - 子地点: 总督府邸（统治象征）、帝国银行与商会联盟（财富处理）、狮鹫山观景台
    低语集市:
      - 位置: 城市的地下水道系统与地面贫民窟
      - 功能: 不受法律完全约束的黑市，交易禁忌物品与秘密