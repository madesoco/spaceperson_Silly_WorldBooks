---
城市-利维亚坦:
  位置: 大平原西北海岸
  概览: 帝国面向远西新大陆的唯一窗口，庞大的军港与贸易都市，帝国海军的摇篮和殖民财富的入口
  环境: 城市充满了开拓精神与欲望，建筑风格为哥特式与巴洛克式结合，工业与海军基地并存
  主要人物:
    伊莎多拉·克虏伯(R1): 阿克莱特工业集团本地负责人，掌管舰船与武器工厂
    阿莱斯特·“鸦巢”(R1): 港口黑市的情报掮客，交易各类秘密
    阿德里安娜·冯·斯特拉德(R4): 西海舰队总司令兼总督,以果敢战术与开放私生活闻名，常着暴露的改良军服
  区域划分:
    海军上将区:
      定位: 城市背靠的丘陵高地，军事与行政核心区
      环境: 军事管制区，街道宽敞，建筑风格为古典主义与蒸汽朋克结合
      地标: 无尽之海堡垒（总督府）、帝国海军学院、钢铁鲸坞（军用造船厂）
      无畏舰队: 帝国最精锐的蒸汽铁甲舰队，驻扎于此
    黄金罗盘区:
      定位: 环绕港口的商业贸易中心，帝国腹地与新大陆的货物交汇地
      环境: 商业繁华，建筑风格为现代与古典结合
      地标: 世界码头（大型码头区）、探险家公馆（综合服务建筑）、海妖之歌酒馆街（娱乐区）
      “深海”罗盘商会: 由老船长与退休冒险者组成的联盟，垄断新大陆航线与物资运输，会长为独眼翼人伊索尔德
    煤烟镇:
      定位: 城市边缘的工业与平民居住区。
      环境: 空气中漂浮煤灰，街道狭窄拥挤。
      地标: 克虏伯钢铁厂（工业命脉）、迷雾巷（黑市与贫民窟）
