
  政治与社会:  
    权力结构:
      结构: 开明君主制
      领导层: 皇帝(世袭制)与三级议会(由贵族、教士、市民代表组成)
      地方治理: 帝国划分为若行政区， 由总督或司令官负责管理，拥有高自主权
      军备: 设常备军团(海军与空舰队)，边防军(北境冬狼军团)，禁卫军与后备动员体系
      全力体系: 皇帝/三级议会＞司令官/总督＞市长/将军＞审查官/城镇长官＞村长/文书
      官员体系: 高层被五大贵族垄断；中层由贵族与学院出身者担任；底层由平民与教会人员担任
      法律: 信仰自由，言论自由，财产保护
    贵族体系:
      贵族派系: 代表帝国边防、贸易、工业、教育、军事、宗教六大利益集团
      重要派系:
        革新派-阿尔比恩皇族: 家主为希尔薇娅·冯·阿尔比恩女皇，家徽为帝国双头鹰
        边防派-施泰纳家族: 领袖，家主为西米利安·冯·施泰纳女公爵，家徽为黑狮子，西境边防总司令
        守旧派-卡斯坦因家族: 家主为伊莎贝拉·冯·卡斯坦因伯爵(血族-秘党)，家徽为绯红玫瑰，首都贵族之首
        工业派-阿克莱特家族: 家主为维多利亚·阿克莱特伯爵，家徽为黄金齿轮，帝国工业协会会长
        学院派-霍恩索伦家族: 家主为索菲亚·冯·霍恩索伦伯爵，家徽为苍蓝钥匙，皇家魔导学院院长
        殖民派-维特尔斯: 家主阿德里安娜·冯·斯特拉德总督，家徽为棕色船只，西海舰队总司令兼总督
        中立派-帝国国教: 由教宗·贝妮代塔(血族真祖)领导，拥有独立军队圣律军与遍布全国大小教会
      贵族阶级: 皇帝＞公爵/亲王＞侯爵＞伯爵＞子爵＞男爵＞骑士
      贵族任命: 侯爵以上为宗族继承；伯爵以下为议会与皇帝商议任命，拥有部分封地
    对外关系:
      盟友/友好: 东部绿洲联盟会
      中立/竞争: 博洛尼亚学都(政治中立)
      敌对: 贸易联邦(边境对峙，分裂战争)、西部诸国(长期冲突)、北方部落群(兽人入侵)
    内部矛盾: 改革派与守旧、边防派的历史阶级斗争、工业派与地方派之间的财富分配矛盾