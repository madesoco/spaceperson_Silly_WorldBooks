---
城市地点档案:
  钢铁之城·奥古斯都:
    所属: 阿尔比恩帝国/西部地区
    概述: 帝国的旧都与西境的重工业集中地。地表区域建设有高层工厂烟囱与旧帝国城墙，由帝国官僚与驻军管理；地表之下为废弃下水道与古代遗迹，由帮派与血族氏族控制
    主要人物与势力:
      - 马克西米利安·冯·施泰纳(R3): 帝国西境军团总司令兼城市总督，边防派领袖奥托公爵的弟弟。通过部署军警巡逻与地下势力交涉，封锁暗渠街的冲突向地表蔓延
      - 帝国皇家陆军学院: 为帝国培养陆军军官的军事院校，教授传统骑士战术与蒸汽甲胄协同作战
      - 伊莱恩·德·维尔(R4): 表面经营慈善机构与赞助歌剧院，实为秘党在地代理人。通过资金网络与贵族关系网控制地下区域的运转秩序
      - 茱莉安娜·斯福尔扎(R3): 叛党代理人，血族。指挥下属袭击秘党据点与地表帝国设施，其行动经常被登载，现遭到总督府通缉
      - 铁拳兄弟会: 由退役军人与失业工人组成的本地帮派，占据部分地下区域，控制武器走私渠道与地下黑市
    区域划分:
      - 上层·光辉区:
        位置: 城市地势最高区域的旧皇城原址
        功能: 行政与商业中心。街道铺设石板，安装煤气灯，分布有贵族宅邸与大型百货建筑
        子地点:
          - 总督府: 沿用旧皇宫建筑改造的西境军团指挥中心与行政大楼，外墙残留有弹痕
          - 皇家陆军学院: 占地面积包括露天训练场、射击场及蒸汽甲胄模拟战区，定点敲响报时钟
          - 黄金大道: 商业主干道，两侧开设银行、奢侈品店、高消费餐厅与剧院，夜间保持全路段照明

      - 中层·齿轮镇:
        位置: 环绕光辉区外围建设的平民居住带
        功能: 工业生产与劳工住宿区。空气中混杂机油与煤烟气味，外层建筑铺设裸露的蒸汽输送管道
        子地点:
          - 西部联合工厂: 多家工业集团共用的生产区域，运作多条流水线，制造铁轨、炮弹与蒸汽机甲配件
          - 工人之家: 建筑密集的连排劳工宿舍，区域内开设有多家低消费的黑麦酒馆
          - 物资集散枢纽: 连接铁路干线与运河网的货运站，装卸原矿石并外运成品物资

      - 下层·暗渠街:
        位置: 城市地表下方，通过废弃管道与竖井连接中上层
        功能: 避开帝国法律管辖的地下区域，无自然光源，内部运行帮派与血族的私定规则
        子地点:
          - 遗忘之城: 旧帝都陷落后被掩埋的遗迹层，现作为各方势力划定边界的缓冲区
          - 血色舞台: 血族控制的地下场馆，定期举办无规则死斗比赛并开设盘口
          - 黑水市场: 地下交易集散地，出售未登记的军火、炼金药剂，并提供情报与暗杀交易
