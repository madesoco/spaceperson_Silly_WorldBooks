---
  名称: 卡拉兹奇根
  所属: 龙脊山脉中部
  概览:
    - 现存最大的矮人聚落，位于龙脊山脉内部的山中之城。
    - 由铁须、铜锤、金砧、石盾、深岩五大氏族共同统治。
    - 建筑风格为矮人工程学与俄式艺术的结合。
    - 以精湛工艺和烈性美酒闻名，是通往地底世界的门户。
  主要人物与势力:
    - 五氏族长老议会: 城邦最高统治机构，由五大氏族长老组成。
    - 亚历山钢·屠龙者: 铁须氏族族长，传奇战士，城市防卫总指挥官。
    - 瓦西里·深掘者: 深岩氏族首席探矿师，冒险者协会荣誉会长，致力于向地底探索。
    - “歌唱水晶”酒馆: 退休冒险家奥尔加经营的酒馆，是情报集散地。
    - “黑市”走私集团: 由地表商人与腐化卫兵组成的秘密网络，交易未登记的物品。
  主要区域:
    上层·王座大厅区:
      - 位置: 城市最高层。
      - 功能: 政治与文化中心，展示氏族财富与荣耀。
      - 子地点: 五王座大厅（议会场所）、先祖堂（神庙与历史记录）、奇珍宝库（金库与博物馆）。
    中层·炉火家园区:
      - 位置: 城市中部，人口最密集。
      - 功能: 居民生活、商业与娱乐核心区，由大熔炉提供光热。
      - 子地点: 大锻炉（工业心脏）、酩酊长街（商业娱乐街）、石艺家园（居住区）。
    下层·深矿坑道区:
      - 位置: 城市最底层。
      - 功能: 矿业基地与通往未知地底的边境。
      - 子地点: 无底矿井（主矿脉与探索入口）、静默之门（通往地底的防线）、遗忘者墓穴（废弃瘟疫区，试炼场）。
