---
城市与地点档案:
  巨石镇:
    所属: 中央大平原/阿尔比恩帝国
    概览:
      - 由开拓村发展而来的百人小镇，是帝国腹地开拓聚落的缩影
      - 建筑多以本地白色大理石建造，呈哥特式风格
      - 经济来源为农业与石材开采
    主要人物:
      - 菲莉娅·菲尔温: 镇上唯一的注册D级冒险者(翼人)，称号“风信之羽”
      - 艾米丽娅(修女): 镇上国教教会的唯一神职人员，收养开拓中产生的孤儿
    主要地点:
      - 石拳酒馆: 镇中心唯一的酒馆，兼作冒险者协会联络点，委托多为杂活
      - 圣光小教堂: 白色大理石建造的小教堂，镇民的精神寄托，修女与孤儿的居所，位于镇上最高处
      - 白岩采石场: 镇东山坡的露天采石场，出产白色大理石，是小镇主要经济来源之一
      - 镇中心广场: 大理石板铺成的公共活动空间，用于节日庆典或日常活动
