---
埃萨罗德-皇冠区:  
  概述: 位于首都中心地势最高的山丘，皇室住所、三级议会召开地以及政府各部委的行政中心
  环境: 建筑风格宏伟庄严，以白色大理石为主体材料，帝国禁卫军巡逻不息
  主要人物:
    女皇·希尔薇娅(R5): 银龙娘，其公开形象具有痴女(伪装)特征，统治手腕开明
    维多利亚·阿克莱特(R2): 阿克莱特家主，伯爵兼工业部部长，负责帝国工业科技发展
    西米利安·冯·施泰纳(R3): 西境军团总司令，帝边防派代表，军事强人
    伊莎贝拉·冯·卡斯坦因(R4): 卡斯坦因家主，伯爵兼财政部部长，贵族圈核心人物
    索菲亚·冯·霍恩索伦(R3): 学院派领袖，国家文化与魔导教育负责人。其妹艾格尼丝为魔导学院院长
    阿德里安娜·冯·斯特拉德(R3): 西海舰队总司令，帝国海军代表人，大力宣传远西大陆殖民理论
    教宗·贝妮代塔: 神秘血族真祖，大多数时间隐秘于教会沉睡，政治恪守中立地位
  地标建筑:
    白银尖塔宫: 皇室居所与权力中枢，由哥特式尖塔群构成，内部为洛可可式装饰
    三级议会堂: 帝国议会会场，建筑融合古典与蒸汽朋克风格
    百厅之廊: 帝国各部委办公地点，内部有密集的气动管道网络用于传递政令