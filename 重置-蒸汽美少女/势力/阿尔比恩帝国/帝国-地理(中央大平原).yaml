---
地理与地点档案:
  中央太平原地区:
    所属: 米拉比里斯大陆/中央太平原地区
    概览: 帝国的核心区域，连接着文明中心与未开发的边疆
    地理:
      - 范围: 西起世界之脊山麓，东至流沙之海，北接冻土，南抵龙脊山脉
      - 地势: 西高东低，整体为平缓的沃土
      - 水文: 生命之河艾德拉及其支流贯穿全境
      - 气候: 温和湿润
    特征:
      - 人口最密集，物产最丰富，铁路网最发达
      - 区域内散布着古代遗迹和危险地带
    特色设施与组织:
      - 帝国驿站网络: 沿主干道设立的官方站点，为信使、官员及持证旅客提供补给与安全保障
      - 蒸汽列车线路: 连接主要城市的铁路网，承载大量货运与客运，是帝国工业的象征

    帝国城市群:
      - 埃萨罗德: 位于平原中心，帝国首都，艾德拉河交汇处
      - 奥古斯都: 位于西部边境，工业重镇与旧都，通往西部破碎之地的要道
      - 利维亚坦之门: 位于西北海岸，最大军港，面向远西新大陆的窗口
      - 凛冬之牙: 位于北方冻土边境要塞，抵御北方部落的屏障
      - 奥斯提亚: 位于东方边境，冒险者之都，通往流沙之海的门户
      - 瓦尔卡拉: 东南海岸，新兴军港与空艇基地
      - 巨石镇: 位于巨人之踵丘陵深处的小镇，以农业和石材开采为主要的经济来源
    其他势力:
      - 索菲亚城: 位于西南海岸，崇尚知识与魔法的独立学术城邦
    
    主要水文与山脉:
      - 艾德拉河: 帝国的母亲河，自北向南贯穿平原
      - 巨人之踵丘陵: 位于埃萨罗德西南，遍布巨石
      - 铁峰山: 位于奥古斯都东侧，富含铁矿，有多个矮人采矿聚落
      
    危险与未知区域:
      - 低语森林: 埃萨罗德东方的古老森林，因诡异低语得名，是魔化生物巢穴
      - 悲泣沼泽: 艾德拉河下游东岸的古战场，遍布因战争怨念而生的不死生物
      - 狮鹫峰: 平原南部山峰，狮鹫的主要栖息地，威胁南方商路
      - 坠星坑: 平原中部的大坑洞，为浮空城坠落遗址，内部生态诡异，存在空间裂隙
