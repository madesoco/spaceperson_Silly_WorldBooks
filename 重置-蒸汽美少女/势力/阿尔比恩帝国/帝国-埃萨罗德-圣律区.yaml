---
埃萨罗德-圣律区:
  概览: 帝国国教总部所在地，由教堂、修道院与神学院建筑群构成的宗教区
  环境: 以公正大教堂为中心呈放射状布局，建筑采用白色大理石与哥特式尖顶结构
  主要人物:
    贝妮代塔(R5): 帝国国教教宗，隐修会真祖。常年居于圣座庭地下，代国教行使最高职权
    菲奥娜·卡雷利亚(R3): 燃炎圣女，赤铜龙娘，正义女神的选民，负责执行教廷的直接物理裁决
  区域建筑:
    教廷核心区:
      定位: 圣律区正中心的高地，帝国国教最高权力与行政中枢
      设施: 公正大教堂(宗教集会地与圣殿)、圣座庭(教宗居所与办公地)、红衣主教议事厅(主教议会例会场所)
    教会学院:
      定位: 教廷核心区东部与南部外围，国教神职人员与圣教军军官的教育与训练基地
      设施: 圣阿斯特莱雅神学院(牧师与修女培训)、圣盾军事学院(圣教军军官培训)、圣言图书馆(宗教典籍与教令资料库)
    生活区:
      定位: 圣律区北部与西部边缘。神职人员、学员与士兵的集中居住地，实行严格的军事化与教规管理
      设施: 见习修女院(女性学员集体宿舍)、圣教军兵营(圣教军首都驻防点与军事学院)、静思花园(对外开放的种植区与冥想区)
