---
城市区域档案:
  圣律区:
    所属: 阿尔比恩帝国/埃萨罗德
    概览: 帝国国教总部所在地，紧邻皇冠区东侧，以公正大教堂为中心呈放射状布局。区域内建筑多采用白色大理石与哥特式尖顶结构，由教堂、修道院与神学院建筑群构成
    主要人物:
      - 贝妮代塔(血族R5): 帝国国教教宗，隐修会真祖。常年居于圣座庭地下，代国教行使最高职权
      - 菲奥娜·卡雷利亚(R3): 燃炎圣女，赤铜龙娘，正义女神的选民。驻扎此区，负责执行教廷的直接物理裁决
    主要区域:
      教廷核心区:
        - 位置: 圣律区正中心的高地
        - 功能: 帝国国教最高权力与行政中枢
        - 设施:
          - 公正大教堂: 正义女神阿斯特莱雅的主教堂，装配有描绘女神建律史诗的巨型彩绘玻璃窗
          - 圣座庭: 教宗居所与办公地。主体为地下密室与大型档案库，存有第三纪元至今的教会机密卷宗，不对外开放
          - 红衣主教议事厅: 主教议会例会场所，墙面悬挂历任教宗画像。

      学院区:
        - 位置: 教廷核心区东部与南部外围
        - 功能: 国教神职人员与圣教军军官的教育与训练基地
        - 设施:
          - 圣阿斯特莱雅神学院: 培训牧师与修女，讲授神学、宗教史与基础神术引导
          - 圣盾军事学院: 圣教军军官训练所，提供冷热兵器实战训练及对抗不死生物、恶魔的专业战术指导
          - 圣言图书馆: 国教官方典籍与历代教令的集中存放地，供神学院人员借阅查考

      生活区:
        - 位置: 圣律区北部与西部边缘
        - 功能: 神职人员、军校学员与士兵的集中居住地，实行严格的军事化与教规管理
        - 设施:
          - 见习修女院: 女性学员集体宿舍，执行固定的作息与宵禁制度
          - 圣教军兵营: 圣教军首都驻防点，兼作军事学院的日常操练场
          - 静思花园: 对外开放的种植区，培育大面积白玫瑰，设有供人冥想的石椅
