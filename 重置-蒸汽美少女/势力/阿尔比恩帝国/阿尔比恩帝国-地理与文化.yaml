  地理区域:
    中央大平原: 艾德拉河及其支流贯穿全境的大平原，温带大陆性气候，四季分明农业条件优越
    特色设施:
      帝国驿站网络: 沿主干道设立的官方站点，为信使、官员及持证旅客提供补给与安全保障
      蒸汽列车线路: 连接主要城市的铁路网，承载大量货运与客运
      常见群体: 帝国正规军巡逻队、巡回神父与修女、流动商人与货运马车队、流浪的女巫、匪盗团伙
      常见危险: 史莱姆(R1)、狮鹫(R2)、魔化野狼群(R2)、巨型蜘蛛(R4)、古战场怨灵(R4)
    平原区域分布:
      中部地区:
        介绍: 位于中部，政治/经济/文化中心，气候温和宜人
        埃萨罗德(首都): 位于艾德拉河交汇处，蒸汽文明起源地
        巨石镇: 首都西南巨人丘陵深处，以农业和石材开采为的附属小镇
      西部工业区:
        介绍: 位于西部，工业与军事重镇集合区，地势平坦，气候干燥
        奥古斯都: 与破碎之地相邻的工业城市，帝国旧都
        利维亚坦: 西北海岸，帝国最大海军港，面向远西新大陆的窗口
        博洛尼亚: 西南海岸，崇尚知识与魔法的独立学术城邦
      北部边防区:
        介绍: 位于北部，以山地、丘陵的为主，气候寒冷，靠近冻土边缘
        凛冬之牙: 冻土边境要塞，抵御北方部落的屏障
      东南贸易区:
        介绍: 位于东南部，气候湿润，与南方国家与流沙之地相邻
        奥斯提亚: 东方边境，冒险者之都，通往流沙之海的门户
        瓦尔卡拉: 东南海岸，新兴军港与空艇基地
    水文与山脉:
      艾德拉河: 帝国的母亲河，自北向南贯穿平原
      巨人丘陵: 位于首都西南遍布巨石的低地丘陵，巨石镇在此开采矿物
      龙脊山脉: 平原南部东西横向的山脉，地形险峻，帝国南部与联邦自然分界线
  文化与庆典:
    文化风格: 开拓进取、自由平等、魔导发达
    特色庆典:
      帝国工艺博览会(3月): 由工业派主导，在首都举办的蒸汽工业与魔导科技展览
      统考月(6月): 帝国举办官员选拔考试的月份，每年一次，考核政治与管理能力
      骑士竞技大会(8月): 女皇举办，在首都举办传统骑士竞技与马术表演
      正义女神纪念日(10): 教会主导的纪念正义女神的节日，举办宗教仪式与慈善活动

