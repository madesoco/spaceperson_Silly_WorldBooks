---
阿尔比恩帝国:
  政治与社会:
    权力结构:
      概述: 以蒸汽科技为主导，融合了贵族体系与官僚制度的多种族帝国
      女皇: 希尔薇娅·冯·阿尔比恩(银龙女皇)
      体制: 开明君主制
      国徽: 一只金色双头鹰，一首代表传承魔法，一首代表进取科技，双爪分抓法杖与活塞
      国家颜色: 深普鲁士蓝（秩序）、绯红（激情）、耀金（荣耀）
      官僚体系: 高级官位被垄断；低级官员由通过考试选拔的公务员构成，负责帝国日常运转
      权力组成: 皇帝、三级议会、五大贵族派系、帝国国教
      三级议会: 由贵族、教士、官僚与中产阶级组成，提供有限的发言渠道
    重要派系组成:
        五大贵族派系:
          - 边防派: 奥托·冯·施泰纳(公爵)
          - 地方派: 伊莎贝拉·冯·卡斯坦因(血族伯爵，秘党)
          - 工业派: 维多利亚·阿克莱特(女伯爵)
          - 学院派: 索菲亚·冯·霍恩索伦(女亲王)
          - 保皇派: 路德维希·冯·维特尔斯巴赫(公爵)
        帝国国教: 帝国官方教会，拥有独立的军事力量与遍布全国的教会网络
  日常文化与生活:
    媒体与信息(日报形式):
      《埃萨罗德每日邮报》：帝国官方发行，刊载政治、军事与博览会新闻
      《贸易风向标》：联邦商业报刊，刊载商品价格、航运信息与远西见闻
      《冒险者公报》：协会周刊，刊登高额委托、区域评级与冒险者访谈
    日常社交场所: 酒馆、公共澡堂、咖啡馆
    日常话题: 帝国法令、博览会展品、宗教节日、骑士竞技赛果、子女教育
    公共活动:
      - 帝国工艺博览会: 每年于埃萨罗德举办，展示蒸汽机械与魔导科技
      - 骑士竞技大会: 贵族资助的军事竞赛
      - 正义女神纪念日: 帝国国教节日，举行阅兵式与祈福仪式

  社会与外交:
    首都: 埃萨罗德
    人口构成: 多种族共存，包括人类、精灵、翼人、亚人等
    教育体系: 拥有公立的皇家魔导学院
    社会风气: 经历过革命思想影响，整体风气积极向上，充满开拓精神
    官方宗教: 以正义女神阿斯特莱雅为国教，但允许其他无害信仰
    对外关系:
      - 冲突: 与西部诸国和南部联邦有持续的小规模冲突。
      - 威胁: 面临北方兽人南下与东方地底死灵王朝的潜在威胁
      - 盟友: 与山脉的矮人氏族保持友好

