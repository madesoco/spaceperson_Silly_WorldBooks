---
势力-阿尔比恩帝国:
  概览:
    定位: 以蒸汽科技为主导，融合了贵族体系与官僚制度的多种族帝国
    标识: 金色双头鹰，蓝红底色
    首都: 埃萨罗德
    宗旨: 维护国家统一，推动科技发展，维护边境和平，清除死灵王朝威胁
    行事风格: 秩序、军事强权、开放包容
    统治者: 希尔薇娅·冯·阿尔比恩(龙娘R5)
    信仰: 阿斯特莱雅(帝国国教)，地方信仰
    主要贵族: 阿克莱特家族、卡斯坦因家族、施泰纳家族、霍恩索伦家族、维特尔斯家族
    主要城市: 埃萨罗德(首都)、奥古斯都(西部工业城)、利维亚坦(西北军港)、凛冬之牙(北境要塞)、奥斯提亚(东部门户)
    主要威胁: 贸易联邦(边境对峙)、北方部落群(边境掠夺)、死灵王朝(地底威胁)
    文化符号: 帝国工艺博览会、骑士竞技大会、正义女神纪念日
