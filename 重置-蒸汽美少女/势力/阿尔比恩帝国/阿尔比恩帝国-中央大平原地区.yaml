---
中央太平原地区:
  位置: 米拉比里斯大陆-中央太平原地区
  概览: 帝国的核心区域，连接着文明中心与未开发的边疆
  地理:
    - 范围: 西起世界之脊山麓，东至流沙之海，北接冻土，南抵龙脊山脉
    - 地势: 西高东低，整体为平缓的沃土
    - 水文: 生命之河艾德拉及其支流贯穿全境
    - 气候: 温和湿润
  特征:
    - 人口最密集，物产最丰富，铁路网最发达
    - 区域内散布着古代遗迹和危险地带
  特色设施与组织:
    - 帝国驿站网络: 沿主干道设立的官方站点，为信使、官员及持证旅客提供补给与安全保障
    - 蒸汽列车线路: 连接主要城市的铁路网，承载大量货运与客运，是帝国工业的象征
  主要地点:
    主要城市群:
      - 埃萨罗德: 帝国首都，位于平原中心，艾德拉河交汇处
      - 奥古斯都: 西部工业重镇与旧都，通往西部破碎之地的要道
      - 利维亚坦之门: 西北海岸的最大军港，面向远西新大陆的窗口
      - 凛冬之牙: 北境要塞，抵御北方部落的屏障
      - 奥斯提亚: 东方边境的冒险者之都，通往流沙之海的门户
      - 瓦尔卡拉: 东南海岸的新兴军港，空艇部队基地
      - 索菲亚城: 位于西南边境的独立学术城邦，知识与魔法圣地

    主要水文与山脉:
      - 艾德拉河: 帝国的母亲河，自北向南贯穿平原，是主要内陆航线
      - 巨人之踵丘陵: 位于埃萨罗德西南，遍布巨石，是帝国主要酿酒区
      - 铁峰山: 位于奥古斯都东侧，富含铁矿，有多个矮人采矿聚落

    特色城镇与聚落:
      - 蒸汽溪谷镇: 铁峰山脚下的工业镇，以冶炼和机械加工为主，环境被煤烟笼罩
      - 金穗镇: 艾德拉河沿岸的农业重镇，以优质小麦闻名，有蒸汽驱动的巨大磨坊
      - 圣泉镇: 丘陵深处的疗养地，以能治病的温泉闻名，是教会圣地与贵族度假区
      - 石锤堡: 铁峰山内最大的矮人聚落，以出产精密齿轮和附魔武器闻名
      - 绿荫村: 森林边缘的翼人聚落，采集稀有材料维生，与外界接触有限
      - 巨石镇: 丘陵地带的开拓聚落缩影，以农业和石材开采为生
  
    危险与未知区域:
      - 低语森林: 埃萨罗德东方的古老森林，因诡异低语得名，是魔化生物巢穴
      - 悲泣沼泽: 艾德拉河下游东岸的古战场，遍布因战争怨念而生的不死生物
      - 狮鹫峰: 平原南部山峰，狮鹫的主要栖息地，威胁南方商路
      - 坠星坑: 平原中部的大坑洞，为浮空城坠落遗址，内部生态诡异，存在空间裂隙
