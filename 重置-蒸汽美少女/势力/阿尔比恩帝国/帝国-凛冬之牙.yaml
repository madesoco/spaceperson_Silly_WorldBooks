---
城市地点档案:
  凛冬之牙:
    所属: 中央大平原/阿尔比恩帝国
    概览:
      - 帝国在北方冻土边境的哥特式星堡，以钢铁与蒸汽铸就
      - 位于文明世界的北境尽头，是抵御兽人部落南下的防线
      - 环境特征为煤烟味、寒风与钢铁气息
    主要人物:
      - 芙兰迪蕾娜·冯·施泰纳(R4): 北境边防司令官，边防派领袖，以铁腕治军闻名
      - 赫尔加·铁臂(R2): 负责维护蒸汽核心与魔导防御系统的矮人女性技术大师
      - “霜矛”薇薇安(R4): 常驻的A级冒险者，接受军方委托处理高威胁目标
      - “老妈”伊索尔德(R1): “雪顶酒馆”的老板娘（熊亚人）
    主要区域:
      钢铁核心区:
        - 位置: 要塞中心，戒备森严
        - 功能: 军事与工业心脏
        - 子地点:
          - 无垢尖塔: 司令部所在地与要塞最高建筑
          - 冬狼兵营: “冬狼”军团驻地，帝国北境军团的正式番号，驻扎于此
          - 赫尔加的熔炉: 生产与维护军备的地下工坊
          - 不灭之心: 为要塞提供能源与热能的巨型蒸汽核心

      炉火镇:
        - 位置: 核心区外围
        - 功能: 军民生活区与唯一商业区
        - 子地点:
          - 雪顶酒馆: 要塞内唯一的酒馆，提供烈酒与炖肉
          - 边境贸易站: 帝国直辖贸易点，负责物资补给与收购
          - 协会前哨: 冒险者协会在北境的最大据点

      外环城墙区:
        - 位置: 要塞最外围。
        - 功能: 由三道同心圆城墙构成的防御地带，内部为训练场与仓库
        - 子地点:
          - 静默之墙: 最外层城墙，高五十米，设有哨兵
          - 演武雪原: 内墙与中墙间的训练场，用于适应酷寒环境与测试装备
