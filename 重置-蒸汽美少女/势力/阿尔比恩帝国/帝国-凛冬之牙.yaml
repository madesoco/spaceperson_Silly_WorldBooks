---
城市-凛冬之牙:
  标识:
    位置: 与冻土寒带相邻，帝国北部边境要塞
    概览: 帝国在北方冻土边境的哥特式星堡，是抵御兽人部落南下的最前防线
    环境: 全年被风雪覆盖，北侧城墙布由四门巨炮，为典型的军事边境要塞风格
    规模: 大型要塞都市
    主要人物:
      芙兰迪蕾娜·冯·施泰纳(R4): 北境边防司令官，边防派领袖，以铁腕治军闻名
      赫尔加·铁臂(R2): 负责维护蒸汽核心与魔导防御系统的矮人女性技术大师
      “霜矛”薇薇安(R4): 常驻的A级冒险者，接受军方委托处理高威胁目标
      “老妈”伊索尔德(R1): “雪顶酒馆”的老板娘（熊亚人）
    区域分布:
      钢铁核心区:
        定位: 要塞中心，戒备森严，军事与工业心脏
        环境: 由众多高耸的瞭望塔与兵营组成，最中心处为总司令部
        地标:
          无垢尖塔: 司令部所在地与要塞最高建筑
          冬狼兵营: “冬狼”军团驻地，帝国北境军团的正式番号，驻扎于此
          赫尔加的熔炉: 生产与维护军备的地下工坊
          不灭之心: 为要塞提供能源与热能的巨型蒸汽核心

      炉火镇:
        定位: 包围核心区外围，城墙与核心区相连,军民生活区与唯一商业区
        环境: 民房与商店坐落地，街道狭窄，人烟气味浓重
        地标: 雪顶酒馆、边境贸易站、冒险者协

      外环城墙区:
        位置: 要塞最外围，由三道同心圆城墙构成的防御地带
        环境: 城墙高五十米，设有哨兵，内部为训练场与仓库
        地标: 静默之墙(最外层)、寒冰之墙(第二层)、烈焰之墙(第三层)
