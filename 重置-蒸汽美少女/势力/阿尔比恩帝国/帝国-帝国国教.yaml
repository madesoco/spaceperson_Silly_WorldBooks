---
帝国组织档案:
  帝国国教:
    概述: 阿尔比恩帝国的官方宗教组织，拥有独立的军事力量与遍布全国的教会网络
    信仰与教义:
      核心神明: 正义女神阿斯特莱雅
      核心教义: 秩序、职责、正义与仁慈
      兼容信仰: 将保护之神、勇气之神等有益于帝国秩序的神明，尊为“护国圣徒”进行崇拜
    组织与军事:
      教宗: 贝妮代塔(帝国默认的血族真祖)
      神职体系: 拥有从见习修女到红衣主教的完整神职体系，女性亦可晋升至高位
      社会职能: 下设的宗教事务部与帝国内政部合作，共同管理户籍、教育与社会救济
      军事力量:
        - 圣教军: 由信徒组成士兵，牧师与修女担任军官，是帝国最可靠的超自然事件应对部队
    对外关系:
      - 对女巫自救会: 态度谨慎，但在应对共同威胁时务实合作。
      - 对欲望女士教会: 视为神学异端，但只要不威胁帝国秩序，便不主动干涉
      - 对死灵王朝: 绝对敌对，视为必须净化的首要威胁