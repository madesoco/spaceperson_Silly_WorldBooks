---
城市区域档案:
  不夜区:
    所属: 阿尔比恩帝国/埃萨罗德
    概览: 城市商业与娱乐区域，煤气灯自黄昏至黎明供电照明。区域内包含冒险者协会总部、商店、酒馆、剧院与旅店。空气中混杂麦酒与烤肉的气味。地处西侧贵胄区与东侧蒸汽之心区之间，贵族、冒险者、平民与工人在此区域内交汇
    主要人物群:
      - 伊芙琳·'铁腕'·索恩(Lv.10): 冒险者协会总部会长。其高效的决断力，管理庞大的冒险者网络
      - 阿塔兰忒·'风行者'(精灵Lv.15): 现役A级冒险者，射术闻名的枪械师，酒馆常客
      - 格蕾娅·'碎颅者'(Lv.16): 退役A级冒险者。在吧台后收取金币提供情报，维持这片区域地下秩序的重量级人物
      - 安妮塔(Lv.5): 在无光源的小巷内游荡的人偶，以其特有的无机质感和对精液的需求而闻名于少数知情者之间
      - 夏洛特·德·布罗伊(女巫Lv.3): 努力维持体面的没落贵族小姐，身为女巫却抗拒进食精液。努力领取任务为复兴家族
    主要区域:
      探险家之家:
        - 位置: 坐落于不夜区中心广场
        - 概述: 石制建筑结构。内部设有大型委托板，张贴有从寻物至大型怪物讨伐的各级委托单
      碎颅者酒馆:
        - 位置: 位于主干道旁的一条支路上
        - 概述: 供应未脱谷壳的黑麦酒与大块炭烤兽肉，墙面用铁钉固定着食人魔头骨与断裂的长剑
      辉煌大剧院:
        - 位置: 位于靠近贵胄区一侧
        - 概述: 建筑外墙设有繁复装饰。内部定期上演史诗或风月类戏剧，观众席常有贵族与商人进行私下的情报与利益交换
