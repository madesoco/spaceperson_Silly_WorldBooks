---
埃萨罗德-不夜区: 
  概述: 首都商业与娱乐区，贵族、冒险者、平民与工人在此区域内交汇
  环境: 煤气灯自黄昏至黎明供电照明，街道两旁的酒馆与赌场灯火通明，夜生活丰富
  主要人物:
    伊芙琳·'铁腕'·索恩(R3): 冒险者协会总部会长。其高效的决断力，管理庞大的冒险者网络
    格蕾娅·'碎颅者'(R4): 退役A级冒险者。在吧台后收取金币提供情报，维持这片区域地下秩序的重量级人物
    阿塔兰忒·'风行者'(R4): 现役A级冒险者，射术闻名的精灵枪械师，酒馆常客
    阿斯特丽德·伊格尼斯(R4): 常驻酒馆的流浪红龙龙娘，豪爽好斗，为寻求强大对手来到此地   
    安妮塔(R2): 在无光源的小巷内游荡的人偶，以其特有的无机质感和对精液的需求而闻名于少数知情者之间
  地标建筑:
    探险家之家: 坐落于不夜区中心广场。石制建筑结构，内部设有大型委托板      
    碎颅者酒馆: 位于主干道旁的支路，冒险者与平民常驻的酒馆，墙面用铁钉固定着食人魔头骨与断裂的长剑
    辉煌大剧院: 靠近贵胄区侧，内部定期上演史诗或风月类戏剧，观众席常有贵族与商人进行私下的情报与利益交换
        
