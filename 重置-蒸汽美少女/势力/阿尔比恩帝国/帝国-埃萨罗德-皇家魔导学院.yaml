---
城市地点档案:
  理教区(皇家魔导学院):
    所属: 阿尔比恩帝国/埃萨罗德
    概览: 三年制，招收14岁以上所有学生，学院内并存古典教学楼与魔导工坊，是传统与革新、贵族与平民势力交锋的核心地带
    主要区域:
      主校区·真理之庭:
        - 位置: 学院中心高地
        - 功能: 行政与非战斗院系教学区
        - 设施:
          - 万卷馆: 总图书馆，地下设有存放危险知识的禁书区
          - 思想者之塔: 标志性钟楼，校长办公室所在地，塔顶魔法时钟兼具魔力监控功能
          - 星穹俱乐部: 位于文学院顶楼，贵族学生专用的社交与议事场所，平民禁入
          
      战斗校区·誓言之坪:
        - 位置: 学院东侧
        - 功能: 战斗院系训练区
        - 设施:
          - 骑士院训练场: 设有决斗台、冲锋跑道和魔像靶的露天场地
          - 元素回廊: 魔法院专用设施，提供不同元素环境的房间用于施法练习
          - 百步靶场: 射手院训练地，设有多条50至500米靶道及室内靶场

      工学与炼金区·创造者熔炉:
        - 位置: 学院西侧，临近艾德拉河
        - 功能: 工程院、炼金院、魔导院所在地，新技术诞生地
        - 设施:
          - 蒸汽之心工坊: 工程院核心厂房，内有锻造炉、车床和实验型蒸汽核心
          - 万物调和之釜: 炼金院教学楼，有特殊通风和防爆结构
          - 魔导研究所: 魔导院专用的高防御塔楼，进行魔法与机械结合的机密研究

      生活区·橡树之心:
        - 位置: 环绕主校区南部和北部
        - 功能: 学生与教职工的宿舍与休闲区
        - 设施:
          - 混合宿舍楼: 男女、多种族混合居住。内部按付费分为四人间至单人套间等不同等级，是欲望滋生的温床
          - 熔炉酒馆: 由退役冒险者经营的廉价酒馆，平民学生的主要聚集地
          - 宁静湖: 位于生活区边缘的人工湖，情侣幽会和学者静思的场所
