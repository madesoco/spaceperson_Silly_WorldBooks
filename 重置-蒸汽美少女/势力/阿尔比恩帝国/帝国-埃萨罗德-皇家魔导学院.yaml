---
城市区域档案:
  皇家魔导学院:
    所属: 阿尔比恩帝国/埃萨罗德/理教区
    概览: 大陆首座公立综合大学，招收14岁以上的学生。校区内石砌教学楼与重工业废气排放管道相邻。多阶层生源同校，区域内常有武器对练与学术辩论。空气中常混杂着羊皮纸防腐剂气味、煤烟味与臭氧味
    主要人物群:
      - 艾格尼丝·冯·霍恩索伦(R3): 现任女校长，索菲亚女亲王之妹。务实而开明的教育家，负责调节学院内贵族派系利益，并主导多项魔法与机械跨学科科研立项
      - 埃里希·冯·齐滕(R3): 骑士院院长，退役帝国将军。要求严格，深受贵族学生的崇拜，但对新兴的火药武器持保留态度
      - 海因里希(R4): 魔法院院长，平民出身的塑能法师。性格火爆，不拘小节，平民学生最为信赖的领袖人物
      - 费迪南德·考尔(R3): 工程院院长。接受工业派维多利亚女伯爵的大额资金赞助，主推用蒸汽核心平替魔力源的实验课题
      - 克莱尔·冯·埃德尔斯坦(R2): 骑士院二年级生。男爵家庭出身，凭借出色的剑术与交际能力成为贵族学生的领袖人物
      - 汉娜·米勒(R2): 魔法院二年级生。出身大平原农业镇，靠高分获取全额奖学金，以优异的成绩成为平民学生们的希望
    主要区域:
      主校区·真理之庭:
        - 位置: 位于学院中心区域
        - 功能: 非战斗系院系的教学楼集中地。建筑材料多为石灰岩，以中央钟楼为中心呈对称分布
        - 设施:
          - 万卷馆: 学院图书馆。地面层存放公开读物，地下层设有附魔金属门禁，存放过往纪元的非公开文献
          - 思想者之塔: 兼具报时功能的中心塔楼，内部设为校长办公室。塔顶装置同步连接着覆盖理教区的魔力流向监测仪
          - 星穹俱乐部: 位于文学院顶层，入口配有守卫与身份识别系统，仅允许持贵族爵位的学生进入
      战斗校区·誓言之坪:
        - 位置: 位于学院东侧，由无遮挡的露天步道与主校区相连
        - 功能: 战斗系院系的训练场。日间持续传出金属兵器撞击声与实体火炮/法术引爆声
        - 设施:
          - 骑士院训练场: 铺设沙土的露天区域。划分为近战决斗台、马匹冲锋直线跑道与附魔标靶区
          - 元素回廊: 魔法院施法练习地。由多个配备静音结界与隔火涂层的独立房间构成，用于测试不同属性的法术
          - 百步靶场: 射手院实弹射击区。设有多条距离在50米至500米不等的露天靶道及备用室内射击馆
      工学与炼金区·创造者熔炉:
        - 位置: 位于学院西侧，贴近艾德拉河岸线
        - 功能: 机械与生化实验区。该区厂房的烟囱持续运作，向空气与河水中排放加工废气与废液
        - 设施:
          - 蒸汽之心工坊: 工程院实验厂房。室内装配有多座高温锻造炉、金属切割车床与原型蒸汽引擎
          - 万物调和之釜: 炼金院专属建筑。墙体采用抗压结构，走廊内设有二十四小时运作的负压排风网
          - 魔导研究所: 魔导院使用的独立塔楼。外墙加装合金装甲板，内部执行魔法符文与蒸汽部件的融合测试
      生活区·橡树之心:
        - 位置: 沿主校区南北两侧边缘分布
        - 功能: 解决在校师生食宿与夜间活动的综合区域
        - 设施:
          - 混合宿舍楼: 男女多种族同栋分配。内部房型从拥挤的四人通铺到带独立卫浴的单间不等，按照学生缴费等级提供。走廊隔音极差
          - 熔炉酒馆: 退役冒险者开设的店铺。酒水定价极低，不查验顾客身份，允许室内进行大声叫骂与私人交易
          - 宁静湖: 人工挖掘的储水区。周边树木茂密且未铺设煤气灯，夜间常有学生在此'停留'
