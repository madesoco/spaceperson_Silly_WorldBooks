---
  名称: 空中庭院·艾瑞瑟尔
  所属: 泰拉·米拉比里斯大陆，翡翠迷宫上空
  概览:
    - 法师纪元时期的浮空城核心遗骸，在云海中漂移。
    - 建筑被巨大植物缠绕，是失落知识的圣殿与自律魔偶的王国。
    - 内部封存古代技术，历史上仅有一位S级冒险者成功带出部分资料。
  主要人物:
    - 塔灵·艾瑞瑟尔: 主宰之塔的AI核心，以法师学徒光影形象出现。遵循“守护知识，等待传承者”的指令，已演化出自我意识，对闯入者执行协议。
    - “蒸汽先驱”雷金纳德: 历史上唯一确认从艾瑞瑟尔带出资料的S级冒险者，其获取的图纸催生了帝国蒸汽革命。
    - “星辰编织者”阿斯塔罗斯: 艾瑞瑟尔的建造者与最后一任主人，已逝的法师纪元奥术师。
  主要区域:
    宁静花园区:
      - 位置: 浮空城外环区域。
      - 功能: 由魔法维持生态平衡的空中花园，也是第一道防线，遍布防御魔像和魔法植物。
      - 子地点:
        - 水晶穹顶温室: 培育已灭绝的、具备主动攻击性的魔法植物。
        - 风之回廊: 连接花园的露天回廊，有“鹰身”系列人偶巡逻，地面法阵会干扰未授权飞行。
    主宰之塔:
      - 位置: 浮空城正中心，制高点。
      - 功能: 核心建筑，由塔灵直接控制，内部保存着法师纪元的研究成果与生活设施，布满魔法陷阱和战斗人偶。
      - 子地点:
        - 万卷图书馆: 占据塔内三层，藏有海量魔法与技术文献，“书吏”人偶负责整理。
        - 炼金工坊: 设备齐全的古代炼金实验室，有“助手”人偶持续制造未知物品。
        - 塔主寝宫: 塔顶的私人区域，保存着阿斯塔罗斯的私人笔记与魔法造物。
    永恒之心区:
      - 位置: 浮空城最底部。
      - 功能: 动力核心区域，一个巨大能量水晶为此地提供能源。泄露的魔力导致空间不稳定，是遗迹最危险的区域。
