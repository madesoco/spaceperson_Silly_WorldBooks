---
  名称: 符文铁城·格林姆海姆
  所属: 地底世界，灰矮人领地
  概览:
    - 由三个灰矮人氏族共治的地底符文科技城。
    - 建筑直接雕刻于钟乳石与石笋，风格粗犷威严。
    - 以符文技术与魔导装备产出闻名。
    - 依赖兽人与哥布林奴工，对外贸易排外且充满商业欺诈。
  主要人物:
    - 三氏族长老议会: 由铁砧、石心、黑炉三族长者组成的最高权力机构。
    - 布兰多·黑炉 (大工匠): 黑炉氏族领袖，杰出的魔导技师与武器研发者。
    - 索林·石心 (贸易执政官): 负责对外交易，以贪婪、狡诈和黑吃黑闻名。
    - “疤面”格拉什: 受雇于奴隶主的兽人监工，以残暴手段管理矿区。
  主要区域:
    三族尖塔区:
      - 位置: 城市最高层。
      - 功能: 灰矮人居住区与政治军事核心，禁入外人。
      - 子地点:
        - 符文议事厅: 三塔交汇处的会议洞穴，刻有契约符文。
        - 氏族堡垒: 三大氏族的独立要塞，内设私人工坊与金库。
    大熔炉工坊区:
      - 位置: 城市中层。
      - 功能: 工业心脏与魔导科技产地，地热熔炉日夜运作。
      - 子地点:
        - 黑炉工坊: 生产尖端符文装备的中央工坊。
        - 魔力储能井: 汲取地脉魔力的深井，城市动力源。
    苦工矿道区:
      - 位置: 城市底层。
      - 功能: 资源开采区，环境恶劣。
      - 子地点:
        - 奴隶围栏: 关押与交易奴工的场所。
    外来者平台:
      - 位置: 城市入口，悬空石台。
      - 功能: 唯一对外开放的贸易窗口。
      - 子地点:
        - 欺诈者市场: 地表商人与灰矮人交易物资与装备的场所，遍布商业陷阱。
