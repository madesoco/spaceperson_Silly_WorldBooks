---
  名称: 智识之城·索菲亚
  所属: 米拉比里斯大陆，西南海岸
  概览:
    - 位于大陆西南海岸的独立学术城邦。
    - 建筑由白色大理石与反重力水晶构成。
    - 治理机构是由各大学代表与法师塔主组成的议会，恪守政治中立。
    - 城邦风气自由开放，以学术辩论为核心。
  主要人物:
    - 伊莱诺·奥雷利安: 现任议会轮值主席兼索菲亚综合大学校长（精灵），负责维持城邦独立。
    - 大魔导师·卡利斯托: 阿卡纳姆法师塔塔主，代表传统魔法势力。
    - 维多利亚·阿克莱特: 帝国工业派贵族，赫菲斯工学院的荣誉院长与赞助人，不常驻。
    - 港务长·巴尔萨泽: 知识港管理者（矮人），负责城邦的对外物资与人员流通。
  主要区域:
    学者高地:
      - 位置: 城市中心地势最高区域。
      - 功能: 学术与行政核心，包含教学楼、法师塔、图书馆。
      - 子地点:
        - 索菲亚综合大学: 城邦最古老、规模最大的非魔法学科学府。
        - 群星议会厅: 最高权力机构所在地，无墙壁的圆形建筑。
        - 阿卡纳姆与赫菲斯双塔: 分别代表传统魔法与魔导科技的两座高塔，相互对立。
        - 银星之塔: 研究星象与预言魔法的法师塔。
    知识港区:
      - 位置: 城市西部，临海。
      - 功能: 商业与对外交流门户。
      - 子地点:
        - 异客码头: 接待外国船只与商会的专用码头区。
        - 工匠与炼金行会: 手工作坊与炼金商店聚集地，提供材料与定制服务。
    宿舍与生活区:
      - 位置: 学者高地东侧与南侧。
      - 功能: 学生与教职员工的主要居住区，遍布咖啡馆、书店、剧院等。
      - 子地点:
        - 智慧泉广场: 生活区中心广场，学生集会与辩论的公共空间。
        - 思辨酒馆: 允许顾客在墙上书写学术观点与公式的酒馆，是思想碰撞的场所。
