#大陆国家势力与组织概览
  主要国家势力:
    阿尔比恩帝国: 
      概览: 大陆中央最强最强，以蒸汽科技为主导，融合复杂贵族体系与新兴官僚制度的多种族帝国
      位置: 位于大陆中央大平原
      首都: 埃萨罗德
    
    贸易联邦: 
      概述: 以海洋贸易、社会风气开放，由四支吸血鬼叛党氏族主导的贵族共和国
      位置: 位于南方地区
      首都: 维纳利亚

    智识之城·索菲亚:
      概述: 位于大陆西南海岸的独立学术城邦，北邻阿尔比恩帝国。由多所高等学府与法师塔构成，是知识探索与魔法研究的中心，政治上恪守中立

    天穹之眼:
      定义: 神明在凡间设立的唯一浮空前哨站，天使族的主要居住地，用于监视并应对威胁世界的重大危机
      位置: 位于凡间无法企及的云海之上，坐标不断变化以躲避侦测
    
  主要组织:
    血族三派系:
      概述: 血族社会因理念与生存方式的差异，分化为秘党、叛党、隐修会三种血族派系
      派系类别:
        秘党: 保守派系，致力于融入人类社会进行统治；成员多以帝国贵族的身份活动，掌控着帝国地下的经济与情报网络；领袖为真祖·卡蜜拉
        叛党: 革命派系，唾弃秘党的陈腐规则而叛离秘党，鼓励公开展示血族的力量；贸易联邦四大家族均为叛党核心氏族，将联邦作为对抗帝国与秘党的基地；领袖为卡特琳娜·斯福尔扎(第三代)
        隐修会: 中立派系，对派系斗争不感兴趣，只专注于自身存续；成员散布世界各地，从不主动暴露身份；领袖为真祖·贝妮代塔
      
    女巫自救会:
      概述: 仅限女巫加入的互助组织，源于法师纪元的迫害，现已发展为引导新觉醒女巫、维系成员联系并维护世界安全的庞大网络
      分布: 主要据点设于各大城市，在偏远地区较为罕见
      管理: 官方规则相对宽松，但对危害世界安全的行为持零容忍态度
      会长: 莉莉安娜·晨星(S级冒险者, 黄金魔女)

    低语者兄弟会:
      概述: 由谋杀女神菲卡教会刺客组织，提供情报交易、暗杀服务、身份伪造等暗中交易，其网络如同蛛网般遍布大陆各大城市
      运行模式: 等级森严的单线联系模式，通过特定的“信标”接收指令与报酬；无实体总部，但各地均设有隐秘联络点
      
    冒险者协会:
      概述: 分布大陆各地的非营利性组织，负责招募冒险者、提供装备与报酬、协调各冒险者之间的合作
      总部: 帝国首都埃萨罗德；会长为伊芙琳·'铁腕'·索恩(S级冒险者, 狂野女猎手)